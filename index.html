<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gothic Lockpick Solver</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #12111a;
  color: #ddd;
  font-family: 'Courier New', monospace;
  height: 100vh;
  overflow: hidden;
}

.stage { display: flex; height: 100vh; }
.stage.hidden { display: none; }

.panel { padding: 24px; }
.panel-left {
  width: 320px;
  min-width: 280px;
  border-right: 1px solid #2a2a3a;
  background: #1a1927;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.panel-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

h2 { font-size: 0.85em; letter-spacing: 3px; text-transform: uppercase;
     color: #888; border-bottom: 1px solid #2a2a3a; padding-bottom: 10px; }

.setting-row { display: flex; align-items: center; gap: 8px; }
.setting-row.minor { opacity: 0.55; font-size: 0.82em; }
.setting-row label { width: 80px; }

button {
  background: #1e1d2e;
  color: #ccc;
  border: 1px solid #3a3a5a;
  padding: 4px 12px;
  cursor: pointer;
  border-radius: 3px;
  font-family: inherit;
  font-size: 0.9em;
}
button:hover { background: #2a2a4a; border-color: #5a5a8a; }

.btn-primary {
  margin-top: auto;
  padding: 10px;
  background: #2a3a6a;
  border-color: #4a6aaa;
  color: #eee;
  font-size: 1em;
  letter-spacing: 2px;
}
.btn-primary:hover { background: #3a4a8a; }

input[type=number] {
  width: 48px;
  background: #1e1d2e;
  color: #ccc;
  border: 1px solid #3a3a5a;
  padding: 3px 6px;
  text-align: center;
  font-family: inherit;
  border-radius: 3px;
}

/* Config accordion */
.plate-section {
  border: 1px solid #2a2a3a;
  border-radius: 4px;
  overflow: hidden;
}
.plate-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: #1e1d2e;
  cursor: pointer;
  user-select: none;
  font-size: 0.88em;
}
.plate-header:hover { background: #252436; }
.plate-header .toggle { opacity: 0.5; width: 12px; }
.plate-body {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #161525;
}
.plate-body.collapsed { display: none; }

.pos-control { display: flex; align-items: center; gap: 6px; font-size: 0.85em; }
.pos-val { width: 24px; text-align: center; font-weight: bold; }

.dep-row { display: flex; align-items: center; gap: 5px; font-size: 0.82em; }
.dep-row select {
  background: #1e1d2e; color: #ccc;
  border: 1px solid #3a3a5a; border-radius: 3px;
  padding: 2px 4px; font-family: inherit; font-size: 1em;
}
.dep-row .btn-remove { padding: 2px 6px; opacity: 0.5; }
.dep-row .btn-remove:hover { opacity: 1; }
.btn-add-dep { font-size: 0.78em; opacity: 0.6; padding: 3px 8px; }
.btn-add-dep:hover { opacity: 1; }

/* Solve panel */
.solution-str {
  font-size: 0.82em;
  color: #aaa;
  line-height: 1.8;
  word-break: break-all;
  border: 1px solid #2a2a3a;
  padding: 8px;
  border-radius: 3px;
  background: #161525;
}
.solution-str .cur-step { color: #7af; font-weight: bold; }

.solution-list {
  list-style: none;
  font-size: 0.85em;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow-y: auto;
  max-height: 50vh;
  padding: 0;
}
.solution-list li {
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  color: #888;
}
.solution-list li.active {
  background: #2a3a6a;
  color: #eee;
}
.solution-list li:hover { background: #1e2a4a; }

.solve-buttons { display: flex; gap: 10px; }

.wasd-hint {
  font-size: 1.1em;
  letter-spacing: 3px;
  opacity: 0.3;
}
.wasd-label { font-size: 0.72em; opacity: 0.3; }

/* No-solution message */
.no-solution { color: #e55; font-size: 0.85em; text-align: center; padding: 20px; }

:root {
  --tilt: 52deg;          /* POV angle — tune this once visually */
  --plate-w: 220px;       /* plate width (X, where holes go) */
  --plate-t: 22px;        /* plate thickness (Y) */
  --plate-d: 48px;        /* plate local depth (top face depth) */
  --plate-gap: 72px;      /* Z spacing between plates — consumed by JS only */
  --hole-size: 15px;
  --hole-padding: 0.17;   /* unitless fraction — JS-only, not valid in calc() */
  --pin-w: 10px;
  --pin-h-up: 18px;
  --pin-h-dn: 6px;
}

.scene-wrap {
  position: relative;
  perspective: 900px;
  perspective-origin: 50% 35%;
}

.scene {
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(var(--tilt)) rotateZ(45deg);
  width: 280px;
  height: 180px;
}

.plate {
  position: absolute;
  width: var(--plate-w);
  height: var(--plate-t);
  left: 0; top: 0;
  transform-style: preserve-3d;
  transition: transform 0.25s ease;
}

.face {
  position: absolute;
  top: 0; left: 0;
}

/* Top face — lay flat (XZ plane), sits on top of the plate body */
.face.top {
  width: var(--plate-w);
  height: var(--plate-d);
  background: #2d4d80;
  border: 1px solid #4a70b0;
  transform-origin: 0 0;
  transform: rotateX(-90deg);
}

/* Front face — facing viewer */
.face.front {
  width: var(--plate-w);
  height: var(--plate-t);
  background: #1e3660;
  border: 1px solid #3a5a90;
}

/* Right face — rotateY(-90deg) maps +X → +Z so face extends into scene depth */
.face.right {
  width: var(--plate-d);
  height: var(--plate-t);
  background: #162850;
  border: 1px solid #2a4a7a;
  left: var(--plate-w);
  top: 0;
  transform-origin: left top;
  transform: rotateY(-90deg);
}

.plate.active .face.top   { border-color: #7aafff; background: #3a5d90; }
.plate.active .face.front { border-color: #5a8fd0; background: #2a4a78; }
.plate.active .face.right { border-color: #4a7fc0; background: #1e3868; }

.plate-num {
  position: absolute;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: #5a8ac0;
  pointer-events: none;
  transform: translateZ(0.5px);
}

.holes {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
}

.hole {
  width: var(--hole-size);
  height: var(--hole-size);
  border-radius: 50%;
  background: #0f1a30;
  border: 1px solid #2a3a60;
  flex-shrink: 0;
}

.hole.center-hole {
  border-color: #4a6a99;
  background: #0f1f3a;
}

.pin {
  position: absolute;
  width: var(--pin-w);
  height: var(--pin-h-dn);
  border-radius: 3px 3px 0 0;
  transition: height 0.2s ease, background 0.2s ease;
  /* left is always set by JS via pinLeft(); translateX(-50%) centers on that point */
  transform: translateX(-50%);
  bottom: 0;
}

.pin.lowered {
  height: var(--pin-h-dn);
  background: #3a4a6a;
}

.pin.raised {
  height: var(--pin-h-up);
  background: #7af080;
  box-shadow: 0 0 6px #7af08088;
}
  </style>
</head>

  <!-- STAGE: CONFIG -->
  <div id="stage-config" class="stage">
    <div class="panel panel-left">
      <h2>Настройки</h2>
      <div class="setting-row">
        <label>Плашки:</label>
        <button id="btn-plates-dec">−</button>
        <span id="val-plates">4</span>
        <button id="btn-plates-inc">+</button>
      </div>
      <div class="setting-row minor">
        <label>Позиции:</label>
        <input type="number" id="val-positions" value="7" min="3" step="2" max="15">
      </div>
      <div id="plates-config"></div>
      <button id="btn-start" class="btn-primary">СТАРТ</button>
    </div>
    <div class="panel panel-right">
      <div id="scene-config" class="scene-wrap">
        <div class="scene" id="scene-config-inner"></div>
      </div>
      <div class="wasd-hint">W ▲ &nbsp;&nbsp; A ◄ &nbsp; S ▼ &nbsp; D ►</div>

    <div class="panel panel-left">
      <h2>Решение</h2>
      <div id="solution-string" class="solution-str"></div>
      <ol id="solution-steps" class="solution-list"></ol>
      <div class="solve-buttons">
        <button id="btn-back">← Назад</button>
        <button id="btn-auto">▶ Авто</button>
      </div>
    </div>
    <div class="panel panel-right">
      <div id="scene-solve" class="scene-wrap">
        <div class="scene" id="scene-solve-inner"></div>
      </div>
      <div class="wasd-hint">W ▲ &nbsp;&nbsp; A ◄ &nbsp; S ▼ &nbsp; D ►</div>
      <div class="wasd-label">A — назад &nbsp;·&nbsp; D — вперёд по решению</div>
    </div>
  </div>

  <!-- Script #1 — State & constants -->
  <script>
// ── Script #1 — State & constants ─────────────────────────────────────────

const PLATE_W       = 220;   // px — must match --plate-w
const PLATE_T       = 22;    // px — must match --plate-t
const PLATE_D       = 48;    // px — must match --plate-d
const PLATE_GAP     = 72;    // px — must match --plate-gap
const HOLE_PADDING  = 0.17;  // fraction of PLATE_W on each side
const HOLE_SIZE     = 15;    // px — must match --hole-size
const PIN_W         = 10;    // px — must match --pin-w
const AUTO_DELAY    = 500;   // ms between auto-play steps

const DEFAULT_PLATE_COUNT = 4;
const DEFAULT_POSITIONS   = 7;

/** Center position index (1-based) for a given positions count */
function center(positions) {
  return Math.floor(positions / 2) + 1;
}

/**
 * Create a fresh plate object.
 * @param {number} id      1-based plate id (1 = front, N = back)
 * @param {number} positions  must be odd
 */
function makePlate(id, positions) {
  return {
    id,
    positions,
    currentPos: center(positions),
    deps: []  // [{targetId, direction: 'same'|'opposite', steps}]
  };
}

/** Global mutable state */
const state = {
  stage: 'config',          // 'config' | 'solve'
  plates: [],               // Plate[]
  activePlate: 1,           // id of currently selected plate
  history: [],              // move notation array (config stage)
  solution: [],             // compressed notation array (solve stage)
  solverStep: 0,            // current step index in solution
  autoInterval: null        // setInterval handle for auto-play
};
</script>
  <!-- Script #2 — Game logic -->
  <script>
// ── Script #2 — Game logic ────────────────────────────────────────────────

/**
 * Compute all plate deltas for a move. Returns null if blocked.
 * @param {object[]} plates
 * @param {number}   plateId   id of the plate the player moves
 * @param {'left'|'right'} dir
 * @returns {Array<{plateId, newPos}>|null}
 */
function computeMove(plates, plateId, dir) {
  const primaryDelta = dir === 'left' ? -1 : 1;
  const visited = new Set();
  const effects = [];   // {plate, delta}

  function collect(id, delta) {
    if (visited.has(id)) return;
    visited.add(id);
    const plate = plates.find(p => p.id === id);
    if (!plate) return;
    effects.push({ plate, delta });
    const sign = delta > 0 ? 1 : -1;
    for (const dep of plate.deps) {
      const depSign = dep.direction === 'same' ? sign : -sign;
      collect(dep.targetId, depSign * dep.steps);
    }
  }

  collect(plateId, primaryDelta);

  // Blocking check — all or nothing
  for (const { plate, delta } of effects) {
    const newPos = plate.currentPos + delta;
    if (newPos < 1 || newPos > plate.positions) return null;
  }

  return effects.map(({ plate, delta }) => ({
    plateId: plate.id,
    newPos: plate.currentPos + delta
  }));
}

/**
 * Apply a move in-place. Returns true if move was applied, false if blocked.
 */
function applyMove(plates, plateId, dir) {
  const effects = computeMove(plates, plateId, dir);
  if (!effects) return false;
  for (const { plateId: pid, newPos } of effects) {
    plates.find(p => p.id === pid).currentPos = newPos;
  }
  return true;
}

/** True when all plates are at their center position */
function isGoal(plates) {
  return plates.every(p => p.currentPos === center(p.positions));
}

/**
 * Convert a move to notation string.
 * steps > 1 only when compressing consecutive same-plate same-dir moves.
 */
function toNotation(plateId, dir, steps) {
  const d = dir === 'left' ? 'A' : 'D';
  return steps === 1 ? `${plateId}${d}` : `${plateId}${d}${steps}`;
}

/** Parse a notation string back to {plateId, dir, steps} */
function parseNotation(s) {
  const m = s.match(/^(\d+)([AD])(\d*)$/);
  if (!m) throw new Error(`Invalid notation: ${s}`);
  return {
    plateId: parseInt(m[1]),
    dir:     m[2] === 'A' ? 'left' : 'right',
    steps:   m[3] ? parseInt(m[3]) : 1
  };
}
</script>
  <!-- Script #3 — BFS solver -->
  <script>
// ── Script #3 — BFS Solver ────────────────────────────────────────────────

/**
 * Find shortest solution via BFS.
 * @param {object[]} plates  Plate objects with currentPos set to start state.
 * @returns {string[]|null}  Compressed notation array, or null if unsolvable.
 */
function bfsSolve(plates) {
  const startPos = plates.map(p => p.currentPos);
  const goalPos  = plates.map(p => center(p.positions));

  if (startPos.every((p, i) => p === goalPos[i])) return [];

  const startKey = startPos.join(',');
  const visited  = new Set([startKey]);
  const queue    = [{ positions: startPos, path: [] }];

  while (queue.length > 0) {
    const { positions, path } = queue.shift();

    // Build temp plates snapshot for computeMove
    const snap = plates.map((p, i) => ({ ...p, currentPos: positions[i] }));

    for (const plate of snap) {
      for (const dir of ['left', 'right']) {
        const effects = computeMove(snap, plate.id, dir);
        if (!effects) continue;

        const newPos = [...positions];
        for (const { plateId, newPos: np } of effects) {
          newPos[plateId - 1] = np;
        }

        const key = newPos.join(',');
        if (visited.has(key)) continue;
        visited.add(key);

        const newPath = [...path, toNotation(plate.id, dir, 1)];

        if (newPos.every((p, i) => p === goalPos[i])) {
          return compressPath(newPath);
        }

        queue.push({ positions: newPos, path: newPath });
      }
    }
  }

  return null; // no solution exists
}

/**
 * Compress consecutive same-plate same-direction moves into one notation entry.
 * ['1A','1A','2D','2D','2D'] → ['1A2','2D3']
 */
function compressPath(path) {
  if (!path.length) return path;
  const result = [];
  let cur = parseNotation(path[0]);
  let count = 1;
  for (let i = 1; i < path.length; i++) {
    const next = parseNotation(path[i]);
    if (next.plateId === cur.plateId && next.dir === cur.dir) {
      count++;
    } else {
      result.push(toNotation(cur.plateId, cur.dir, count));
      cur = next; count = 1;
    }
  }
  result.push(toNotation(cur.plateId, cur.dir, count));
  return result;
}
</script>
  <!-- Script #4 — Render -->
  <script>
// ── Script #4 — Render ────────────────────────────────────────────────────

/** Pixel offset per position step on a plate */
function holeStep(positions) {
  const usable = PLATE_W * (1 - 2 * HOLE_PADDING);
  return usable / (positions - 1);
}

/** X offset in px for a given currentPos (centered = 0 offset) */
function posToOffsetX(currentPos, positions) {
  return (currentPos - center(positions)) * holeStep(positions);
}

/**
 * Pin left value within .face.top to keep it visually fixed in scene space.
 * The pin is a child of .face.top which moves with the plate (translateX).
 * To counteract: pinLeft = PLATE_W/2 - offsetX.
 * CSS has transform:translateX(-50%) on .pin so the center sits exactly at pinLeft.
 * When currentPos=center: offsetX=0, pinLeft=PLATE_W/2 = center of plate ✓
 * When plate slides: offsetX≠0, compensation keeps pin at scene X=PLATE_W/2 ✓
 */
function pinLeft(currentPos, positions) {
  return PLATE_W / 2 - posToOffsetX(currentPos, positions);
}

/**
 * Build DOM for all plates inside a scene element. Clears existing content.
 * @param {string} sceneId   id of the .scene div
 * @param {object[]} plates
 */
function buildScene(sceneId, plates) {
  const scene = document.getElementById(sceneId);
  scene.innerHTML = '';

  // Plate 1 = front = lowest Z; plate N = back = highest Z
  for (const plate of plates) {
    const z = (plate.id - 1) * PLATE_GAP;
    const offsetX = posToOffsetX(plate.currentPos, plate.positions);
    const isRaised = plate.currentPos === center(plate.positions);

    // Build hole HTML
    const padding = PLATE_W * HOLE_PADDING;
    const step = holeStep(plate.positions);
    const holesHTML = Array.from({ length: plate.positions }, (_, i) => {
      const isCenter = (i + 1) === center(plate.positions);
      return `<div class="hole${isCenter ? ' center-hole' : ''}"
                   style="position:absolute;
                          left:${padding + i * step - HOLE_SIZE / 2}px;
                          top:50%;
                          transform:translateY(-50%)"></div>`;
    }).join('');

    const el = document.createElement('div');
    el.className = 'plate';
    el.dataset.id = plate.id;
    el.style.transform = `translateZ(${z}px) translateX(${offsetX}px)`;
    el.innerHTML = `
      <div class="face top" style="position:relative">
        ${holesHTML}
        <div class="pin ${isRaised ? 'raised' : 'lowered'}"
             style="left:${pinLeft(plate.currentPos, plate.positions)}px"></div>
      </div>
      <div class="face front"></div>
      <div class="face right"><span class="plate-num">${plate.id}</span></div>
    `;
    scene.appendChild(el);
  }
}

/**
 * Update existing plate DOM to reflect current state (no full rebuild).
 * @param {string} sceneId
 * @param {object[]} plates
 * @param {number} activePlateId
 */
function updateScene(sceneId, plates, activePlateId) {
  for (const plate of plates) {
    const el = document.querySelector(`#${sceneId} .plate[data-id="${plate.id}"]`);
    if (!el) continue;

    const z = (plate.id - 1) * PLATE_GAP;
    const offsetX = posToOffsetX(plate.currentPos, plate.positions);
    el.style.transform = `translateZ(${z}px) translateX(${offsetX}px)`;

    const isRaised = plate.currentPos === center(plate.positions);
    const pin = el.querySelector('.pin');
    pin.className = `pin ${isRaised ? 'raised' : 'lowered'}`;
    // Keep pin visually fixed in scene space as plate moves
    pin.style.left = `${pinLeft(plate.currentPos, plate.positions)}px`;

    el.classList.toggle('active', plate.id === activePlateId);
  }
}
  </script>
  <!-- Script #5 — Config UI -->
  <script>
// ── Script #5 — Config UI ─────────────────────────────────────────────────

function getPositions() {
  const v = parseInt(document.getElementById('val-positions').value);
  return (v >= 3 && v % 2 === 1) ? v : DEFAULT_POSITIONS;
}

function getPlateCount() {
  return parseInt(document.getElementById('val-plates').textContent);
}

/** Re-render the plates accordion and rebuild the scene */
function rebuildConfig() {
  const count = getPlateCount();
  const positions = getPositions();

  // Preserve existing plate positions and deps where possible
  const existing = state.plates;
  state.plates = Array.from({ length: count }, (_, i) => {
    const id = i + 1;
    const old = existing.find(p => p.id === id);
    const plate = makePlate(id, positions);
    if (old) {
      plate.currentPos = Math.min(Math.max(old.currentPos, 1), positions);
      // Keep deps that still reference valid plate ids
      plate.deps = old.deps.filter(d => d.targetId !== id && d.targetId <= count);
    }
    return plate;
  });
  state.activePlate = 1;

  renderAccordion();
  buildScene('scene-config-inner', state.plates);
  updateScene('scene-config-inner', state.plates, state.activePlate);
}

function renderAccordion() {
  const container = document.getElementById('plates-config');
  container.innerHTML = '';
  for (const plate of state.plates) {
    container.appendChild(buildPlateSection(plate));
  }
}

function buildPlateSection(plate) {
  const section = document.createElement('div');
  section.className = 'plate-section';
  section.dataset.id = plate.id;

  const header = document.createElement('div');
  header.className = 'plate-header';
  header.innerHTML = `
    <span class="toggle">▼</span>
    <span>Плашка ${plate.id}</span>
    <span style="margin-left:auto;opacity:0.4;font-size:0.85em">pos: ${plate.currentPos}</span>
  `;

  const body = document.createElement('div');
  body.className = 'plate-body';

  // Position control
  const posRow = document.createElement('div');
  posRow.className = 'pos-control';
  posRow.innerHTML = `
    <span>Позиция:</span>
    <button class="btn-pos-dec" data-id="${plate.id}">◄</button>
    <span class="pos-val" data-id="${plate.id}">${plate.currentPos}</span>
    <button class="btn-pos-inc" data-id="${plate.id}">►</button>
  `;
  body.appendChild(posRow);

  // Deps list
  const depsList = document.createElement('div');
  depsList.className = 'deps-list';
  depsList.dataset.id = plate.id;
  for (const dep of plate.deps) {
    depsList.appendChild(buildDepRow(plate.id, dep));
  }
  body.appendChild(depsList);

  // Add dep button
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-dep';
  addBtn.textContent = '+ связь';
  addBtn.dataset.id = plate.id;
  body.appendChild(addBtn);

  header.addEventListener('click', () => {
    const collapsed = body.classList.toggle('collapsed');
    header.querySelector('.toggle').textContent = collapsed ? '►' : '▼';
  });

  section.appendChild(header);
  section.appendChild(body);
  return section;
}

function buildDepRow(plateId, dep) {
  const row = document.createElement('div');
  row.className = 'dep-row';

  // Target plate selector (exclude self)
  const targetSel = document.createElement('select');
  targetSel.className = 'dep-target';
  for (const p of state.plates) {
    if (p.id === plateId) continue;
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `П${p.id}`;
    opt.selected = p.id === dep.targetId;
    targetSel.appendChild(opt);
  }

  const dirSel = document.createElement('select');
  dirSel.className = 'dep-dir';
  [['same','↔ то же'],['opposite','↕ обрат.']].forEach(([val, label]) => {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = label;
    opt.selected = dep.direction === val;
    dirSel.appendChild(opt);
  });

  const stepsInput = document.createElement('input');
  stepsInput.type = 'number'; stepsInput.min = 1; stepsInput.max = 6;
  stepsInput.value = dep.steps; stepsInput.style.cssText = 'width:36px;font-size:0.85em';

  const removeBtn = document.createElement('button');
  removeBtn.className = 'btn-remove'; removeBtn.textContent = '×';

  row.append(targetSel, dirSel, stepsInput, removeBtn);

  // Sync changes back to state
  function syncDep() {
    dep.targetId  = parseInt(targetSel.value);
    dep.direction = dirSel.value;
    dep.steps     = parseInt(stepsInput.value) || 1;
  }
  targetSel.addEventListener('change', syncDep);
  dirSel.addEventListener('change', syncDep);
  stepsInput.addEventListener('change', syncDep);

  removeBtn.addEventListener('click', () => {
    const plate = state.plates.find(p => p.id === plateId);
    plate.deps = plate.deps.filter(d => d !== dep);
    row.remove();
  });

  return row;
}

function wireConfigHandlers() {
  document.getElementById('btn-plates-dec').addEventListener('click', () => {
    const cur = getPlateCount();
    if (cur <= 2) return;
    document.getElementById('val-plates').textContent = cur - 1;
    rebuildConfig();
  });

  document.getElementById('btn-plates-inc').addEventListener('click', () => {
    const cur = getPlateCount();
    document.getElementById('val-plates').textContent = cur + 1;
    rebuildConfig();
  });

  document.getElementById('val-positions').addEventListener('change', (e) => {
    let v = parseInt(e.target.value);
    if (v < 3) v = 3;
    if (v % 2 === 0) v += 1;
    e.target.value = v;
    rebuildConfig();
  });

  // Delegated: position +/- buttons and add-dep
  document.getElementById('plates-config').addEventListener('click', (e) => {
    const id = parseInt(e.target.dataset.id);
    if (!id) return;
    const plate = state.plates.find(p => p.id === id);

    if (e.target.classList.contains('btn-pos-dec')) {
      if (plate.currentPos > 1) plate.currentPos--;
      document.querySelector(`.pos-val[data-id="${id}"]`).textContent = plate.currentPos;
      document.querySelector(`.plate-section[data-id="${id}"] .plate-header span:last-child`)
        .textContent = `pos: ${plate.currentPos}`;
      updateScene('scene-config-inner', state.plates, state.activePlate);
    }

    if (e.target.classList.contains('btn-pos-inc')) {
      if (plate.currentPos < plate.positions) plate.currentPos++;
      document.querySelector(`.pos-val[data-id="${id}"]`).textContent = plate.currentPos;
      document.querySelector(`.plate-section[data-id="${id}"] .plate-header span:last-child`)
        .textContent = `pos: ${plate.currentPos}`;
      updateScene('scene-config-inner', state.plates, state.activePlate);
    }

    if (e.target.classList.contains('btn-add-dep')) {
      if (!plate) return;
      // Default: first other plate, same direction
      const others = state.plates.filter(p => p.id !== id);
      if (!others.length) return;
      const dep = { targetId: others[0].id, direction: 'same', steps: 1 };
      plate.deps.push(dep);
      const depsList = document.querySelector(`.deps-list[data-id="${id}"]`);
      depsList.appendChild(buildDepRow(id, dep));
    }
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    const sol = bfsSolve(state.plates);
    if (sol === null) {
      alert('Решение не найдено.');
      return;
    }
    state.solution = sol;
    state.solverStep = 0;
    state.history = [];
    switchToSolve();
  });
}
