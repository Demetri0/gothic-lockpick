  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  height: 100dvh;
  overflow: hidden;
}

.stage { display: flex; flex-wrap: wrap; height: 100dvh; overflow: hidden; }
.hidden { display: none; }

.panel { padding: 24px; }
.panel-left {
  width: var(--panel-w);
  min-width: 280px;
  height: 100dvh;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  container-type: inline-size;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: hidden;
}
.panel-right {
  flex: 1;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
/* scene takes all free space, centering the plates; legend sinks to the bottom */
.scene-wrap {
  flex: 1;
  width: 100%;
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.dep-short { display: none; }
.dep-icon { display: block; }
@container (max-width: 360px) {
  .dep-full { display: none; }
  .dep-short { display: inline-flex; align-items: center; justify-content: center; }
}

h2 { font-size: 0.85em; letter-spacing: 3px; text-transform: uppercase;
     color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 10px;
     display: flex; align-items: center; justify-content: space-between; }
h2 .btn-icon {
  letter-spacing: 0; text-transform: none; font-size: 1.1em;
  color: var(--text-muted); border: 1px solid transparent; border-radius: 4px;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
h2 .btn-icon:hover { color: var(--text); border-color: var(--border-control); }
h2 .btn-icon.active {
  color: var(--accent); border-color: var(--border-strong); background: var(--bg-accent);
}
h2 .btn-icon:disabled { color: var(--border); border-color: transparent; cursor: default; }

.setting-row { display: flex; align-items: center; gap: 8px; width: 100%; flex-wrap: nowrap; }
.setting-row.minor { opacity: 0.55; font-size: 0.82em; }
.setting-row label { white-space: nowrap; }
.ctrl-difficulty, .ctrl-io {
  display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; white-space: nowrap;
}
.ctrl-search { flex: 0 1 auto; min-width: 0; }
/* Search trigger styled like a clickable search field, with a keyboard-shortcut hint. */
.search-box {
  display: inline-flex; align-items: center; gap: 6px; width: 100%;
  min-width: 0; max-width: 260px;
  padding: 5px 8px; font: inherit; font-size: 0.85em;
  color: var(--text-dim); text-align: left; cursor: pointer;
  background: var(--bg-control);
  border: 1px solid var(--border); border-radius: 4px;
}
.search-box:hover:not(:disabled) { border-color: var(--border-strong); color: var(--text); }
.search-box:disabled { opacity: 0.5; cursor: default; }
.search-box-icon { flex-shrink: 0; }
.search-box-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-box kbd {
  flex-shrink: 0;
  padding: 1px 5px; font-size: 0.85em; line-height: 1.4;
  border: 1px solid var(--border); border-radius: 3px;
  background: var(--bg-inset);
}
/* Disabled buttons don't fire hover events in Chromium, so their title tooltip never
   shows — wrap in a (non-disabled) span and put the title there instead when disabled. */
.btn-tooltip-wrap { display: inline-flex; }
@container (max-width: 600px) { .ctrl-positions  { display: none; } }
@container (max-width: 420px) { .ctrl-difficulty { display: none; } }
@container (max-width: 270px) { .ctrl-io { display: none; } }
.btn-icon {
  width: 28px; height: 28px; padding: 0;
  font-size: 1em; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-difficulty {
  width: 18px; height: 18px; border-radius: 50%;
  padding: 0; flex-shrink: 0;
  border: 2px solid transparent; background-clip: padding-box;
}
.btn-difficulty[data-min="7"]  { background: #3d8a3d; border-color: #5cb85c; }
.btn-difficulty[data-min="14"] { background: #8a7010; border-color: #c8a020; }
.btn-difficulty[data-min="21"] { background: #8a2a2a; border-color: #c04040; }
.btn-difficulty:hover { filter: brightness(1.35); }

button {
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border-control);
  padding: 4px 12px;
  cursor: pointer;
  border-radius: 3px;
  font-family: inherit;
  font-size: 0.9em;
}
button:hover { background: var(--bg-hover); border-color: var(--border-strong); }

.btn-primary {
  margin-top: auto;
  padding: 10px;
  background: var(--bg-accent);
  border-color: var(--border-strong);
  color: var(--text-bright);
  font-size: 1em;
  letter-spacing: 2px;
}
.btn-primary:hover { background: var(--bg-accent-hover); }

input[type=number] {
  width: 48px;
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border-control);
  padding: 3px 6px;
  text-align: center;
  font-family: inherit;
  border-radius: 3px;
}

/* Config matrix */
#plates-positions {
  display: flex; justify-content: center;
  padding: 10px 4px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-panel);
}
/* Combination-lock: edge ghost controls + a core of per-plate columns (+ / digit / −). */
.poslock {
  --cell-max: 2.6rem;
  /* Plate width = available width ÷ (N plates + ghosts), capped at --cell-max. Ghosts are
     full-cell columns just like plates. --ghosts = edge controls shown (0–2). 100cqw = panel
     content width; −12px ≈ #plates-positions padding + border, the only reserved margin. */
  --cell: clamp(1.4rem, calc((100cqw - 12px) / (var(--n) + var(--ghosts, 0))), var(--cell-max));
  display: flex; align-items: stretch; justify-content: center;
}
.poslock-core {
  width: calc(var(--n) * var(--cell));
}
/* One self-contained column per plate ( + / digit / − ), laid out in a row. The plate's
   own border IS the outline; the active plate brightens it — no separate frame layer. */
.poslock-plates {
  display: grid;
  grid-template-columns: repeat(var(--n), var(--cell));
}
.poslock-plate {
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 0;                          /* match the buttons' horizontal inset */
  border: 2px solid var(--border); border-radius: 6px;
  transition: border-color 0.12s ease, background 0.12s ease;
}
.poslock-plate.active {
  border-color: var(--border-strong);
  background: var(--bg-accent);
}
.poslock-plate button {
  width: calc(var(--cell) - 8px); height: 1.7rem;
  padding: 0; font-size: 1.1rem; line-height: 1;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-control); color: var(--text); cursor: pointer;
}
.poslock-plate button:hover:not(:disabled) { border-color: var(--border-strong); }
.poslock-plate button:disabled { opacity: 0.3; cursor: default; }
.poslock-plate .btn-pos-inc { margin-bottom: 4px; }
.poslock-plate .btn-pos-dec { margin-top: 4px; }
/* One input per plate — each digit centred in its own column, no letter-spacing tricks. */
.poslock-digit {
  width: 100%; height: var(--cell); line-height: var(--cell);
  box-sizing: border-box; padding: 0;
  font-family: 'Courier New', monospace; font-size: calc(var(--cell) * 0.65); font-weight: 700;
  text-align: center; color: var(--text);
  background: transparent;
  border: 1px solid transparent; border-radius: 4px;
  caret-color: transparent;               /* the active plate shows position, not the caret */
}
.poslock-digit:focus { outline: none; }
/* The cell auto-selects its char on focus (so a keystroke replaces it) — hide that highlight. */
.poslock-digit::selection { background: transparent; }
.poslock-digit::-moz-selection { background: transparent; }
/* Edge ghost controls (dashed): − removes the last plate, + appends / accepts typing. */
.poslock-ghost {
  align-self: stretch; box-sizing: border-box;
  width: var(--cell);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace; font-size: calc(var(--cell) * 0.6);
  text-align: center; line-height: 1;
  border: 2px dashed var(--border); border-radius: 6px;
  background: transparent; color: var(--text-dim);
  opacity: 0.55; cursor: pointer;
}
.poslock-ghost:hover  { opacity: 1; border-color: var(--border-strong); }
.poslock-ghost:focus  { outline: none; opacity: 1; border-color: var(--border-strong); }
.poslock-ghost::placeholder { color: var(--text-dim); opacity: 1; }
.matrix-wrap {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  border: 1px solid var(--border); border-radius: 4px;
  overflow: hidden;
}
#plates-matrix {
  flex: 1; min-height: 0; overflow: auto;
  container-type: inline-size;
}
#plates-matrix table { border-collapse: collapse; width: 100%; table-layout: fixed; }
#plates-matrix th, #plates-matrix td { border: 1px solid var(--border); }
.matrix-corner { background: var(--bg-inset); width: 28px; }
.matrix-col-header {
  background: var(--bg-control); color: var(--text-dim);
  font-weight: normal; font-size: 0.8em; letter-spacing: 1px;
  padding: 5px 6px; white-space: nowrap; text-align: center;
}
.matrix-row-header {
  background: var(--bg-control); color: var(--text-dim);
  font-weight: normal; font-size: 0.8em;
  padding: 2px 8px; text-align: center; white-space: nowrap; width: 1px;
}
.matrix-diag {
  background: repeating-linear-gradient(
    -45deg,
    var(--bg-inset),
    var(--bg-inset) 4px,
    var(--border) 4px,
    var(--border) 6px
  );
}
.dep-cell {
  display: block; width: 100%; height: 32px;
  padding: 0;   /* override global button { padding: 4px 12px } so text isn't pushed off-centre */
  border: 1px solid transparent; border-radius: 0;
  cursor: pointer; font-size: 0.78em; font-family: inherit;
}
.dep-cell[data-state="none"]     { background: var(--bg-inset); color: #555; }
.dep-cell[data-state="none"]:hover { background: var(--bg-hover); }
.dep-cell[data-state="same"]     { background: #1c2e1e; border-color: #456845; color: #78b078; }
.dep-cell[data-state="same"]:hover { background: #233823; }
.dep-cell[data-state="opposite"] { background: #2e1c1c; border-color: #684545; color: #b07878; }
.dep-cell[data-state="opposite"]:hover { background: #382323; }

.matrix-hint {
  font-size: 0.78em;
  color: var(--text-muted);
  text-align: center;
  padding: 6px 8px;
  line-height: 1.5;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.matrix-hint kbd {
  font-family: inherit;
  font-size: 0.9em;
  background: var(--bg-inset);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
}
.matrix-hint code {
  font-family: monospace;
  color: var(--text-soft);
  white-space: nowrap;
}

/* Solve panel */
.notation-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1px solid #666;
  background: none;
  color: #888;
  font-size: 0.55em;
  letter-spacing: 0;
  text-transform: none;
  cursor: pointer;
  margin-left: 7px;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
  vertical-align: middle;
}
.notation-btn:hover { border-color: var(--accent); color: var(--accent); }
#notation-dialog {
  position: fixed;
  inset: 0;
  margin: auto;
  height: fit-content;
  background: var(--bg-panel);
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  padding: 20px 24px;
  min-width: 300px;
  max-width: 420px;
  outline: none;
}
#notation-dialog::backdrop { background: rgba(14, 12, 9, 0.65); }
#notation-dialog h3 {
  font-size: 0.78em;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  margin-bottom: 16px;
}
.nd-format { margin-bottom: 14px; font-size: 0.88em; }
.nd-format code { color: var(--accent); font-size: 1.1em; }
.nd-table { font-size: 0.85em; margin-bottom: 14px; border-collapse: collapse; }
.nd-table td { padding: 2px 8px 2px 0; }
.nd-table td:first-child code { color: var(--accent); min-width: 3em; display: inline-block; }
.nd-table td:last-child { color: var(--text-soft); }
.nd-dl {
  font-size: 0.82em;
  margin: 0 0 20px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 12px;
}
.nd-dl dt { color: var(--accent); }
.nd-dl dd { color: var(--text-soft); margin: 0; }

/* No padding/border on the dialog itself — .search-dialog-inner covers its entire content
   box, so a click landing on the dialog element (not a descendant) can only be the backdrop. */
#search-dialog {
  position: fixed;
  inset: 0;
  margin: auto;
  height: fit-content;
  max-height: 80vh;
  background: none;
  border: none;
  padding: 0;
  min-width: 320px;
  max-width: 640px;
  width: 90vw;
  outline: none;
}
#search-dialog[open] { display: block; }
#search-dialog::backdrop { background: rgba(14, 12, 9, 0.65); }
.search-dialog-inner {
  display: flex;
  flex-direction: column;
  background: var(--bg-panel);
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  padding: 20px 24px;
  max-height: 80vh;
}
.search-dialog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  margin-bottom: 14px;
}
.search-dialog-header h3 {
  font-size: 0.78em;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.dialog-close-x {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-muted);
  font-size: 0.75em;
  cursor: pointer;
  padding: 0;
  line-height: 1;
}
.dialog-close-x:hover { border-color: var(--accent); color: var(--accent); }
#search-input {
  width: 100%;
  background: var(--bg-inset);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 0.95em;
  padding: 8px 10px;
  border-radius: 3px;
  margin-bottom: 12px;
}
#search-input:focus { outline: none; border-color: var(--accent); }
#search-results {
  overflow-y: auto;
  max-height: 50vh;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.search-empty {
  color: var(--text-muted);
  font-size: 0.85em;
  text-align: center;
  padding: 20px 0;
}
.search-result {
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px;
  background: var(--bg-inset);
  cursor: pointer;
}
.search-result:hover { border-color: var(--text-dim); }
.search-result.selected { border-color: var(--accent); box-shadow: 0 0 4px rgba(232, 200, 122, 0.3); }
.sr-image {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: 3px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.sr-image img { width: 100%; height: 100%; object-fit: cover; }
.sr-image-placeholder { font-size: 1.3em; opacity: 0.35; }
.sr-info { flex: 1; min-width: 0; }
.sr-name { font-size: 0.85em; color: var(--text); }
.sr-tags { font-size: 0.72em; color: var(--text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sr-preview { flex-shrink: 0; display: flex; flex-direction: column; gap: 2px; }
.sr-plate { display: flex; gap: 2px; }
.sr-hole {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--hole);
  border: 1px solid var(--hole-edge);
}
.sr-hole.active { background: var(--accent); border-color: var(--accent); }

/* Live position hints (config stage) — DB chests matching current disc positions */
.chest-hints { margin: 6px 0 2px; container-type: inline-size; }
/* Count follows the container's (the config panel's) width, not the viewport:
   the panel is only ~half the viewport on desktop, so keying off viewport is wrong. */
@container (max-width: 560px) { .chest-hints-row .chest-hint:nth-child(n+3) { display: none; } } /* ≤560px → at most 2 */
@container (max-width: 380px) { .chest-hints-row .chest-hint:nth-child(n+2) { display: none; } } /* ≤380px → a single hint */
.chest-hints-label { font-size: 0.72em; color: var(--text-muted); margin-bottom: 4px; }
.chest-hints-row { display: flex; gap: 6px; align-items: stretch; }
.chest-hint {
  flex: 1 1 0;
  min-width: 0;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 6px;
  background: var(--bg-inset);
  cursor: pointer;
  font: inherit;
  color: var(--text);
  text-align: left;
}
.chest-hint:hover { border-color: var(--accent); box-shadow: 0 0 4px rgba(232, 200, 122, 0.3); }
.chest-hint .sr-hole.match { background: #5cb85c; border-color: #5cb85c; }
.chest-hint-info { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.chest-hint .sr-preview { flex-shrink: 0; }
.chest-hint-name { font-size: 0.8em; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chest-hint-tags { font-size: 0.68em; color: var(--text-muted); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chest-hint-rules { font-size: 0.66em; font-family: ui-monospace, monospace; color: var(--text-dim); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
.chest-hint-rules .dep-tok[data-rel="match"]    { color: #5cb85c; }
.chest-hint-rules .dep-tok[data-rel="conflict"] { color: #d86a6a; }

.solution-wrap {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  border: 1px solid var(--border);
  padding: 8px;
  border-radius: 3px;
  background: var(--bg-inset);
}
.solution-wrap .solution-str { flex: 1; border: none; padding: 0; border-radius: 0; background: none; }
.btn-copy-solution {
  flex-shrink: 0;
  background: none;
  border: 1px solid transparent;
  border-radius: 3px;
  color: var(--text-muted);
  font-size: 0.8em;
  padding: 4px 2px;
  cursor: pointer;
  line-height: 1;
  transition: border-color 0.15s, color 0.15s;
}
.btn-copy-solution:hover { border-color: var(--border-control); color: var(--text); }
.solution-str {
  font-size: 0.82em;
  color: var(--text-soft);
  line-height: 1.8;
  word-break: break-all;
  border: 1px solid var(--border);
  padding: 8px;
  border-radius: 3px;
  background: var(--bg-inset);
}
.solution-str .cur-step { color: var(--accent); font-weight: bold; }


.btn-step-nav { display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
.btn-chevron { display: block; flex: none; }
.solution-list {
  list-style: none;
  counter-reset: step;
  font-size: 0.85em;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  padding: 0;
}
.solution-list li:not(.endpoint):not(.explore-separator) { counter-increment: step; }
.solution-list li:not(.endpoint):not(.explore-separator)::before {
  content: counter(step) ". ";
  color: var(--border-control);
}
.solution-list .explore-separator { counter-reset: step; }
.solution-list li {
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  color: var(--text-muted);
}
.solution-list li.active {
  background: var(--bg-accent);
  color: var(--text-bright);
}
.solution-list li:hover { background: var(--bg-hover); }
.solution-list li.endpoint {
  color: var(--text-muted);
  font-size: 0.9em;
  cursor: pointer;
}
.solution-list li.endpoint.active { background: var(--bg-inset); color: var(--text-soft); }
.solution-list li.step-card { display: flex; align-items: center; gap: 8px; }
.step-plate { min-width: 5.2em; color: var(--text); font-family: system-ui, sans-serif; }
.step-dir {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 7px; border: 1px solid; border-radius: 10px;
  font-size: 0.92em; white-space: nowrap;
  font-family: system-ui, sans-serif;
}
.step-dir svg { display: block; }
.step-dir[data-dir="right"] { color: #78b078; border-color: #456845; background: #1c2e1e; }
.step-dir[data-dir="left"]  { color: #b07878; border-color: #684545; background: #2e1c1c; }
.step-notation {
  margin-left: auto;
  font-family: 'Courier New', monospace; font-size: 0.92em;
  color: var(--text-soft); background: var(--bg-inset);
  border: 1px solid var(--border-control); border-radius: 3px; padding: 1px 6px;
}
.explore-separator {
  list-style: none;
  padding: 3px 8px;
  font-size: 0.78em;
  opacity: 0.5;
  text-align: center;
  border-top: 1px dashed var(--border);
  margin: 2px 0;
  pointer-events: none;
}
.explore-separator--btn {
  pointer-events: auto;
  cursor: pointer;
  opacity: 0.6;
}
.explore-separator--btn:hover { opacity: 1; background: var(--bg-hover); }

button:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

@keyframes plate-shake {
  0%, 100% { translate: 0px 0; }
  15%  { translate: -6px 0; }
  35%  { translate:  6px 0; }
  55%  { translate: -4px 0; }
  75%  { translate:  4px 0; }
  90%  { translate: -2px 0; }
}
.plate-blocked { animation: plate-shake 0.25s ease; }
.plate-blocked .face { filter: saturate(4) hue-rotate(300deg) brightness(1.25); }

/* Computing overlay */
#computing-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(14, 12, 9, 0.72);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
}
#computing-overlay.active { display: flex; }
#overlay-progress {
  color: var(--text-muted);
  font-size: 0.78em;
  letter-spacing: 1px;
  min-height: 1.2em;
  text-align: center;
}
#progress-total {
  font-size: 1.1rem;
  text-align: center;
}
#progress-threads {
  display: flex; flex-direction: column; gap: 2px; margin-top: 10px;
  opacity: 0.7; align-items: center;
}
.progress-thread-row {
  display: flex; align-items: baseline; white-space: nowrap; gap: 0 6px;
  font-family: ui-monospace, 'Cascadia Code', monospace;
  font-size: 0.9rem;
  font-variant-numeric: tabular-nums; letter-spacing: 0;
}
.pt-branch { opacity: 0.45; }
.pt-id     { width: 2.5ch; flex-shrink: 0; }
.pt-att    { width: 3ch; flex-shrink: 0; text-align: right; overflow: hidden; }
.pt-iters  { width: 11ch; flex-shrink: 0; text-align: right; overflow: hidden; }
#computing-overlay .btn-cancel {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
  font-size: 0.78em;
  letter-spacing: 1px;
  padding: 4px 18px;
}
#computing-overlay .btn-cancel:hover {
  background: var(--bg-control);
  border-color: var(--border-strong);
  color: var(--text);
}
.spinner {
  width: 44px;
  height: 44px;
  border: 3px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Import confirmation dialog */
#import-dialog {
  position: fixed;
  inset: 0;
  margin: auto;
  height: fit-content;
  background: var(--bg-panel);
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  padding: 20px 24px;
  min-width: 260px;
  outline: none;
}
#import-dialog::backdrop { background: rgba(14, 12, 9, 0.65); }
#import-dialog h3 {
  font-size: 0.78em;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  margin-bottom: 14px;
}
#import-dialog p { font-size: 0.88em; color: var(--text-soft); margin-bottom: 20px; }
.dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; }
.dialog-buttons .btn-primary { margin-top: 0; padding: 6px 16px; }

/* Toast notifications */
#toast-container {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 9px 14px;
  border-radius: 3px;
  font-size: 0.82em;
  letter-spacing: 0.5px;
  border: 1px solid;
  opacity: 0;
  transform: translateX(12px);
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.toast.visible { opacity: 1; transform: translateX(0); }
.toast-success { background: var(--bg-accent); border-color: var(--accent); color: var(--accent); }
.toast-error   { background: #1a0f0f;           border-color: #7a3030;      color: #c07070; }

.solve-buttons { display: flex; gap: 10px; margin-top: auto; }
.solve-buttons .btn-primary { flex: 1; margin-top: 0; }
.solve-buttons .btn-return { margin-right: 14px; }

/* Four buttons in one row get too cramped for longer translations (e.g. uk "Повернутись")
   on phone-width screens — step controls take the first row, Back drops to its own row
   below (order, not DOM position, so tab order among the controls stays unchanged). */
@media (max-width: 480px) {
  .solve-buttons { flex-wrap: wrap; }
  .solve-buttons .btn-return { flex: 1 1 100%; margin-right: 0; order: 1; margin-top: 6px; }
}

/* Game-style key legend, pinned to the bottom of the right panel */
.legend {
  display: flex;
  flex-direction: column;
  gap: 16px;
  font-size: 1.2em;
  color: var(--legend-text);
  margin-bottom: 10px;
}
.legend-row { display: flex; align-items: center; gap: 14px; }
.keys { display: inline-flex; border: 2px solid var(--keycap-border); }
.keys kbd {
  font-family: inherit;
  font-weight: bold;
  font-size: 0.85em;
  color: var(--legend-text);
  background: var(--keycap-bg);
  padding: 2px 10px;
  line-height: 1.4;
}
.keys kbd + kbd { border-left: 2px solid var(--keycap-border); }

/* No-solution message */
.no-solution { color: var(--danger); font-size: 0.85em; text-align: center; padding: 20px; }

:root {
  --tilt: -30deg;         /* наклон камеры вниз; отрицательный = смотрим сверху */
  --yaw: -35deg;          /* поворот вокруг вертикали; отрицательный = видна правая грань */
  --plate-w: 286px;       /* plate width (X, where holes go) */
  --plate-t: 180px;       /* plate height (Y) — «тост, стоящий вертикально» */
  --plate-d: 31px;        /* plate thickness (top face depth) */
  --plate-gap: 48px;      /* Z spacing between plates — consumed by JS only */
  --hole-size: 15px;
  --hole-padding: 0.17;   /* unitless fraction — JS-only, not valid in calc() */
  --pin-w: 10px;
  --pin-h-up: 18px;
  --pin-h-dn: 6px;
  --panel-w: 45vw;

  /* === COLOR PALETTE === */
  --bg:                  #0e0c09;
  --bg-panel:            #14110d;
  --bg-inset:            #110f0b;
  --bg-control:          #1a1612;
  --bg-hover:            #241f15;
  --bg-accent:           #3a2f1d;
  --bg-accent-hover:     #4a3c24;
  --border:              #2e2820;
  --border-control:      #5a4f3a;
  --border-strong:       #8a7a55;
  --text:                #d9c9a6;
  --text-bright:         #f0e4c8;
  --text-dim:            #a08e6a;
  --text-muted:          #8a7a5f;
  --text-soft:           #bfae8a;
  --accent:              #e8c87a;
  --danger:              #e55;
  --legend-text:         #e7d7b8;
  --keycap-border:       #cdbb96;
  --keycap-bg:           rgba(0, 0, 0, 0.35);
  --metal-top:           #b3b0a8;
  --metal-top-edge:      #d6d3c9;
  --metal-front:         #232019;
  --metal-front-edge:    #565045;
  --metal-side:          #6e6a60;
  --metal-side-edge:     #8d897e;
  --metal-top-active:    #c9c5ba;
  --metal-top-edge-active:   #f5e9c8;
  --metal-front-active:      #2e2a20;
  --metal-front-edge-active: #b9a874;
  --metal-side-active:       #7e7a6e;
  --metal-side-edge-active:  #c8b88a;
  --plate-num-color:     #26231d;
  --hole:                #14110b;
  --hole-edge:           #55514a;
  --hole-center:         #181408;
  --hole-center-edge:    #9a8a60;
  --pin-lowered:         #c8a050;
  --pin-raised:          #d4a843;
  --pin-glow:            #d4a84388;
}

.scene-wrap {
  position: relative;
  perspective: 900px;
  perspective-origin: 50% 35%;
}

.scene {
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(var(--tilt)) rotateY(var(--yaw));
  width: var(--plate-w);
  height: var(--plate-t);
  margin-left: calc(-1 * var(--scene-cx, 0px));
}

.plate {
  position: absolute;
  width: var(--plate-w);
  height: var(--plate-t);
  left: 0; top: 0;
  transform-style: preserve-3d;
  transition: transform 0.25s ease;
}

.face {
  position: absolute;
  top: 0; left: 0;
}

/* Top face — lay flat (XZ plane), sits on top of the plate body */
.face.top {
  width: var(--plate-w);
  height: var(--plate-d);
  background: var(--metal-top);
  border: 1px solid var(--metal-top-edge);
  transform-origin: 0 0;
  transform: rotateX(-90deg);
}

/* Front face — facing viewer */
.face.front {
  width: var(--plate-w);
  height: var(--plate-t);
  background: var(--metal-front);
  border: 1px solid var(--metal-front-edge);
}

/* Right face — rotateY(90deg) maps +X → −Z: face extends back into box depth,
   front side faces +X (наружу), so the plate number is not mirrored */
.face.right {
  width: var(--plate-d);
  height: var(--plate-t);
  background: var(--metal-side);
  border: 1px solid var(--metal-side-edge);
  left: var(--plate-w);
  top: 0;
  transform-origin: left top;
  transform: rotateY(90deg);
}

.plate.active .face.top   { border-color: var(--accent); background: var(--metal-top-active); }
.plate.active .face.front { border-color: var(--accent); background: var(--metal-front-active); box-shadow: 0 0 14px 3px rgba(232, 200, 122, 0.55); }
.plate.active .face.right { border-color: var(--accent); background: var(--metal-side-active); }

.plate-num {
  position: absolute;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  font-weight: bold;
  color: var(--plate-num-color);
  pointer-events: none;
  transform: translateZ(0.5px);
}

.holes {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
}

.hole {
  width: var(--hole-size);
  height: var(--hole-size);
  border-radius: 50%;
  background: var(--hole);
  border: 1px solid var(--hole-edge);
  flex-shrink: 0;
}

.hole.center-hole {
  border-color: var(--hole-center-edge);
  background: var(--hole-center);
}

.scene.holes-clickable .hole {
  cursor: pointer;
  transition: border-color 0.1s, box-shadow 0.1s;
}
.scene.holes-clickable .hole:hover {
  border-color: var(--accent);
  box-shadow: 0 0 4px var(--accent);
}
.scene.holes-clickable .hole.center-hole:hover {
  border-color: var(--accent);
}

/* Pin stands upright on the top face: anchored at the plate's top edge (bottom:100%),
   pushed to mid-depth of the plate by translateZ. Child of .plate, not .face.top —
   left is always set by JS via pinLeft(); translateX(-50%) centers on that point */
.pin {
  position: absolute;
  width: var(--pin-w);
  height: var(--pin-h-dn);
  border-radius: 3px 3px 0 0;
  transition: height 0.2s ease, background 0.2s ease;
  transform: translateX(-50%) translateZ(calc(var(--plate-d) / -2));
  bottom: 100%;
}

.pin.lowered {
  height: var(--pin-h-dn);
  background: var(--pin-lowered);
  box-shadow: none;
}

.pin.raised {
  height: var(--pin-h-up);
  background: var(--pin-raised);
  box-shadow: 0 0 7px var(--pin-glow);
}

.panel-right.panel-3d-off { display: none; }
.h2-actions { display: none; gap: 4px; }

#lang-selector {
  position: fixed; top: 6px; right: 10px; z-index: 200;
  display: flex; gap: 2px;
}
#lang-selector button {
  width: 28px; height: 22px; padding: 0; font-size: 15px; line-height: 22px;
  border: 1px solid transparent; border-radius: 3px; background: transparent; cursor: pointer;
  opacity: 0.35; transition: opacity 0.15s, border-color 0.15s;
}
#lang-selector button:hover  { opacity: 0.75; }
#lang-selector button.active { opacity: 1; border-color: var(--border-control); background: var(--bg-control); }

@media (max-width: 819px) {
  body         { height: auto; overflow: visible; }
  .stage       { height: auto; overflow: visible; }
  .panel       { padding: 8px; }          /* 24px is too much on a phone */
  #lang-selector { left: 10px; right: auto; }
  .panel-left  { width: 100%; height: auto; border-right: none; overflow: visible; }
  .matrix-wrap { flex: none; overflow: visible; }
  #plates-matrix { overflow: visible; }
  .panel-right {
    order: -1;
    width: 100%;
    height: 15dvh;
    min-height: 0;
    overflow: hidden;
    gap: 0;
  }
  .h2-actions  { display: flex; }
  .scene-wrap  { min-height: 0; flex: 1; transform: scale(0.5); transform-origin: bottom center; }
  .legend      { display: none; }
  .panel-right.panel-3d-expanded { height: 50dvh; }
  .panel-right.panel-3d-expanded .scene-wrap { transform: scale(0.75); transform-origin: center center; }

  /* solve stage: viewport-locked, only step list scrolls */
  #stage-solve                { height: 100dvh; overflow: hidden; flex-direction: column; flex-wrap: nowrap; }
  #stage-solve .panel-right   { height: auto; flex: 0 0 15dvh; }
  #stage-solve .panel-right.panel-3d-expanded { flex: 0 0 50dvh; }
  #stage-solve .panel-left   { flex: 1; min-height: 0; overflow: hidden; }
  #stage-solve #solution-steps { min-height: 0; }
}

  </style>
</head>
<body>

  <div id="lang-selector">
    <button data-lang="ru" data-test-id="lang-ru" title="Русский">🇷🇺</button>
    <button data-lang="uk" data-test-id="lang-uk" title="Українська">🇺🇦</button>
    <button data-lang="en" data-test-id="lang-en" title="English">🇬🇧</button>
  </div>

  <div id="toast-container" data-test-id="toast-container"></div>

  <dialog id="import-dialog" data-test-id="import-dialog">
    <h3 data-i18n="dialog-import-title">Импорт</h3>
    <p data-i18n="dialog-import-body">Применить конфигурацию из буфера обмена?</p>
    <div class="dialog-buttons">
      <button id="import-dialog-cancel" data-test-id="import-dialog-cancel" data-i18n="dialog-cancel">Отмена</button>
      <button id="import-dialog-ok" class="btn-primary" data-test-id="import-dialog-ok" data-i18n="dialog-ok">Применить</button>
    </div>
  </dialog>

  <dialog id="notation-dialog" data-test-id="notation-dialog">
    <div id="notation-dialog-body" data-test-id="notation-dialog-body"></div>
    <div class="dialog-buttons">
      <button id="btn-notation-close" class="btn-primary" data-test-id="btn-notation-close" data-i18n="dialog-cancel">Закрыть</button>
    </div>
  </dialog>

  <dialog id="search-dialog" data-test-id="search-dialog">
    <div id="search-dialog-inner" class="search-dialog-inner" data-test-id="search-dialog-inner">
      <div class="search-dialog-header">
        <h3 data-i18n="search-title" data-test-id="search-dialog-title">Поиск по базе</h3>
        <button id="btn-search-close" class="dialog-close-x" data-test-id="btn-search-close" data-i18n-title="dialog-cancel" title="Закрыть">✕</button>
      </div>
      <input type="text" id="search-input" data-test-id="search-input"
             data-i18n-placeholder="search-placeholder" placeholder="Название, тег или позиции...">
      <div id="search-results" data-test-id="search-results"></div>
      <div id="search-empty" class="search-empty hidden" data-test-id="search-empty" data-i18n="search-no-results">Ничего не найдено</div>
    </div>
  </dialog>

  <div id="computing-overlay" data-test-id="overlay">
    <div class="spinner"></div>
    <div id="overlay-progress">
      <div id="progress-total"></div>
      <div id="progress-threads"></div>
    </div>
    <button class="btn-cancel" data-test-id="btn-cancel" data-i18n="overlay-cancel">Отмена</button>
  </div>

  <!-- STAGE: CONFIG -->
  <div id="stage-config" class="stage" data-test-id="stage-config">
    <div class="panel panel-left">
      <h2><span data-i18n="config-title">Настройки</span><span class="h2-actions"><button id="btn-expand-3d-config" class="btn-icon" title="Развернуть 3D">↕</button><button id="btn-toggle-3d-config" class="btn-icon active" title="3D вид">⬡</button></span></h2>
      <div class="setting-row">
        <span id="btn-search-db-wrap" data-test-id="btn-search-db-wrap" class="btn-tooltip-wrap ctrl-search">
          <button id="btn-search-db" class="search-box" data-test-id="btn-search-db" disabled data-i18n-title="search-title" title="Поиск по базе (Ctrl+K)">
            <span class="search-box-icon">🔍</span>
            <span class="search-box-label" data-i18n="search-box">Поиск</span>
            <kbd>Ctrl K</kbd>
          </button>
        </span>
        <!-- plate count is driven by the position lock now; kept hidden as the count store -->
        <span id="val-plates" data-test-id="val-plates" hidden>4</span>

        <span style="flex:1"></span>
        <span class="ctrl-difficulty">
          <label data-i18n="label-random">Рандом:</label>
          <button class="btn-difficulty" data-min="7"  data-max="13"             data-test-id="btn-easy"   title="Лёгкий"></button>
          <button class="btn-difficulty" data-min="14" data-max="20" data-plates="5" data-test-id="btn-medium" title="Средний"></button>
          <button class="btn-difficulty" data-min="21"               data-plates="7" data-test-id="btn-hard"   title="Сложный"></button>
        </span>
        <span class="ctrl-io">
          <button id="btn-import" class="btn-icon" data-test-id="btn-import" data-i18n-title="import-title" title="Импорт">📥</button>
          <button id="btn-export" class="btn-icon" data-test-id="btn-export" data-i18n-title="export-title" title="Экспорт">📤</button>
        </span>
      </div>
      <div id="plates-positions" data-test-id="plates-positions"></div>
      <div id="chest-hints" class="chest-hints hidden" data-test-id="chest-hints"></div>
      <div class="matrix-wrap">
        <div id="plates-matrix" data-test-id="plates-matrix"></div>
        <p class="matrix-hint"><span data-i18n="hint-paste-pre">Есть конфиг?</span> <kbd>Ctrl+V</kbd> <span data-i18n="hint-paste-post">— поддерживается формат</span> <code>040615 A:B-,C+;D:E-</code></p>
      </div>
      <button id="btn-start" class="btn-primary" data-test-id="btn-start" data-i18n="btn-start">РЕШЕНИЕ</button>
    </div>
    <div class="panel panel-right">
      <div id="scene-config" class="scene-wrap">
        <div class="scene" id="scene-config-inner"></div>
      </div>
      <div class="legend">
        <div class="legend-row"><span class="keys"><kbd>A</kbd><kbd>D</kbd></span> <span data-i18n="legend-move">Смещение элемента</span></div>
        <div class="legend-row"><span class="keys"><kbd>W</kbd><kbd>S</kbd></span> <span data-i18n="legend-select">Выбор элемента</span></div>
      </div>
    </div>
  </div>

  <!-- STAGE: SOLVE -->
  <div id="stage-solve" class="stage hidden" data-test-id="stage-solve">
    <div class="panel panel-left">
      <h2><span style="display:inline-flex;align-items:center;gap:0"><span data-i18n="solve-title">Решение</span><button id="btn-notation-help" class="notation-btn" data-test-id="btn-notation-help">?</button></span><span class="h2-actions"><button id="btn-expand-3d-solve" class="btn-icon" title="Развернуть 3D">↕</button><button id="btn-toggle-3d-solve" class="btn-icon active" title="3D вид">⬡</button></span></h2>
      <div class="solution-wrap">
        <div id="solution-string" class="solution-str" data-test-id="solution-string"></div>
        <button id="btn-copy-solution" class="btn-copy-solution" data-test-id="btn-copy-solution" data-i18n-title="copy-solution" title="Копировать цепочку">📋</button>
      </div>
      <ol id="solution-steps" class="solution-list" data-test-id="solution-steps"></ol>

  <script id="solver-src">
// ── solver-src — Solver core (shared with the worker) ─────────────────────────

/** Center position index (1-based) for a given positions count */
function center(positions) {
  return Math.floor(positions / 2) + 1;
}

/**
 * Convert a move to notation string.
 * steps > 1 only when compressing consecutive same-plate same-dir moves.
 */
function toNotation(plateId, dir, steps) {
  const d = dir === 'left' ? 'A' : 'D';
  return steps === 1 ? `${plateId}${d}` : `${plateId}${d}${steps}`;
}

/** Parse a notation string back to {plateId, dir, steps} */
function parseNotation(s) {
  const m = s.match(/^(\d+)([AD])(\d*)$/);
  if (!m) throw new Error(`Invalid notation: ${s}`);
  return {
    plateId: parseInt(m[1]),
    dir:     m[2] === 'A' ? 'left' : 'right',
    steps:   m[3] ? parseInt(m[3]) : 1
  };
}

/**
 * Compute all plate deltas for a move. Returns null if blocked.
 * @param {object[]} plates
 * @param {number}   plateId   id of the plate the player moves
 * @param {'left'|'right'} dir
 * @returns {Array<{plateId, newPos}>|null}
 */
function computeMove(plates, plateId, dir) {
  const primaryDelta = dir === 'left' ? 1 : -1;
  const primary = plates.find(p => p.id === plateId);
  if (!primary) return null;

  const sign = primaryDelta > 0 ? 1 : -1;
  const effects = [{ plate: primary, delta: primaryDelta }];

  for (const dep of primary.deps) {
    const target = plates.find(p => p.id === dep.targetId);
    if (!target) continue;
    const depSign = dep.direction === 'same' ? sign : -sign;
    effects.push({ plate: target, delta: depSign * dep.steps });
  }

  // Blocking check — all or nothing
  for (const { plate, delta } of effects) {
    const newPos = plate.currentPos + delta;
    if (newPos < 1 || newPos > plate.positions) return null;
  }

  return effects.map(({ plate, delta }) => ({
    plateId: plate.id,
    newPos: plate.currentPos + delta
  }));
}

/**
 * The solver. Guarantees the minimal keypress count (BFS depth), and among
 * ALL minimal-move solutions picks one with the fewest switches between plates
 * — i.e. the shortest compressed step list a human has to follow.
 *
 * Three phases:
 *   1. BFS from the start → exact distance-from-start (distS) until the goal
 *      is discovered at depth L. BFS invariant: every level < L is fully
 *      discovered at that point, which is all the corridor needs (the only
 *      depth-L state on a shortest path is the goal itself).
 *   2. BFS back from the goal restricted to the shortest-path corridor
 *      (distS[v] === distS[u] − 1). Moves are reversible — the inverse deltas
 *      are legal exactly when the forward move was, both endpoints being in
 *      bounds — so expanding forward moves reaches all graph neighbors.
 *   3. Exact DP over the corridor, node = (state, last moved plate),
 *      minimizing plate switches. Tracking only the plate (not the direction)
 *      suffices: on a shortest path a plate can never move twice in a row in
 *      opposite directions — that would revisit the previous state.
 *
 * @returns {{solution: string[]|null, iters: number}} compressed notation or null
 */
function bfsSolveGrouped(plates, onProgress) {
  const startArr = plates.map(p => p.currentPos);
  const goalKey  = plates.map(p => center(p.positions)).join(',');
  const startKey = startArr.join(',');
  if (startKey === goalKey) return { solution: [], iters: 0 };

  let iter = 0;
  const tick = () => { iter++; if (onProgress && iter % 2000 === 0) onProgress(2000); };

  /** All legal moves from a position vector: [plateId, dir, newPositions][] */
  const expand = (positions) => {
    const snap = plates.map((p, i) => ({ ...p, currentPos: positions[i] }));
    const out = [];
    for (const plate of snap) {
      for (const dir of ['left', 'right']) {
        const effects = computeMove(snap, plate.id, dir);
        if (!effects) continue;
        const np = [...positions];
        for (const { plateId, newPos } of effects) np[plateId - 1] = newPos;
        out.push([plate.id, dir, np]);
      }
    }
    return out;
  };
  const parseKey = k => k.split(',').map(Number);

  // ── Phase 1: distS ──────────────────────────────────────────────────────
  const distS = new Map([[startKey, 0]]);
  let frontier = [startKey];
  let L = -1;
  while (frontier.length && L === -1) {
    const next = [];
    for (const key of frontier) {
      if (L !== -1) break;
      const d = distS.get(key);
      for (const [, , np] of expand(parseKey(key))) {
        const nk = np.join(',');
        if (distS.has(nk)) continue;
        distS.set(nk, d + 1);
        tick();
        next.push(nk);
        if (nk === goalKey) { L = d + 1; break; }
      }
    }
    frontier = next;
  }
  if (L === -1) return { solution: null, iters: iter };

  // ── Phase 2: distG over the corridor only ───────────────────────────────
  const distG = new Map([[goalKey, 0]]);
  const layers = Array.from({ length: L + 1 }, () => []);  // corridor states by distS
  layers[L].push(goalKey);
  frontier = [goalKey];
  while (frontier.length) {
    const next = [];
    for (const key of frontier) {
      const g = distG.get(key);
      const ds = distS.get(key);
      for (const [, , np] of expand(parseKey(key))) {
        const nk = np.join(',');
        if (distG.has(nk) || distS.get(nk) !== ds - 1) continue;
        distG.set(nk, g + 1);
        tick();
        layers[ds - 1].push(nk);
        next.push(nk);
      }
    }
    frontier = next;
  }

  // Pathologically wide corridors would make the exact DP too heavy — fall back
  // to a greedy walk that still keeps the minimal move count (each step goes one
  // layer closer to the goal) and merely prefers continuing the same plate.
  const CORRIDOR_LIMIT = 200000;
  if (distG.size > CORRIDOR_LIMIT) {
    const path = [];
    let key = startKey, last = 0;
    for (let d = 0; d < L; d++) {
      let pick = null;
      for (const [plateId, dir, np] of expand(parseKey(key))) {
        const nk = np.join(',');
        if (distG.get(nk) !== L - d - 1) continue;
        if (!pick || plateId === last) pick = [plateId, dir, nk];
        if (plateId === last) break;
      }
      path.push(toNotation(pick[0], pick[1], 1));
      last = pick[0]; key = pick[2];
    }
    return { solution: compressPath(path), iters: iter };
  }

  // ── Phase 3: exact DP, node = state + '|' + lastPlate ───────────────────
  let layerNodes = new Map([[startKey + '|0', { groups: 0, prev: null, move: null }]]);
  const history = [layerNodes];
  for (let d = 0; d < L; d++) {
    const next = new Map();
    for (const [nodeKey, node] of layerNodes) {
      const sep = nodeKey.lastIndexOf('|');
      const key = nodeKey.slice(0, sep);
      const last = Number(nodeKey.slice(sep + 1));
      for (const [plateId, dir, np] of expand(parseKey(key))) {
        const nk = np.join(',');
        if (distS.get(nk) !== d + 1 || distG.get(nk) !== L - d - 1) continue;
        const g = node.groups + (plateId === last ? 0 : 1);
        const nnk = nk + '|' + plateId;
        const prev = next.get(nnk);
        if (!prev || g < prev.groups) {
          next.set(nnk, { groups: g, prev: nodeKey, move: toNotation(plateId, dir, 1) });
        }
      }
    }
    layerNodes = next;
    history.push(next);
  }

  let bestKey = null, bestGroups = Infinity;
  for (const [nodeKey, node] of layerNodes) {
    if (nodeKey.slice(0, nodeKey.lastIndexOf('|')) === goalKey && node.groups < bestGroups) {
      bestGroups = node.groups;
      bestKey = nodeKey;
    }
  }
  const path = [];
  for (let d = L; d > 0; d--) {
    const node = history[d].get(bestKey);
    path.push(node.move);
    bestKey = node.prev;
  }
  path.reverse();
  return { solution: compressPath(path), iters: iter };
}

/** Collapse consecutive same-plate same-direction moves: 1A 1A 1A → 1A3. */
function compressPath(path) {
  if (!path.length) return path;
  const result = [];
  let cur = parseNotation(path[0]);
  let count = 1;
  for (let i = 1; i < path.length; i++) {
    const next = parseNotation(path[i]);
    if (next.plateId === cur.plateId && next.dir === cur.dir) {
      count++;
    } else {
      result.push(toNotation(cur.plateId, cur.dir, count));
      cur = next; count = 1;
    }
  }
  result.push(toNotation(cur.plateId, cur.dir, count));
  return result;
}

// ── game-logic — Game logic ────────────────────────────────────────────────
// computeMove / toNotation / parseNotation live in the solver-src block,
// shared verbatim with the Web Worker.

/**
 * Apply a move in-place. Returns true if move was applied, false if blocked.
 */
function applyMove(plates, plateId, dir) {
  const effects = computeMove(plates, plateId, dir);
  if (!effects) return false;
  for (const { plateId: pid, newPos } of effects) {
    plates.find(p => p.id === pid).currentPos = newPos;
  }
  return true;
}

/** Returns the id of the first plate that would go out of bounds, or null if move is valid. */
function getBlockingPlateId(plates, plateId, dir) {
  const primaryDelta = dir === 'left' ? 1 : -1;
  const primary = plates.find(p => p.id === plateId);
  if (!primary) return null;
  const sign = primaryDelta > 0 ? 1 : -1;
  const effects = [{ plate: primary, delta: primaryDelta }];
  for (const dep of primary.deps) {
    const target = plates.find(p => p.id === dep.targetId);
    if (!target) continue;
    const depSign = dep.direction === 'same' ? sign : -sign;
    effects.push({ plate: target, delta: depSign * dep.steps });
  }
  for (const { plate, delta } of effects) {

// ── render — 3D scene render ────────────────────────────────────────────────────

/** Pixel offset per position step on a plate */
function holeStep(positions) {
  const usable = PLATE_W * (1 - 2 * HOLE_PADDING);
  return usable / (positions - 1);
}

/** X offset in px for a given currentPos (centered = 0 offset) */
function posToOffsetX(currentPos, positions) {
  return (center(positions) - currentPos) * holeStep(positions);
}

/**
 * Pin left value within .face.top to keep it visually fixed in scene space.
 * The pin is a child of .face.top which moves with the plate (translateX=offsetX).
 * To counteract: pinLeft = PLATE_W/2 - offsetX.
 * CSS has transform:translateX(-50%) on .pin so the center sits exactly at pinLeft.
 * When currentPos=center: offsetX=0, pinLeft=PLATE_W/2 = center of plate ✓
 * When plate slides left (currentPos increases): offsetX<0, pinLeft increases → pin shifts right within plate → stays fixed ✓
 */
function pinLeft(currentPos, positions) {
  return PLATE_W / 2 - posToOffsetX(currentPos, positions);
}

/**
 * Build DOM for all plates inside a scene element. Clears existing content.
 * @param {string} sceneId   id of the .scene div
 * @param {object[]} plates
 */
function buildScene(sceneId, plates) {
  const scene = document.getElementById(sceneId);
  scene.innerHTML = '';

  // Plate 1 = front (z=0); plate N = back (negative Z, в глубину сцены)
  for (const plate of plates) {
    const z = -(plate.id - 1) * PLATE_GAP;
    const offsetX = posToOffsetX(plate.currentPos, plate.positions);
    const isRaised = plate.currentPos === center(plate.positions);

    // Build hole HTML
    const padding = PLATE_W * HOLE_PADDING;
    const step = holeStep(plate.positions);
    const holesHTML = Array.from({ length: plate.positions }, (_, i) => {
      const isCenter = (i + 1) === center(plate.positions);
      return `<div class="hole${isCenter ? ' center-hole' : ''}" data-pos="${i + 1}"
                   data-test-id="hole-${plate.id}-${i + 1}"
                   style="position:absolute;
                          left:${padding + i * step - HOLE_SIZE / 2}px;
                          top:50%;
                          transform:translateY(-50%)"></div>`;
    }).join('');

    const el = document.createElement('div');
    el.className = 'plate';
    el.dataset.id = plate.id;
    el.dataset.testId = `${sceneId}-plate-${plate.id}`;
    el.style.transform = `translateZ(${z}px) translateX(${offsetX}px)`;
    el.innerHTML = `
      <div class="face top">${holesHTML}</div>
      <div class="face front"></div>
      <div class="face right"><span class="plate-num">${plate.id}</span></div>
      <div class="pin ${isRaised ? 'raised' : 'lowered'}"
           style="left:${pinLeft(plate.currentPos, plate.positions)}px"></div>
    `;
    scene.appendChild(el);
  }

  // rotateY(-35deg) maps negative Z (depth) to positive X (rightward drift).
  // Shift .scene left by the centroid's rightward drift to re-centre the stack.
  const centroidZ  = (plates.length - 1) * PLATE_GAP / 2;
  const cx = Math.round(0.497 * centroidZ);
  document.documentElement.style.setProperty('--scene-cx', cx + 'px');

  const stackDepth = (plates.length - 1) * PLATE_GAP;
  const overhead = Math.round(stackDepth * 0.55 + 60);
  document.documentElement.style.setProperty('--scene-overhead', overhead + 'px');
}

/**
 * Update existing plate DOM to reflect current state (no full rebuild).
 * @param {string} sceneId
 * @param {object[]} plates
 * @param {number} activePlateId
 */
function updateScene(sceneId, plates, activePlateId) {
  for (const plate of plates) {
    const el = document.querySelector(`#${sceneId} .plate[data-id="${plate.id}"]`);
    if (!el) continue;

    const z = -(plate.id - 1) * PLATE_GAP;
    const offsetX = posToOffsetX(plate.currentPos, plate.positions);
    el.style.transform = `translateZ(${z}px) translateX(${offsetX}px)`;

    const isRaised = plate.currentPos === center(plate.positions);
    const pin = el.querySelector('.pin');
    pin.className = `pin ${isRaised ? 'raised' : 'lowered'}`;
    // Keep pin visually fixed in scene space as plate moves
    pin.style.left = `${pinLeft(plate.currentPos, plate.positions)}px`;

    el.classList.toggle('active', plate.id === activePlateId);
  }
}

// ── parsers — Config format parser registry ────────────────────────────────
/** Universal config invariants — one place, shared by every parser via the registry. */
function validatePlates(plates) {
  if (!Array.isArray(plates) || plates.length < 2 || plates.length > 8) return null;
  if (plates.some(p => !p || typeof p !== 'object')) return null;

  const positions0 = plates[0]?.positions;
  const sortedIds = plates.map(p => p.id).slice().sort((a, b) => a - b);
  if (!sortedIds.every((id, i) => id === i + 1)) return null;

  for (const p of plates) {
    if (typeof p.id !== 'number' ||
        typeof p.positions !== 'number' || p.positions % 2 === 0 || p.positions < 3 ||
        p.positions !== positions0 ||
        typeof p.currentPos !== 'number' || p.currentPos < 1 || p.currentPos > p.positions ||
        !Array.isArray(p.deps)) {
      return null;
    }
    const seenTargets = new Set();
    for (const d of p.deps) {
      if (!d || typeof d !== 'object' ||
          typeof d.targetId !== 'number' ||
          !Number.isInteger(d.targetId) ||
          d.targetId < 1 || d.targetId > plates.length ||
          d.targetId === p.id ||
          (d.direction !== 'same' && d.direction !== 'opposite') ||
          typeof d.steps !== 'number' ||
          !Number.isInteger(d.steps) || d.steps < 1) {
        return null;
      }
      if (seenTargets.has(d.targetId)) return null;   // duplicate/conflicting dep to same target
      seenTargets.add(d.targetId);
    }
  }
  return plates;
}

// ── Format parser registry ────────────────────────────────────────────────
// Each parser is a stateless unit { id, parse(str)->plates|null, serialize(plates)->string|null }.
// Neither method throws (contract): null = "not my format" / "not representable".

const json = {
  id: 'json',
  parse(str) {
    const t = str.trim();
    if (t[0] !== '[' && t[0] !== '{') return null;
    try { return JSON.parse(t); } catch { return null; }
  },
  serialize(plates) {
    return JSON.stringify(plates.map(({ id, positions, currentPos, deps }) => ({ id, positions, currentPos, deps })));
  },
};

// Compact "positions + rules" notation, e.g. "040615 A:B-,C+;D:E-". Requires BOTH
// a positions digit-run and a rule token (bare positions / rules-only are not this
// format); lenient about order, whitespace and case. Positions 0-based (0–6 →
// currentPos 1–7); letters A–H → ids 1–8. Knows nothing about chests.ini.
const gothic = {
  id: 'gothic',
  /** Parse only the rule half, e.g. "A:B-,C+;D:E-", into
   *  { [SRC letter]: [{targetId, direction, steps}] }. Case/space tolerant. */
  parseRules(str) {
    const depMap = {};
    for (const token of str.split(';')) {
      const m = token.trim().match(/([A-H])\s*:\s*(.+)$/i);
      if (!m) continue;
      const src = m[1].toUpperCase();
      if (!depMap[src]) depMap[src] = [];
      for (const part of m[2].split(',')) {
        const pm = part.trim().match(/^([A-H])\s*([+\-])$/i);
        if (!pm) continue;
        depMap[src].push({
          targetId: pm[1].toUpperCase().charCodeAt(0) - 64,
          direction: pm[2] === '+' ? 'same' : 'opposite',
          steps: 1,
        });
      }
    }
    return depMap;
  },
  parse(str) {
    const text = String(str).trim();
    if (!/[A-H]\s*:\s*[A-H]\s*[+\-]/i.test(text)) return null;   // need a rule token
    const dM = text.match(/(?<![,\d])(\d{2,8})(?![,\d])/);        // need a positions digit-run
    if (!dM) return null;
    const rawPos = [...dM[1]].map(Number);
    const depMap = gothic.parseRules(text.replace(dM[0], ''));
    // Reject (don't silently drop) a rule whose SOURCE plate is beyond the position count.
    for (const src of Object.keys(depMap)) if (src.charCodeAt(0) - 65 >= rawPos.length) return null;
    const POSITIONS = 7;
    return Array.from({ length: rawPos.length }, (_, i) => ({
      id: i + 1,
      positions: POSITIONS,
      currentPos: Math.max(1, Math.min(POSITIONS, rawPos[i] + 1)),
      deps: depMap[String.fromCharCode(65 + i)] || [],
    }));
  },
  serialize(plates) {
    const pos = plates.map(p => p.currentPos - 1).join('');
    const rules = plates
      .filter(p => p.deps.length > 0)
      .map(p => {
        const src = String.fromCharCode(64 + p.id);
        const targets = p.deps
          .map(d => String.fromCharCode(64 + d.targetId) + (d.direction === 'same' ? '+' : '-'))
          .join(',');
        return `${src}:${targets}`;
      })
      .join(';');
    return rules ? `${pos} ${rules}` : pos;
  },
};

// "N.positions.pairs", e.g. 3.531.saaoaa — positions 0-based; one char per ordered
// pair (from-major, self skipped): s=same, o=opposite, a=absent.
const dotted = {
  id: 'dotted',
  parse(str) {
    const m = str.trim().match(/^(\d+)\.(\d+)\.([sao]+)$/);   // canonical: lowercase pairs only
    if (!m) return null;
    const n = parseInt(m[1], 10);
    if (String(n) !== m[1]) return null;                       // no leading-zero plate count
    const pos = m[2], pairs = m[3];                            // positions keep per-digit zeros (position 0 is real)
    if (pos.length !== n || pairs.length !== n * (n - 1)) return null;
    const POSITIONS = 7;
    const plates = Array.from({ length: n }, (_, i) => ({
      id: i + 1, positions: POSITIONS, currentPos: Number(pos[i]) + 1, deps: [],
    }));
    let k = 0;
    for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const c = pairs[k++];
      if (c === 's' || c === 'o') plates[i].deps.push({ targetId: j + 1, direction: c === 's' ? 'same' : 'opposite', steps: 1 });
    }
    return plates;
  },
  serialize(plates) {
    const n = plates.length;
    const pos = plates.map(p => p.currentPos - 1).join('');
    let pairs = '';
    for (let i = 0; i < n; i++) {
      const by = {}; for (const d of plates[i].deps) by[d.targetId] = d.direction;
      for (let j = 0; j < n; j++) { if (i === j) continue; const dir = by[j + 1]; pairs += dir === 'same' ? 's' : dir === 'opposite' ? 'o' : 'a'; }
    }
    return `${n}.${pos}.${pairs}`;
  },
};

// unlockmyloot ?lock= v2: base64url bitstream — 3b plateCount-3, 1b display-flip
// (write 0/ignore), 3b/pin (0-based), 2b per ordered pair (0 none/1 same/2 opposite).
// Canonical: length in {5,7,10,14,19,24}, trailing pad bits zero.
const bytearray = (() => {
  const ABC = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
  const bitsFor = (n) => 4 + 3 * n + 2 * n * (n - 1);
  const lenFor  = (n) => Math.ceil(bitsFor(n) / 6);
  const VALID_LENS = new Set([3, 4, 5, 6, 7, 8].map(lenFor)); // {5,7,10,14,19,24}
  return {
    id: 'bytearray',
    parse(str) {
      const s = str.trim();
      if (!/^[A-Za-z0-9_-]+$/.test(s) || /^\d+$/.test(s)) return null;
      if (!VALID_LENS.has(s.length)) return null;
      const bits = [];
      for (const ch of s) { const v = ABC.indexOf(ch); if (v < 0) return null; for (let b = 5; b >= 0; b--) bits.push((v >> b) & 1); }
      let at = 0;
      const read = (w) => { let v = 0; for (let b = 0; b < w; b++) { if (at >= bits.length) return null; v = (v << 1) | bits[at++]; } return v; };
      const nRaw = read(3); if (nRaw === null) return null;
      const n = nRaw + 3;
      if (lenFor(n) !== s.length) return null;         // declared n must match the code length
      if (read(1) === null) return null;               // flip bit (ignored)
      const POSITIONS = 7;
      const plates = [];
      // pin is 0–7 (3 bits); the app is 7-hole, so pin 7 → currentPos 8 → validatePlates rejects (deliberate).
      for (let i = 0; i < n; i++) { const pin = read(3); if (pin === null) return null; plates.push({ id: i + 1, positions: POSITIONS, currentPos: pin + 1, deps: [] }); }
      for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const t = read(2); if (t === null) return null;
        if (t === 1 || t === 2) plates[i].deps.push({ targetId: j + 1, direction: t === 1 ? 'same' : 'opposite', steps: 1 });
      }
      for (; at < bits.length; at++) if (bits[at] !== 0) return null;   // canonical: zero pad
      return plates;
    },
    serialize(plates) {
      const n = plates.length;
      if (n < 3 || n > 8) return null;
      const bits = [];
      const write = (v, w) => { for (let b = w - 1; b >= 0; b--) bits.push((v >> b) & 1); };
      write(n - 3, 3); write(0, 1);
      for (const p of plates) write(p.currentPos - 1, 3);
      for (let i = 0; i < n; i++) {
        const by = {}; for (const d of plates[i].deps) by[d.targetId] = d.direction;
        for (let j = 0; j < n; j++) { if (i === j) continue; const dir = by[j + 1]; write(dir === 'same' ? 1 : dir === 'opposite' ? 2 : 0, 2); }
      }
      while (bits.length % 6 !== 0) bits.push(0);
      let out = '';
      for (let k = 0; k < bits.length; k += 6) { let v = 0; for (let b = 0; b < 6; b++) v = (v << 1) | bits[k + b]; out += ABC[v]; }
      return out;
    },
  };
})();

const PARSERS = [json, dotted, gothic, bytearray];

/** Try each parser in order; return the first output that passes validatePlates, else null. */
function parseConfig(str) {
  const text = String(str).trim();
  for (const p of PARSERS) {
    const plates = p.parse(text);          // never throws (contract): null if not this format
    if (plates) { const v = validatePlates(plates); if (v) return v; }
  }
  return null;
}

/** A paste auto-imports iff it parses to a fully valid config. */
function looksLikeImportConfig(text) {
  return parseConfig(text) !== null;

  const plate = state.plates.find(p => p.id === id);
  if (!plate) return;
  plate.currentPos = Math.min(Math.max(d, 1), plate.positions);
  state.cachedSolution = null;
  const inp = document.querySelector(`#plates-positions .poslock-digit[data-id="${id}"]`);
  if (inp) inp.value = plate.currentPos;
  const dec = document.querySelector(`#plates-positions .btn-pos-dec[data-id="${id}"]`);
  if (dec) dec.disabled = plate.currentPos <= 1;
  const inc = document.querySelector(`#plates-positions .btn-pos-inc[data-id="${id}"]`);
  if (inc) inc.disabled = plate.currentPos >= plate.positions;
  updateScene('scene-config-inner', state.plates, state.activePlate);
  renderChestHints();
}

/** Rebuild after a structural change (N changed), then run an optional focus callback. */
function posStructuralUpdate(afterFocus) {
  document.getElementById('val-plates').textContent = state.plates.length;
  state.activePlate = Math.min(state.activePlate, state.plates.length);
  state.cachedSolution = null;
  renderMatrix();
  buildScene('scene-config-inner', state.plates);
  if (afterFocus) afterFocus();
  updateMatrixActive();
  updateScene('scene-config-inner', state.plates, state.activePlate);
}

/** Append a plate (value d), keep typing-focus on the ghost (or the new last plate at max). */
function posAppendPlate(d) {
  if (state.plates.length >= POS_MAX_PLATES) return;
  const positions = DEFAULT_POSITIONS;
  const plate = makePlate(state.plates.length + 1, positions);
  plate.currentPos = Math.min(Math.max(d, 1), positions);
  state.plates.push(plate);
  state.activePlate = state.plates.length;
  posStructuralUpdate(() => { if (!posFocusGhostAdd()) posFocusPlate(state.plates.length); });
}

/** Remove the last plate (left ghost / Backspace on the ghost). */
function posRemoveLast() {
  if (state.plates.length <= POS_MIN_PLATES) return;
  posRemovePlateAt(state.plates.length - 1);
  posStructuralUpdate(() => { if (!posFocusGhostAdd()) posFocusPlate(state.plates.length); });
}

/** Remove a specific plate. Backspace shifts focus left; Delete (forward) keeps the index
 *  so the next plate slides in. focusAfter=false for the global (no-focus) path. */
function posRemovePlate(id, focusAfter = true, forward = false) {
  if (state.plates.length <= POS_MIN_PLATES) return;
  const idx = state.plates.findIndex(p => p.id === id);
  if (idx === -1) return;
  posRemovePlateAt(idx);
  const n = state.plates.length;
  state.activePlate = forward ? Math.min(idx + 1, n) : Math.min(Math.max(idx, 1), n);
  posStructuralUpdate(focusAfter ? () => posFocusPlate(state.activePlate) : null);
}

/** Splice plate at index, renumber ids 1..N-1 and fix dependency targets. */
function posRemovePlateAt(idx) {
  const removedId = state.plates[idx].id;
  state.plates.splice(idx, 1);
  state.plates.forEach((p, i) => { p.id = i + 1; });
  state.plates.forEach(p => {
    p.deps = p.deps
      .filter(dep => dep.targetId !== removedId)
      .map(dep => ({ ...dep, targetId: dep.targetId > removedId ? dep.targetId - 1 : dep.targetId }))
      .filter(dep => dep.targetId !== p.id);
  });
}

/** Replace the whole set from pasted digits (>1): N = digit count (max 8), deps reset. */
function posReplaceAll(digitsStr) {
  const positions = DEFAULT_POSITIONS;
  const vals = digitsStr.slice(0, POS_MAX_PLATES).split('')
    .map(c => Math.min(Math.max(parseInt(c, 10), 1), positions));
  while (vals.length < POS_MIN_PLATES) vals.push(center(positions));
  state.plates = vals.map((v, i) => { const p = makePlate(i + 1, positions); p.currentPos = v; return p; });
  state.activePlate = state.plates.length;
  posStructuralUpdate(() => { if (!posFocusGhostAdd()) posFocusPlate(state.plates.length); });
}

function wire3dButtons(expandId, toggleId, panelSelector) {

function wireConfigHandlers() {

  });

  // passive:false so we can preventDefault and stop the page from scrolling.
  posCont.addEventListener('wheel', (e) => {
    const digit = e.target.closest('.poslock-digit');
    if (!digit) return;
    e.preventDefault();
    const id = parseInt(digit.dataset.id);
    const plate = state.plates.find(p => p.id === id);

  posCont.addEventListener('beforeinput', (e) => {
    const digit = e.target.closest('.poslock-digit');
    const ghost = e.target.closest('.poslock-ghost-add');
    if (!digit && !ghost) return;
    if (e.inputType === 'insertText') {
      e.preventDefault();
      const ch = (e.data || '').replace(/\D/g, '').slice(-1);
      if (!ch) return;
      const d = parseInt(ch, 10);
      if (digit) {

        posSetPlateValue(id, d);
        if (id < state.plates.length) posFocusPlate(id + 1);

    } else if (e.inputType.startsWith('insert') || e.inputType.startsWith('delete')) {

    }
  });

  // Backspace/Delete remove a plate; arrows move focus / bump value; Home/End/PgUp/PgDown jump
  posCont.addEventListener('keydown', (e) => {
    const digit = e.target.closest('.poslock-digit');
    const ghost = e.target.closest('.poslock-ghost-add');
    if (!digit && !ghost) return;
    const id = digit ? parseInt(digit.dataset.id) : null;
    const N = state.plates.length;
    const jump = e.ctrlKey || e.metaKey;   // Ctrl/Cmd + ← / → = jump to first / last

      e.preventDefault();
      if (digit) posRemovePlate(id); else posRemoveLast();
    } else if (e.key === 'Delete') {
      e.preventDefault();
      if (digit) posRemovePlate(id, true, true); else posRemoveLast();
    } else if (e.key === 'Home' || (jump && e.key === 'ArrowLeft')) {
      e.preventDefault(); posFocusPlate(1);
    } else if (e.key === 'End' || (jump && e.key === 'ArrowRight')) {
      e.preventDefault(); posFocusPlate(N);
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (digit) { if (id > 1) posFocusPlate(id - 1); }
      else posFocusPlate(N);                            // ghost → last plate
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (digit) { if (id < N) posFocusPlate(id + 1); else posFocusGhostAdd(); }
    } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      if (digit) { e.preventDefault(); e.key === 'PageUp' ? posSetActiveExtreme(true) : posBumpActive(+1); }
    } else if (e.key === 'ArrowDown' || e.key === 'PageDown') {
      if (digit) { e.preventDefault(); e.key === 'PageDown' ? posSetActiveExtreme(false) : posBumpActive(-1); }
    }
  });

  // Paste: a full import config (rules / keys / JSON) is applied whole if valid; otherwise
  // we keep only the digits — >1 digit replaces the whole set, a single digit edits/appends.
  posCont.addEventListener('paste', (e) => {
    if (!e.target.closest('.poslock-digit, .poslock-ghost-add')) return;
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text') || '';
    // Full-config apply from the drum is deliberately narrow: only an unambiguous
    // gothic paste, and only when nothing would be clobbered (no deps set yet).
    // Anything else (incl. base64url byte-array tokens) falls through to digits —
    // a whole-config import must go through the confirmation dialog (global paste).
    if (state.plates.every(p => p.deps.length === 0)) {
      const plates = validatePlates(gothic.parse(text));
      if (plates) { applyPlates(plates); showToast(t('toast-applied')); return; }
    }
    const digits = text.replace(/\D/g, '');
    if (!digits) return;
    if (digits.length > 1) { posReplaceAll(digits); return; }
    const d = parseInt(digits, 10);
    const digit = e.target.closest('.poslock-digit');
    if (digit) posSetPlateValue(parseInt(digit.dataset.id, 10), d);
    else posAppendPlate(d);
  });

  // Focusing a cell makes its plate active (frame + 3D follow)
  posCont.addEventListener('focusin', (e) => {
    const digit = e.target.closest('.poslock-digit');
    if (digit) { posSetActive(parseInt(digit.dataset.id, 10)); return; }
    if (e.target.closest('.poslock-ghost-add')) posSetActive(state.plates.length);
  });

  // Edge ghost clicks: − removes the last plate, + appends a centred plate
  posCont.addEventListener('click', (e) => {
    if (e.target.closest('.poslock-ghost-del')) { posRemoveLast(); return; }
    if (e.target.closest('.poslock-ghost-add')) { posAppendPlate(center(DEFAULT_POSITIONS)); }
  });

  function cycleDepCell(btn, plate, toId, reverse) {
    const depIdx = plate.deps.findIndex(d => d.targetId === toId);
    const cur = depIdx === -1 ? 'none' : plate.deps[depIdx].direction;
    const order = reverse ? ['none', 'opposite', 'same'] : ['none', 'same', 'opposite'];
    const next = order[(order.indexOf(cur) + 1) % 3];
    if (next === 'none') {
      if (depIdx !== -1) plate.deps.splice(depIdx, 1);
      btn.dataset.state = 'none'; btn.title = depCellTitle('none', btn.dataset.from, btn.dataset.to); btn.innerHTML = depCellHTML('none');
    } else {
      if (depIdx === -1) plate.deps.push({ targetId: toId, direction: next, steps: 1 });
      else plate.deps[depIdx].direction = next;
      btn.dataset.state = next; btn.title = depCellTitle(next, btn.dataset.from, btn.dataset.to); btn.innerHTML = depCellHTML(next);
    }

    renderChestHints();   // deps affect hint ranking + rule-line colors
  }

  // Delegated: dep cells (LMB — forward, RMB — reverse)
  document.getElementById('plates-matrix').addEventListener('click', (e) => {
    const btn = e.target.closest('.dep-cell');
    if (!btn) return;
    const plate = state.plates.find(p => p.id === parseInt(btn.dataset.from));
    if (!plate) return;
    cycleDepCell(btn, plate, parseInt(btn.dataset.to), false);
  });

  document.getElementById('plates-matrix').addEventListener('contextmenu', (e) => {
    const btn = e.target.closest('.dep-cell');
    if (!btn) return;
    e.preventDefault();
    const plate = state.plates.find(p => p.id === parseInt(btn.dataset.from));
    if (!plate) return;
    cycleDepCell(btn, plate, parseInt(btn.dataset.to), true);
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    if (state.cachedSolution !== null) {
      state.solution = state.cachedSolution;
      state.solverStep = 0;
      switchToSolve();

    document.getElementById('computing-overlay').classList.add('active');
    worker.postMessage({ type: 'solve', plates: state.plates, solveId: ++solveId });
  });
}

function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.dataset.testId = 'toast';
  toast.dataset.testType = type;
  toast.textContent = message;
  document.getElementById('toast-container').appendChild(toast);
  requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('visible')));
  setTimeout(() => {
    toast.classList.remove('visible');
    toast.addEventListener('transitionend', () => toast.remove(), { once: true });
  }, 2500);
}

// Copy with a success/failure toast. Wrapped in try/catch because reading
// navigator.clipboard.writeText throws synchronously (not a rejection) when the
// Clipboard API is unavailable (insecure context / older browser).
function copyToClipboard(text, successKey = 'toast-copied') {
  try {
    navigator.clipboard.writeText(text)
      .then(() => showToast(t(successKey)))
      .catch(() => showToast(t('toast-copy-fail'), 'error'));
  } catch {
    showToast(t('toast-copy-fail'), 'error');
  }
}

document.getElementById('btn-export').addEventListener('click', (e) => {

    : gothic.serialize(state.plates);
  copyToClipboard(data, json ? 'toast-copied-json' : 'toast-copied');
});

/** Build a plates array directly from a DB entry (pos is 0-based; rules may be empty). */
function entryToPlates(entry) {
  const depMap = gothic.parseRules(entry.rules || '');
  return entry.pos.map((p, i) => ({
    id: i + 1,
    positions: 7,
    currentPos: Math.max(1, Math.min(7, p + 1)),
    deps: depMap[String.fromCharCode(65 + i)] || [],
  }));
}

function applyEntry(entry) {

// Ctrl+C on config screen — copy current configuration

// Permanent paste listener — catches Ctrl+V outside of form inputs

document.getElementById('btn-import').addEventListener('click', async () => {
  const ASKED_KEY = 'clipboard_permission_asked';
  let text = null;
  try {
    let shouldRequest = false;
    try {
      const perm = await navigator.permissions.query({ name: 'clipboard-read' });
      if (perm.state === 'granted') {
        text = await navigator.clipboard.readText();
      } else if (perm.state === 'prompt') {
        shouldRequest = !localStorage.getItem(ASKED_KEY);
      }
      // 'denied' → shouldRequest stays false
    } catch {
      // permissions API not supported (Firefox) — treat as prompt
      shouldRequest = !localStorage.getItem(ASKED_KEY);
    }
    if (shouldRequest) {
      localStorage.setItem(ASKED_KEY, '1');
      text = await navigator.clipboard.readText();
    }
  } catch {}
  if (text) {
    openImportDialog(text);
  } else {
    showToast(t('toast-ctrl-v'), 'success');
  }
});

    // ── Following mode ────────────────────────────────────────────────────

    // Notation string with current step highlighted
    const parts = state.solution.map((s, i) => {
      const arrow = i < state.solution.length - 1 ? ' →' : '';
      const inner = i === state.solverStep
        ? `<span class="cur-step">${s}</span>`
        : `<span style="opacity:0.45">${s}</span>`;
      return `<span style="white-space:nowrap">${inner}${arrow}</span>`;
    });
    document.getElementById('solution-string').innerHTML = parts.join(' ');

    const makeEndpoint = (label, step, testId) => {
      const li = document.createElement('li');
      li.textContent = label;
      li.classList.add('endpoint');
      li.dataset.testId = testId;
      if (state.solverStep === step) li.classList.add('active');
      li.addEventListener('click', () => jumpToStep(step));
      return li;
    };

    list.appendChild(makeEndpoint(t('step-start'), 0, 'step-start'));
    state.solution.forEach((s, i) => {
      list.appendChild(buildStepLi(parseNotation(s), {
        testId: `step-${i + 1}`,
        active: i + 1 === state.solverStep,
        onClick: () => jumpToStep(i + 1),
      }));
    });
    list.appendChild(makeEndpoint(t('step-end'), state.solution.length, 'step-end'));

    const active = list.querySelector('.active');
    if (active) active.scrollIntoView({ block: 'nearest' });

    const atStart = state.solverStep === 0;
    const atEnd   = state.solverStep === state.solution.length;
    document.getElementById('btn-prev').disabled = atStart;
    document.getElementById('btn-step').disabled = atEnd;
    document.getElementById('btn-auto').disabled = atEnd;
  }
}

/** Apply steps from current solverStep up to (but not including) targetStep */
function jumpToStep(targetStep) {
  // Reset to start
  state.plates.forEach((p, i) => { p.currentPos = solveStartPositions[i].currentPos; });
  state.solverStep = 0;

  // Replay up to target
  for (let i = 0; i < targetStep; i++) {
    const { plateId, dir, steps } = parseNotation(state.solution[i]);
    for (let s = 0; s < steps; s++) applyMove(state.plates, plateId, dir);
    state.solverStep = i + 1;
  }

  if (targetStep > 0) state.activePlate = parseNotation(state.solution[targetStep - 1]).plateId;
  buildScene('scene-solve-inner', state.plates);
  renderSolvePanel();
  updateScene('scene-solve-inner', state.plates, state.activePlate);
}

/** Advance one step in the solution */
function solveStepForward() {
  if (state.solverStep >= state.solution.length) return;
  const { plateId, dir, steps } = parseNotation(state.solution[state.solverStep]);
  for (let s = 0; s < steps; s++) applyMove(state.plates, plateId, dir);
  state.solverStep++;
  state.activePlate = plateId;
  updateScene('scene-solve-inner', state.plates, state.activePlate);
  renderSolvePanel();
}

/** Step back in the solution */
function solveStepBack() {
  if (state.solverStep === 0) return;
  jumpToStep(state.solverStep - 1);
}

/** Exit explore mode and jump to a BFS step. */
function returnToSolution(targetStep) {
  state.solveMode = 'following';
  state.exploreHistory = [];
  state.detachPositions = null;
  state.detachStep = null;
  jumpToStep(targetStep);
}

/** Record a free explore move; accumulate same-direction runs, collapse reverses. */
function addExploreMove(plateId, dir) {
  const last = state.exploreHistory[state.exploreHistory.length - 1];
  if (last && last.plateId === plateId) {
    if (last.dir === dir) {
      last.steps++;
    } else {
      if (last.steps > 1) last.steps--;
      else state.exploreHistory.pop();
    }
  } else {
    state.exploreHistory.push({ plateId, dir, steps: 1 });
  }
}
