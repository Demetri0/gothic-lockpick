// ── keyboard — Keyboard (WASD) ──────────────────────────────────────────────────────

// e.code = physical key position, locale-independent (KeyW is always where W sits on QWERTY)
const KEY_MAP = {
  KeyW: 'W', KeyS: 'S', KeyA: 'A', KeyD: 'D',
  ArrowUp: 'W', ArrowDown: 'S', ArrowLeft: 'A', ArrowRight: 'D'
};

// Config-stage A/D: move the active plate (deps applied, all-or-nothing blocking),
// then refresh the scene, matrix inputs, and chest hints together. Distinct from
// the solve stage, where A/D drive explore mode and must not touch the config.
function configMovePlate(dir) {
  if (applyMove(state.plates, state.activePlate, dir)) {
    state.cachedSolution = null;
    updateScene('scene-config-inner', state.plates, state.activePlate);
    syncMatrixPositions();
    renderChestHints();
  } else {
    const b = getBlockingPlateId(state.plates, state.activePlate, dir);
    if (b !== null) flashBlockedPlate(b, 'scene-config-inner');
  }
}

document.addEventListener('keydown', (e) => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (document.getElementById('computing-overlay').classList.contains('active')) return;
  // Block WASD/arrows whenever any modal dialog is open, regardless of where focus
  // currently is — focus can leave a dialog's input (e.g. clicking a non-focusable
  // result card) while the dialog itself stays open, letting keys leak through otherwise.
  if (document.querySelector('dialog[open]')) return;

  // Digit 1..9 sets the active plate's position directly (a natural extension of A/D
  // moving it and W/S selecting it) — works even when no cell input is focused.
  if (state.stage === 'config' && /^[1-9]$/.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const plate = state.plates.find(p => p.id === state.activePlate);
    if (plate) {
      e.preventDefault();
      posSetPlateValue(plate.id, parseInt(e.key, 10));      // clamps to 1..positions
      const n = state.plates.length;
      if (state.activePlate < n) {                          // advance to the next plate
        state.activePlate++;
        updateMatrixActive();
        updateScene('scene-config-inner', state.plates, state.activePlate);
      } else if (n < POS_MAX_PLATES) {
        // past the last plate → focus the add-ghost so continued typing appends plates
        posFocusGhostAdd();
      }
    }
    return;
  }

  // Keyboard drives the position lock (not plate movement) in config, even with nothing
  // focused: ↑/↓ change the value, PgUp/PgDown jump it to max/min, ←/→ move the selection,
  // Home/End/Ctrl+←/→ jump to the first/last plate, Backspace/Delete remove the active plate.
  if (state.stage === 'config' && !e.altKey) {
    const N = state.plates.length;
    if (e.ctrlKey || e.metaKey) {                          // Ctrl/Cmd + ← / →
      if (e.key === 'ArrowLeft')  { e.preventDefault(); posSetActive(1); return; }
      if (e.key === 'ArrowRight') { e.preventDefault(); posSetActive(N); return; }
    } else {
      if (e.key === 'ArrowUp')    { e.preventDefault(); posBumpActive(+1); return; }
      if (e.key === 'ArrowDown')  { e.preventDefault(); posBumpActive(-1); return; }
      if (e.key === 'PageUp')     { e.preventDefault(); posSetActiveExtreme(true); return; }
      if (e.key === 'PageDown')   { e.preventDefault(); posSetActiveExtreme(false); return; }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); posMoveActive(-1); return; }
      if (e.key === 'ArrowRight') { e.preventDefault(); posMoveActive(+1); return; }
      if (e.key === 'Home')       { e.preventDefault(); posSetActive(1); return; }
      if (e.key === 'End')        { e.preventDefault(); posSetActive(N); return; }
      if (e.key === 'Backspace')  { e.preventDefault(); posRemovePlate(state.activePlate, false); return; }
      if (e.key === 'Delete')     { e.preventDefault(); posRemovePlate(state.activePlate, false, true); return; }
    }
  }

  const key = KEY_MAP[e.code];
  if (!key) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  e.preventDefault();

  if (state.stage === 'config') {
    if (key === 'W') {
      // W = дальше вглубь стека (плашка выше на экране), S = ближе
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx + 1) % ids.length];
      updateScene('scene-config-inner', state.plates, state.activePlate);
      updateMatrixActive();
    }
    if (key === 'S') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx - 1 + ids.length) % ids.length];
      updateScene('scene-config-inner', state.plates, state.activePlate);
      updateMatrixActive();
    }
    if (key === 'A') configMovePlate('left');
    if (key === 'D') configMovePlate('right');
  }

  if (state.stage === 'solve') {
    if (key === 'W') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx + 1) % ids.length];
      updateScene('scene-solve-inner', state.plates, state.activePlate);
    }
    if (key === 'S') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx - 1 + ids.length) % ids.length];
      updateScene('scene-solve-inner', state.plates, state.activePlate);
    }
    if (key === 'A' || key === 'D') {
      const dir = key === 'A' ? 'left' : 'right';
      if (state.solveMode === 'following') {
        // Enter exploring: stop auto-play, snapshot detach point
        if (state.autoInterval) {
          clearInterval(state.autoInterval);
          state.autoInterval = null;
          document.getElementById('btn-auto').textContent = t('btn-auto');
        }
        state.solveMode = 'exploring';
        state.detachStep = state.solverStep;
        state.detachPositions = state.plates.map(p => p.currentPos);
      }
      const moved = applyMove(state.plates, state.activePlate, dir);
      if (moved) {
        addExploreMove(state.activePlate, dir);
        updateScene('scene-solve-inner', state.plates, state.activePlate);
        renderSolvePanel();
      } else {
        const b = getBlockingPlateId(state.plates, state.activePlate, dir);
        if (b !== null) flashBlockedPlate(b, 'scene-solve-inner');
      }
    }
  }
});

  <!-- Worker source — not executed by the browser, read as text by worker-host -->
  <script type="text/x-worker" id="worker-src">
// Worker entry — message protocol only. All solver logic (center, computeMove,
// bfsSolveGrouped, compressPath, ...) comes from solver-src, which
// createWorker() prepends to this source when building the worker Blob.
self.onmessage = ({ data }) => {
  if (data.type === 'solve') {
    const { solution } = bfsSolveGrouped(data.plates, (n) => {
      self.postMessage({ type: 'progress', itersDelta: n });
    });
    self.postMessage({ type: 'solve', solution, solveId: data.solveId });
  }

  if (data.type === 'random') {
    const ALL_COUNTS = [2, 3, 4, 5, 6, 7, 8];
    const PLATE_COUNTS = ALL_COUNTS.filter(c => c >= (data.minPlates || 2));
    const positions   = data.positions;
    const minSteps    = data.minSteps    || 0;
    const maxSteps    = data.maxSteps    || Infinity;
    const workerId    = data.workerId;
    const maxAttempts = data.maxAttempts;

    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const count = PLATE_COUNTS[Math.floor(Math.random() * PLATE_COUNTS.length)];
      const plates = Array.from({ length: count }, (_, i) => {
        const id     = i + 1;
        const others = Array.from({ length: count }, (_, j) => j + 1).filter(j => j !== id);
        const depCount = Math.floor(Math.random() * 3);
        const used = new Set();
        const deps = [];
        for (let d = 0; d < depCount; d++) {
          const avail = others.filter(x => !used.has(x));
          if (!avail.length) break;
          const targetId = avail[Math.floor(Math.random() * avail.length)];
          used.add(targetId);
          deps.push({ targetId, direction: Math.random() < 0.5 ? 'same' : 'opposite', steps: 1 });
        }
        return { id, positions, deps, currentPos: 1 + Math.floor(Math.random() * positions) };
      });

      if (plates.every(p => p.currentPos === center(p.positions))) {
        self.postMessage({ type: 'progress', workerId, attemptsDelta: 1, itersDelta: 0 });
        continue;
      }

      // Same single solver as the SOLVE path: the cached solution shown to the
      // user is identical to what solving the config by hand would produce.
      // Difficulty bounds are therefore measured on the grouped step count.
      const { solution, iters } = bfsSolveGrouped(plates);
      self.postMessage({ type: 'progress', workerId, attemptsDelta: 1, itersDelta: iters });

      if (solution !== null && solution.length >= minSteps && solution.length <= maxSteps) {
        self.postMessage({ type: 'random-found', workerId, plates, solution });
        return;
      }
    }

    self.postMessage({ type: 'random-exhausted', workerId });
  }
};
  </script>

  <script id="worker-host">
// ── worker-host — Web Worker host ─────────────────────────────────────────

function createWorker() {
  // Solver core (solver-src) + worker entry, concatenated verbatim. The core also
  // runs in the page, so unit tests exercise the exact source the worker executes.
  const url = URL.createObjectURL(new Blob(
    [document.getElementById('solver-src').textContent,
     '\n',
     document.getElementById('worker-src').textContent],
    { type: 'application/javascript' }
  ));
  const w = new Worker(url);
  URL.revokeObjectURL(url);
  return w;
}

function hideOverlay() {
  document.getElementById('computing-overlay').classList.remove('active');
  document.getElementById('progress-total').textContent = '';
  document.getElementById('progress-threads').innerHTML = '';
}

function resetButtons() {
  const bs = document.getElementById('btn-start');
  bs.disabled = false; bs.textContent = t('btn-start');
  document.querySelectorAll('.btn-difficulty').forEach(b => b.disabled = false);
}

const _localeMap = { ru: 'ru-RU', uk: 'uk-UA', en: 'en-US' };
function _getLang() { return _localeMap[state?.lang] || 'ru-RU'; }
function fmtK(n) {
  const locale = _getLang();
  const fmtC = new Intl.NumberFormat(locale, { notation: 'compact', compactDisplay: 'short' });
  const parts = fmtC.formatToParts(1000);
  const ci = parts.findIndex(p => p.type === 'compact');
  const suffix = parts.slice(ci > 0 && parts[ci - 1].type === 'literal' ? ci - 1 : ci).map(p => p.value).join('');
  return new Intl.NumberFormat(locale).format(Math.round(n / 1000)) + suffix;
}
const _fmtNum = { format: n => new Intl.NumberFormat(_getLang()).format(n) };

let _progressStates = null;

function resetProgress() {
  _progressStates = null;
  Object.keys(_perWorker).forEach(k => delete _perWorker[k]);
  _totalAttempts = 0; _totalIters = 0; _exhaustedCount = 0;
  document.getElementById('progress-total').textContent = '';
  document.getElementById('progress-threads').innerHTML = '';
}

function onWorkerMessage({ data }) {
  if (data.type === 'progress') {
    _progressStates = (_progressStates || 0) + (data.itersDelta || 0);
    document.getElementById('progress-total').textContent =
      t('progress-states', { n: fmtK(_progressStates) });
    return;
  }

  if (data.type === 'solve' && data.solveId !== solveId) return;

  hideOverlay();

  if (data.type === 'solve') {
    const btn = document.getElementById('btn-start');
    btn.disabled = false;
    btn.textContent = t('btn-start');
    if (data.solution === null) {
      showToast(t('toast-no-solution'), 'error');
      return;
    }
    if (state.stage !== 'config') return;
    state.solution = data.solution;
    state.cachedSolution = data.solution;
    state.solverStep = 0;
    switchToSolve();
  }
}

function workerError() {
  hideOverlay();
  resetButtons();
  showToast(t('toast-error'), 'error');
}

let solveId = 0;
let worker = createWorker();
worker.onmessage = onWorkerMessage;
worker.onerror = workerError;

let randomPool   = [];
let randomPoolId = 0;

const _perWorker  = {};
let _totalAttempts  = 0;
let _totalIters     = 0;
let _poolSize       = 0;
let _maxAttempts    = 0;
let _exhaustedCount = 0;

function createRandomPool() {
  const n = Math.min(navigator.hardwareConcurrency || 2, 8);
  const capturedId = randomPoolId;
  randomPool = Array.from({ length: n }, (_, i) => {
    const w = createWorker();
    w.onmessage = (e) => onRandomPoolMessage(e, capturedId, i);
    return w;
  });
  return randomPool.length;
}

function terminateRandomPool() {
  randomPool.forEach(w => w.terminate());
  randomPool = [];
}

function renderPoolProgress() {
  document.getElementById('progress-total').textContent =
    t('progress-attempts', { n: _totalAttempts, max: _maxAttempts, k: fmtK(_totalIters) });

  const threadsEl = document.getElementById('progress-threads');
  const entries = Object.entries(_perWorker).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
  if (threadsEl.children.length !== entries.length) threadsEl.innerHTML = '';
  entries.forEach(([id, s], i) => {
    const isLast = i === entries.length - 1;
    let row = threadsEl.children[i];
    if (!row) {
      row = document.createElement('div');
      row.className = 'progress-thread-row';
      row.innerHTML =
        '<span class="pt-branch"></span>' +
        '<span class="pt-id">#' + (parseInt(id) + 1) + '</span>' +
        '<span class="pt-att"></span>' +
        '<span class="pt-att-label" data-i18n="thread-attempts">' + t('thread-attempts') + '</span>' +
        '<span>·</span>' +
        '<span class="pt-iters"></span>';
      threadsEl.appendChild(row);
    }
    row.querySelector('.pt-branch').textContent = isLast ? '└─' : '├─';
    row.querySelector('.pt-att').textContent = _fmtNum.format(s.attempts);
    row.querySelector('.pt-iters').textContent = fmtK(s.iters);
  });
}

function onRandomPoolMessage({ data }, poolId, workerId) {
  if (poolId !== randomPoolId) return;

  if (data.type === 'progress') {
    if (!_perWorker[workerId]) _perWorker[workerId] = { attempts: 0, iters: 0 };
    _perWorker[workerId].attempts += data.attemptsDelta || 0;
    _perWorker[workerId].iters    += data.itersDelta    || 0;
    _totalAttempts += data.attemptsDelta || 0;
    _totalIters    += data.itersDelta    || 0;
    renderPoolProgress();
    return;
  }

  if (data.type === 'random-found') {
    randomPoolId++;
    terminateRandomPool();
    hideOverlay();
    resetButtons();
    state.plates = data.plates;
    state.cachedSolution = data.solution;
    state.activePlate = 1;
    document.getElementById('val-plates').textContent = data.plates.length;
    renderMatrix();
    buildScene('scene-config-inner', state.plates);
    updateScene('scene-config-inner', state.plates, state.activePlate);
    return;
  }

  if (data.type === 'random-exhausted') {
    _exhaustedCount++;
    if (_exhaustedCount >= _poolSize) {
      randomPoolId++;
      terminateRandomPool();
      hideOverlay();
      resetButtons();
      showToast(t('toast-no-random'), 'error');
    }
  }
}

document.querySelector('#computing-overlay .btn-cancel').addEventListener('click', () => {
  worker.terminate();
  worker = createWorker();
  worker.onmessage = onWorkerMessage;
  worker.onerror = workerError;
  randomPoolId++;
  terminateRandomPool();
  resetProgress();
  hideOverlay();
  resetButtons();
});
  </script>

// ── db-search — Chest DB search + hints ─────────────────────────────────────────

let chestDb = null;        // { v, updated, entries }
let chestFuse = null;      // Fuse instance over chestDb.entries
let searchResults = [];    // entries currently shown in the results list
let searchSelected = -1;   // index into searchResults, for arrow-key navigation

async function loadChestDb() {
  if (chestDb) return chestDb;
  if (typeof Fuse === 'undefined') return null; // CDN script failed to load

  const cached = localStorage.getItem('chestDb');
  try {
    const res = await fetch('chests.json');
    if (!res.ok) throw new Error('bad response');
    chestDb = await res.json();
    localStorage.setItem('chestDb', JSON.stringify(chestDb));
  } catch {
    if (cached) {
      try { chestDb = JSON.parse(cached); } catch { /* ignore corrupt cache */ }
    }
  }

  if (!chestDb) return null;

  chestFuse = new Fuse(chestDb.entries, {
    keys: ['name.ru', 'name.en', 'name.de', 'name.uk', 'tags'],
    threshold: 0.4,
    ignoreLocation: true,
  });
  return chestDb;
}

// Resolved once at startup so the button/shortcut can be gated on actual availability
// instead of failing silently (or with a stray toast) on first use. Exposed as a promise
// (not just a boolean) so a fast Ctrl+K — pressed before the check has resolved — awaits
// the real result instead of racing against the initial "not yet known" default.
let chestSearchAvailable = false;

async function initChestSearch() {
  const ok = await loadChestDb();
  chestSearchAvailable = !!ok;
  const btn = document.getElementById('btn-search-db');
  const wrap = document.getElementById('btn-search-db-wrap');
  btn.disabled = !chestSearchAvailable;
  if (!chestSearchAvailable) {
    // The button itself won't fire hover events while disabled (no tooltip in Chromium) —
    // put the explanatory title on the wrapping span instead, which stays interactive.
    wrap.dataset.i18nTitle = 'search-unavailable-title';
    wrap.title = t('search-unavailable-title');
  }
  return chestSearchAvailable;
}
const chestSearchReady = initChestSearch();

// A query is treated as a position search when it's only digits and separators
function isPositionQuery(q) {
  return /\d/.test(q) && /^[\d\s,.;-]+$/.test(q);
}

function parsePositionQuery(q) {
  const trimmed = q.trim();
  // No separators at all — compact digit string (e.g. "00206"), one digit per position
  if (/^\d+$/.test(trimmed)) return trimmed.split('').map(Number);
  return trimmed.split(/[\s,.;-]+/).filter(Boolean).map(Number);
}

function arraysEqual(a, b) {
  return a.length === b.length && a.every((v, i) => v === b[i]);
}

// DB positions are 0-based; users may type either 0-based or the app's 1-based display
function searchByPosition(nums, entries) {
  const shifted = nums.map(n => n - 1);
  return entries.filter(e => arraysEqual(e.pos, nums) || arraysEqual(e.pos, shifted));
}

// ── Live position hints ─────────────────────────────────────────────────────
// Suggest DB chests whose disc positions match the user's current positions by a
// left prefix. Unlike searchByPosition (free-text, unknown convention), here both
// ends are known: DB pos is 0-based, so callers pass user positions already
// converted to 0-based (currentPos - 1).

// Parse a Gothic rules string ("A:B-,C+;D:E-") into ordered groups of directed
// edges. Letters map to 1-based plate ids; "+" = same, "-" = opposite.
/** Ordered rule groups for hint rendering — thin adapter over the gothic parser's
 *  rule parser (one rule regex in the app, not two). */
function parseRuleGroups(rulesStr) {
  return Object.entries(gothic.parseRules(rulesStr || ''))
    .filter(([, deps]) => deps.length)
    .map(([src, deps]) => ({
      from: src.charCodeAt(0) - 64,
      tokens: deps.map(d => ({ to: d.targetId, dir: d.direction })),
    }));
}

// Cached `${from}>${to}` → dir map per DB entry (rules never change at runtime).
const _edgeCache = new WeakMap();
function entryEdges(entry) {
  let edges = _edgeCache.get(entry);
  if (!edges) {
    edges = new Map();
    for (const g of parseRuleGroups(entry.rules))
      for (const t of g.tokens) edges.set(`${g.from}>${t.to}`, t.dir);
    _edgeCache.set(entry, edges);
  }
  return edges;
}

/** Build the user's entered dependency edges as `${from}>${to}` → dir. */
function buildUserEdges(plates) {
  const edges = new Map();
  for (const p of plates)
    for (const d of p.deps) edges.set(`${p.id}>${d.targetId}`, d.direction);
  return edges;
}

/** Count consecutive leading positions where entry.pos matches user0 (0-based). */
function leadingMatchLength(entryPos, user0) {
  const n = Math.min(entryPos.length, user0.length);
  let L = 0;
  while (L < n && entryPos[L] === user0[L]) L++;
  return L;
}

/**
 * Rank DB entries by a combined match score and keep the strongest.
 *
 *   prefix = L / plateCount                    // how much of the user's config matches, left-aligned
 *   count  = 1 / (1 + |entry.plates - plateCount|)  // closeness of disc count
 *   score  = prefix * (0.7 + 0.3 * count)      // prefix is mandatory: prefix 0 → score 0
 *
 * Only entries scoring above 0.25 are kept (this effectively requires L ≥ 2).
 * The score also drives card opacity, so brightness tracks the ranking.
 *
 * @param {object[]} entries   DB entries ({ pos, ... })
 * @param {number[]} user0     user positions, 0-based
 * @param {number}   plateCount current plate count
 * @param {number}   [limit=3]  max entries returned
 * @param {Map}      [userEdges] entered dependencies (`${from}>${to}` → dir). When
 *   non-empty, they modulate the score: each matching edge +0.5, each edge the
 *   chest lacks (missing) −0.2, each opposite-direction edge (conflict) −1.5, as a
 *   multiplier clamped ≥ 0. Empty → no effect (positions decide alone).
 * @returns {{entry: object, score: number, matchLen: number}[]} best match first
 */
function computeChestHints(entries, user0, plateCount, limit = 3, userEdges = new Map()) {
  const scored = [];
  for (const entry of entries) {
    const L = leadingMatchLength(entry.pos, user0);
    if (L === 0) continue;
    const prefix = L / plateCount;
    const count = 1 / (1 + Math.abs(entry.pos.length - plateCount));
    let score = prefix * (0.7 + 0.3 * count);
    if (userEdges.size) {
      const edges = entryEdges(entry);
      let match = 0, missing = 0, conflict = 0;
      for (const [key, dir] of userEdges) {
        const chestDir = edges.get(key);
        if (chestDir === undefined) missing++;
        else if (chestDir === dir) match++;
        else conflict++;
      }
      score *= Math.max(0, 1 + 0.5 * match - 0.2 * missing - 1.5 * conflict);
    }
    if (score > 0.25) scored.push({ entry, score, matchLen: L });
  }
  scored.sort((a, b) =>
    b.score - a.score
    || a.entry.pos.length - b.entry.pos.length
    || (a.entry.id < b.entry.id ? -1 : a.entry.id > b.entry.id ? 1 : 0)
  );
  return scored.slice(0, limit);
}

function entryName(entry) {
  for (const lang of [state.lang, 'ru', 'en', 'uk', 'de']) {
    if (entry.name[lang]) return entry.name[lang];
  }
  return Object.values(entry.name)[0] || '';
}

function runChestSearch(query) {
  if (!chestDb) return [];
  const q = query.trim();
  if (!q) return [];
  return isPositionQuery(q)
    ? searchByPosition(parsePositionQuery(q), chestDb.entries)
    : chestFuse.search(q).map(r => r.item);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function buildResultCard(entry, idx) {
  const name = escapeHtml(entryName(entry) || t('unknown-lock'));
  const tagsStr = escapeHtml(entry.tags.join(', '));
  const image = entry.img[0]
    ? `<img src="${entry.img[0]}" alt="">`
    : `<span class="sr-image-placeholder" data-test-id="search-result-${idx}-placeholder">🖼</span>`;
  const plateRows = entry.pos.map((p, plateIdx) => {
    const holes = Array.from({ length: 7 }, (_, i) =>
      `<span class="sr-hole${i === p ? ' active' : ''}"
             data-test-id="search-result-${idx}-hole-${plateIdx}-${i}"
             data-active="${i === p}"></span>`
    ).join('');
    return `<div class="sr-plate" data-test-id="search-result-${idx}-plate-${plateIdx}">${holes}</div>`;
  }).join('');

  return `
    <div class="search-result" data-test-id="search-result-${idx}" data-idx="${idx}" data-selected="false">
      <div class="sr-image" data-test-id="search-result-${idx}-image">${image}</div>
      <div class="sr-info">
        <div class="sr-name" data-test-id="search-result-${idx}-name">${name}</div>
        <div class="sr-tags" data-test-id="search-result-${idx}-tags">${tagsStr}</div>
      </div>
      <div class="sr-preview">${plateRows}</div>
    </div>
  `;
}

function highlightSearchSelected() {
  document.querySelectorAll('#search-results .search-result').forEach((el, i) => {
    const isSelected = i === searchSelected;
    el.classList.toggle('selected', isSelected);
    el.dataset.selected = isSelected ? 'true' : 'false';
  });
  const sel = document.querySelector('#search-results .search-result.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

function clearSearchResults() {
  searchResults = [];
  searchSelected = -1;
  document.getElementById('search-results').innerHTML = '';
  document.getElementById('search-empty').classList.add('hidden');
}

function renderSearchResults(list) {
  searchResults = list;
  searchSelected = list.length ? 0 : -1;
  const container = document.getElementById('search-results');
  const empty = document.getElementById('search-empty');

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  container.innerHTML = list.map((entry, i) => buildResultCard(entry, i)).join('');
  highlightSearchSelected();
}

// ── Live position hint cards (rendered between the position lock and matrix) ──

let hintResults = [];   // entries currently shown as hint cards, for click dispatch

// Render entry.rules as a gothic-format line ("A:B+,C-;D:E-"), each target token
// colored by how it relates to the user's entered deps: match (green), conflict
// (red), or none. Position digits are omitted — the preview shows them already.
function renderRulesLine(idx, entry, userEdges) {
  const groups = parseRuleGroups(entry.rules);
  if (!groups.length) return '';
  const body = groups.map(g => {
    const fromL = String.fromCharCode(64 + g.from);
    const toks = g.tokens.map(t => {
      const ud = userEdges.get(`${g.from}>${t.to}`);
      const rel = ud === undefined ? 'none' : ud === t.dir ? 'match' : 'conflict';
      const tok = String.fromCharCode(64 + t.to) + (t.dir === 'same' ? '+' : '-');
      return `<span class="dep-tok" data-rel="${rel}" data-test-id="chest-hint-${idx}-rule-${g.from}-${t.to}">${tok}</span>`;
    }).join(',');
    return `${fromL}:${toks}`;
  }).join(';');
  return `<div class="chest-hint-rules" data-test-id="chest-hint-${idx}-rules" title="${escapeHtml(entry.rules)}">${body}</div>`;
}

// score drives the data-score badge and the card opacity, so a stronger match
// reads brighter. A full match (score ≈ 1) jumps to full opacity while partials
// share a lower band — the gap above a full match is deliberately larger than the
// gaps among partials. matchLen = leading discs that coincide with the user's
// positions; those discs are highlighted green in the preview. The rules line is
// colored against userEdges (the user's entered dependencies).
function buildHintCard(entry, idx, score, matchLen, userEdges) {
  const name = escapeHtml(entryName(entry) || t('unknown-lock'));
  const tagsStr = escapeHtml(entry.tags.join(', '));
  const opacity = (score >= 0.999 ? 1 : 0.35 + 0.45 * score).toFixed(3);
  const plateRows = entry.pos.map((p, plateIdx) => {
    const holes = Array.from({ length: 7 }, (_, i) => {
      const active = i === p;
      const match = active && plateIdx < matchLen;
      return `<span class="sr-hole${active ? ' active' : ''}${match ? ' match' : ''}"`
        + ` data-test-id="chest-hint-${idx}-hole-${plateIdx}-${i}"`
        + ` data-active="${active}" data-match="${match}"></span>`;
    }).join('');
    return `<div class="sr-plate" data-test-id="chest-hint-${idx}-plate-${plateIdx}">${holes}</div>`;
  }).join('');
  return `
    <button type="button" class="chest-hint" data-test-id="chest-hint-${idx}" data-idx="${idx}"
            data-score="${Math.round(score * 100)}" style="opacity:${opacity}" title="${name}">
      <div class="chest-hint-info">
        <div class="chest-hint-name" data-test-id="chest-hint-${idx}-name">${name}</div>
        <div class="chest-hint-tags" data-test-id="chest-hint-${idx}-tags" title="${tagsStr}">${tagsStr}</div>
        ${renderRulesLine(idx, entry, userEdges)}
      </div>
      <div class="sr-preview">${plateRows}</div>
    </button>`;
}

// Recomputed on every position/structure change. Degrades silently: when the DB
// never loaded (offline / fetch or Fuse CDN failure) chestDb is null and the
// container just stays hidden — no error, no placeholder.
function renderChestHints() {
  const container = document.getElementById('chest-hints');
  if (!container) return;
  const hide = () => { container.classList.add('hidden'); container.innerHTML = ''; hintResults = []; };
  if (!chestDb || state.stage !== 'config') return hide();

  const user0 = state.plates.map(p => p.currentPos - 1);
  const userEdges = buildUserEdges(state.plates);
  const hints = computeChestHints(chestDb.entries, user0, state.plates.length, 3, userEdges);
  if (!hints.length) return hide();

  hintResults = hints.map(h => h.entry);   // index-aligned with the rendered cards, for click dispatch
  const cards = hints.map((h, i) => buildHintCard(h.entry, i, h.score, h.matchLen, userEdges)).join('');
  container.innerHTML =
    `<div class="chest-hints-label" data-i18n="hints-label">${t('hints-label')}</div>`
    + `<div class="chest-hints-row">${cards}</div>`;
  container.classList.remove('hidden');
}

// Whole card is clickable — apply the chest's full config (positions + rules),
// reusing the same import path the search dialog uses.
document.getElementById('chest-hints').addEventListener('click', (e) => {
  const card = e.target.closest('.chest-hint');
  if (!card) return;
  const entry = hintResults[parseInt(card.dataset.idx, 10)];
  if (entry) applyEntry(entry);
});

// Show hints once the DB finishes loading, in case the user is already on config.
chestSearchReady.then(() => renderChestHints());

function applySearchResult(entry) {
  // applyEntry() shows its own success toast — don't double up
  applyEntry(entry);
  document.getElementById('search-dialog').close();
  if (state.stage !== 'config') switchToConfig();
}

// Opens the dialog synchronously (before any await) so it can never be
// reopened by a late showModal() racing against a test/user closing it first.
// Database loading happens in the background; the search re-runs once ready.
function openSearchDialog() {
  const input = document.getElementById('search-input');
  input.value = '';
  clearSearchResults();
  document.getElementById('search-dialog').showModal();
  input.focus();

  loadChestDb().then(() => {
    if (input.value.trim()) renderSearchResults(runChestSearch(input.value));
  });
}

document.getElementById('btn-search-db').addEventListener('click', openSearchDialog);
document.getElementById('btn-search-close').addEventListener('click', () =>
  document.getElementById('search-dialog').close());

// .search-dialog-inner covers the dialog's entire content box (dialog itself has
// no padding/border), so target === dialog can only happen on a backdrop click.
document.getElementById('search-dialog').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.close();
});

document.getElementById('search-input').addEventListener('input', (e) => {
  renderSearchResults(runChestSearch(e.target.value));
});

document.getElementById('search-input').addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (searchResults.length) {
      searchSelected = (searchSelected + 1) % searchResults.length;
      highlightSearchSelected();
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (searchResults.length) {
      searchSelected = (searchSelected - 1 + searchResults.length) % searchResults.length;
      highlightSearchSelected();
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (searchSelected >= 0 && searchResults[searchSelected]) {
      applySearchResult(searchResults[searchSelected]);
    }
  } else if (e.key === 'Escape') {
    // Chrome fires a normal cancelable keydown for Escape on a focused input — intercept
    // it here and close immediately, skipping Chrome's default action (blurring the input).
    e.preventDefault();
    document.getElementById('search-dialog').close();
  }
});

// Firefox does NOT dispatch any keydown/keyup for Escape to page script when a focused
// text input consumes it first — it just blurs the input natively, unreachable from JS.
// The blur itself IS observable though, so use it as a fallback signal: if the input loses
// focus to nothing-in-particular (document.body) while the dialog is still open, and that
// wasn't caused by clicking elsewhere inside the dialog, treat it as an Escape and close.
let _searchContentMouseDown = false;
document.getElementById('search-dialog-inner').addEventListener('mousedown', () => {
  _searchContentMouseDown = true;
});
document.getElementById('search-input').addEventListener('blur', () => {
  const wasContentClick = _searchContentMouseDown;
  _searchContentMouseDown = false;
  if (wasContentClick) return;
  // document.activeElement can transiently read as <body> while blur is firing, before
  // the browser finishes applying a new focus target (e.g. focus moving to another
  // element within the dialog) — defer so that transition has settled before checking.
  setTimeout(() => {
    const dialog = document.getElementById('search-dialog');
    if (dialog.hasAttribute('open') && document.activeElement === document.body) {
      dialog.close();
    }
  }, 0);
});

document.getElementById('search-results').addEventListener('click', (e) => {
  const card = e.target.closest('.search-result');
  if (!card) return;
  const idx = parseInt(card.dataset.idx, 10);
  if (searchResults[idx]) applySearchResult(searchResults[idx]);
});

// Global Ctrl/Cmd+K — not gated on focused element, unlike the WASD listener
document.addEventListener('keydown', async (e) => {
  if ((e.ctrlKey || e.metaKey) && e.code === 'KeyK') {
    e.preventDefault();
    // Await the same readiness promise rather than reading the flag synchronously —
    // pressing Ctrl+K before the startup check resolves must wait for the real
    // result, not race against its "not yet known" initial value.
    const available = await chestSearchReady;
    if (!available) {
      showToast(t('toast-search-db-error'), 'error');
      return;
    }
    openSearchDialog();
  }
});
  </script>


</body>
