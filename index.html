<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gothic Lockpick Solver</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  height: 100vh;
  overflow: hidden;
}

.stage { display: flex; flex-wrap: wrap; height: 100vh; overflow: hidden; }
.stage.hidden { display: none; }

.panel { padding: 24px; }
.panel-left {
  width: var(--panel-w);
  min-width: 280px;
  height: 100vh;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: hidden;
}
.panel-right {
  flex: 1;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
/* scene takes all free space, centering the plates; legend sinks to the bottom */
.scene-wrap {
  flex: 1;
  width: 100%;
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
}

@media (max-width: 600px) {
  body         { height: auto; overflow: visible; }
  .stage       { height: auto; overflow: visible; }
  .panel-left  { width: 100%; height: auto; border-right: none; overflow: visible; }
  #plates-config { flex: none; overflow-y: visible; }
  .panel-right { padding-top: var(--scene-overhead, 120px); }
}

h2 { font-size: 0.85em; letter-spacing: 3px; text-transform: uppercase;
     color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

.setting-row { display: flex; align-items: center; gap: 8px; width: 100%; }
.setting-row.minor { opacity: 0.55; font-size: 0.82em; }
.setting-row label { white-space: nowrap; }
.btn-icon {
  width: 28px; height: 28px; padding: 0;
  font-size: 1em; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

button {
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border-control);
  padding: 4px 12px;
  cursor: pointer;
  border-radius: 3px;
  font-family: inherit;
  font-size: 0.9em;
}
button:hover { background: var(--bg-hover); border-color: var(--border-strong); }

.btn-primary {
  margin-top: auto;
  padding: 10px;
  background: var(--bg-accent);
  border-color: var(--border-strong);
  color: var(--text-bright);
  font-size: 1em;
  letter-spacing: 2px;
}
.btn-primary:hover { background: var(--bg-accent-hover); }

input[type=number] {
  width: 48px;
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border-control);
  padding: 3px 6px;
  text-align: center;
  font-family: inherit;
  border-radius: 3px;
}

/* Config accordion */
.plate-section {
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.plate-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: var(--bg-control);
  cursor: pointer;
  user-select: none;
  font-size: 0.88em;
}
.plate-header:hover { background: var(--bg-hover); }
.plate-header .toggle { opacity: 0.5; width: 12px; }
.plate-body {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--bg-inset);
}
.plate-body.collapsed { display: none; }

.pos-control { display: flex; align-items: center; gap: 6px; font-size: 0.85em; }
.pos-val { width: 24px; text-align: center; font-weight: bold; }

.dep-row { display: flex; align-items: center; gap: 5px; font-size: 0.82em; }
.dep-row select {
  background: var(--bg-control); color: var(--text);
  border: 1px solid var(--border-control); border-radius: 3px;
  padding: 2px 4px; font-family: inherit; font-size: 1em;
}
.dep-row .btn-remove { padding: 2px 6px; opacity: 0.5; }
.dep-row .btn-remove:hover { opacity: 1; }
.btn-add-dep { font-size: 0.78em; opacity: 0.6; padding: 3px 8px; }
.btn-add-dep:hover { opacity: 1; }

/* Solve panel */
.solution-str {
  font-size: 0.82em;
  color: var(--text-soft);
  line-height: 1.8;
  word-break: break-all;
  border: 1px solid var(--border);
  padding: 8px;
  border-radius: 3px;
  background: var(--bg-inset);
}
.solution-str .cur-step { color: var(--accent); font-weight: bold; }

#plates-config {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
}
#plates-config > * + * { margin-top: 10px; }

.solution-list {
  list-style: none;
  font-size: 0.85em;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  padding: 0;
}
.solution-list li {
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  color: var(--text-muted);
}
.solution-list li.active {
  background: var(--bg-accent);
  color: var(--text-bright);
}
.solution-list li:hover { background: var(--bg-hover); }
.solution-list li.endpoint {
  color: var(--text-muted);
  font-size: 0.9em;
  cursor: pointer;
}
.solution-list li.endpoint.active { background: var(--bg-inset); color: var(--text-soft); }

button:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

/* Computing overlay */
#computing-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(14, 12, 9, 0.72);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
}
#computing-overlay.active { display: flex; }
#overlay-progress {
  color: var(--text-muted);
  font-size: 0.78em;
  letter-spacing: 1px;
  min-height: 1.2em;
  text-align: center;
}
#computing-overlay .btn-cancel {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
  font-size: 0.78em;
  letter-spacing: 1px;
  padding: 4px 18px;
}
#computing-overlay .btn-cancel:hover {
  background: var(--bg-control);
  border-color: var(--border-strong);
  color: var(--text);
}
.spinner {
  width: 44px;
  height: 44px;
  border: 3px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.solve-buttons { display: flex; gap: 10px; margin-top: auto; }
.solve-buttons .btn-primary { flex: 1; margin-top: 0; }
.solve-buttons .btn-return { margin-right: 14px; }

/* Game-style key legend, pinned to the bottom of the right panel */
.legend {
  display: flex;
  flex-direction: column;
  gap: 16px;
  font-size: 1.2em;
  color: var(--legend-text);
  margin-bottom: 10px;
}
.legend-row { display: flex; align-items: center; gap: 14px; }
.keys { display: inline-flex; border: 2px solid var(--keycap-border); }
.keys kbd {
  font-family: inherit;
  font-weight: bold;
  font-size: 0.85em;
  color: var(--legend-text);
  background: var(--keycap-bg);
  padding: 2px 10px;
  line-height: 1.4;
}
.keys kbd + kbd { border-left: 2px solid var(--keycap-border); }

/* No-solution message */
.no-solution { color: var(--danger); font-size: 0.85em; text-align: center; padding: 20px; }

:root {
  --tilt: -30deg;         /* наклон камеры вниз; отрицательный = смотрим сверху */
  --yaw: -35deg;          /* поворот вокруг вертикали; отрицательный = видна правая грань */
  --plate-w: 286px;       /* plate width (X, where holes go) */
  --plate-t: 180px;       /* plate height (Y) — «тост, стоящий вертикально» */
  --plate-d: 31px;        /* plate thickness (top face depth) */
  --plate-gap: 48px;      /* Z spacing between plates — consumed by JS only */
  --hole-size: 15px;
  --hole-padding: 0.17;   /* unitless fraction — JS-only, not valid in calc() */
  --pin-w: 10px;
  --pin-h-up: 18px;
  --pin-h-dn: 6px;
  --panel-w: 45vw;

  /* === COLOR PALETTE === */
  --bg:                  #0e0c09;
  --bg-panel:            #14110d;
  --bg-inset:            #110f0b;
  --bg-control:          #1a1612;
  --bg-hover:            #241f15;
  --bg-accent:           #3a2f1d;
  --bg-accent-hover:     #4a3c24;
  --border:              #2e2820;
  --border-control:      #5a4f3a;
  --border-strong:       #8a7a55;
  --text:                #d9c9a6;
  --text-bright:         #f0e4c8;
  --text-dim:            #a08e6a;
  --text-muted:          #8a7a5f;
  --text-soft:           #bfae8a;
  --accent:              #e8c87a;
  --danger:              #e55;
  --legend-text:         #e7d7b8;
  --keycap-border:       #cdbb96;
  --keycap-bg:           rgba(0, 0, 0, 0.35);
  --metal-top:           #b3b0a8;
  --metal-top-edge:      #d6d3c9;
  --metal-front:         #232019;
  --metal-front-edge:    #565045;
  --metal-side:          #6e6a60;
  --metal-side-edge:     #8d897e;
  --metal-top-active:    #c9c5ba;
  --metal-top-edge-active:   #f5e9c8;
  --metal-front-active:      #2e2a20;
  --metal-front-edge-active: #b9a874;
  --metal-side-active:       #7e7a6e;
  --metal-side-edge-active:  #c8b88a;
  --plate-num-color:     #26231d;
  --hole:                #14110b;
  --hole-edge:           #55514a;
  --hole-center:         #181408;
  --hole-center-edge:    #9a8a60;
  --pin-lowered:         #c8a050;
  --pin-raised:          #d4a843;
  --pin-glow:            #d4a84388;
}

.scene-wrap {
  position: relative;
  perspective: 900px;
  perspective-origin: 50% 35%;
}

.scene {
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(var(--tilt)) rotateY(var(--yaw));
  width: var(--plate-w);
  height: var(--plate-t);
  margin-left: calc(-1 * var(--scene-cx, 0px));
}

.plate {
  position: absolute;
  width: var(--plate-w);
  height: var(--plate-t);
  left: 0; top: 0;
  transform-style: preserve-3d;
  transition: transform 0.25s ease;
}

.face {
  position: absolute;
  top: 0; left: 0;
}

/* Top face — lay flat (XZ plane), sits on top of the plate body */
.face.top {
  width: var(--plate-w);
  height: var(--plate-d);
  background: var(--metal-top);
  border: 1px solid var(--metal-top-edge);
  transform-origin: 0 0;
  transform: rotateX(-90deg);
}

/* Front face — facing viewer */
.face.front {
  width: var(--plate-w);
  height: var(--plate-t);
  background: var(--metal-front);
  border: 1px solid var(--metal-front-edge);
}

/* Right face — rotateY(90deg) maps +X → −Z: face extends back into box depth,
   front side faces +X (наружу), so the plate number is not mirrored */
.face.right {
  width: var(--plate-d);
  height: var(--plate-t);
  background: var(--metal-side);
  border: 1px solid var(--metal-side-edge);
  left: var(--plate-w);
  top: 0;
  transform-origin: left top;
  transform: rotateY(90deg);
}

.plate.active .face.top   { border-color: var(--metal-top-edge-active); background: var(--metal-top-active); }
.plate.active .face.front { border-color: var(--metal-front-edge-active); background: var(--metal-front-active); }
.plate.active .face.right { border-color: var(--metal-side-edge-active); background: var(--metal-side-active); }

.plate-num {
  position: absolute;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  font-weight: bold;
  color: var(--plate-num-color);
  pointer-events: none;
  transform: translateZ(0.5px);
}

.holes {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
}

.hole {
  width: var(--hole-size);
  height: var(--hole-size);
  border-radius: 50%;
  background: var(--hole);
  border: 1px solid var(--hole-edge);
  flex-shrink: 0;
}

.hole.center-hole {
  border-color: var(--hole-center-edge);
  background: var(--hole-center);
}

/* Pin stands upright on the top face: anchored at the plate's top edge (bottom:100%),
   pushed to mid-depth of the plate by translateZ. Child of .plate, not .face.top —
   left is always set by JS via pinLeft(); translateX(-50%) centers on that point */
.pin {
  position: absolute;
  width: var(--pin-w);
  height: var(--pin-h-dn);
  border-radius: 3px 3px 0 0;
  transition: height 0.2s ease, background 0.2s ease;
  transform: translateX(-50%) translateZ(calc(var(--plate-d) / -2));
  bottom: 100%;
}

.pin.lowered {
  height: var(--pin-h-dn);
  background: var(--pin-lowered);
  box-shadow: none;
}

.pin.raised {
  height: var(--pin-h-up);
  background: var(--pin-raised);
  box-shadow: 0 0 7px var(--pin-glow);
}
  </style>
</head>

  <div id="computing-overlay">
    <div class="spinner"></div>
    <div id="overlay-progress"></div>
    <button class="btn-cancel">Отмена</button>
  </div>

  <!-- STAGE: CONFIG -->
  <div id="stage-config" class="stage">
    <div class="panel panel-left">
      <h2>Настройки</h2>
      <div class="setting-row">
        <label>Элементы:</label>
        <button id="btn-plates-dec">−</button>
        <span id="val-plates">4</span>
        <button id="btn-plates-inc">+</button>
        <label style="margin-left:8px">Позиции:</label>
        <button id="btn-pos-dec">−</button>
        <span id="val-positions">7</span>
        <button id="btn-pos-inc">+</button>
        <span style="flex:1"></span>
        <button id="btn-random">Рандом</button>
        <button id="btn-export" class="btn-icon" title="Экспорт">📤</button>
        <button id="btn-import" class="btn-icon" title="Импорт">📥</button>
      </div>
      <div id="plates-config"></div>
      <button id="btn-start" class="btn-primary">РЕШЕНИЕ</button>

      <div id="scene-config" class="scene-wrap">

    <div class="panel panel-right">
      <div id="scene-solve" class="scene-wrap">

      <div class="legend">
        <div class="legend-row"><span class="keys"><kbd>A</kbd><kbd>D</kbd></span> Шаги решения</div>

  <!-- Script #1 — State & constants -->
  <script>
// ── Script #1 — State & constants ─────────────────────────────────────────

const PLATE_W       = 286;   // px — must match --plate-w
const PLATE_T       = 180;   // px — must match --plate-t
const PLATE_D       = 31;    // px — must match --plate-d
const PLATE_GAP     = 48;    // px — must match --plate-gap
const HOLE_PADDING  = 0.17;  // fraction of PLATE_W on each side
const HOLE_SIZE     = 15;    // px — must match --hole-size
const PIN_W         = 10;    // px — must match --pin-w
const AUTO_DELAY    = 500;   // ms between auto-play steps

const DEFAULT_PLATE_COUNT = 4;
const DEFAULT_POSITIONS   = 7;

/** Center position index (1-based) for a given positions count */
function center(positions) {
  return Math.floor(positions / 2) + 1;
}

/**
 * Create a fresh plate object.
 * @param {number} id      1-based plate id (1 = front, N = back)
 * @param {number} positions  must be odd
 */
function makePlate(id, positions) {
  return {
    id,
    positions,
    currentPos: center(positions),
    deps: []  // [{targetId, direction: 'same'|'opposite', steps}]
  };
}

/** Global mutable state */
const state = {
  stage: 'config',          // 'config' | 'solve'
  plates: [],               // Plate[]
  activePlate: 1,           // id of currently selected plate
  history: [],              // move notation array (config stage)
  solution: [],             // compressed notation array (solve stage)
  solverStep: 0,            // current step index in solution
  autoInterval: null,       // setInterval handle for auto-play
  cachedSolution: null      // solution found during randomization; cleared on any config change
};
</script>
  <!-- Script #2 — Game logic -->
  <script>
// ── Script #2 — Game logic ────────────────────────────────────────────────

/**
 * Compute all plate deltas for a move. Returns null if blocked.
 * @param {object[]} plates
 * @param {number}   plateId   id of the plate the player moves
 * @param {'left'|'right'} dir
 * @returns {Array<{plateId, newPos}>|null}
 */
function computeMove(plates, plateId, dir) {
  const primaryDelta = dir === 'left' ? -1 : 1;
  const visited = new Set();
  const effects = [];   // {plate, delta}

  function collect(id, delta) {
    if (visited.has(id)) return;
    visited.add(id);
    const plate = plates.find(p => p.id === id);
    if (!plate) return;
    effects.push({ plate, delta });
    const sign = delta > 0 ? 1 : -1;
    for (const dep of plate.deps) {
      const depSign = dep.direction === 'same' ? sign : -sign;
      collect(dep.targetId, depSign * dep.steps);
    }
  }

  collect(plateId, primaryDelta);

  // Blocking check — all or nothing
  for (const { plate, delta } of effects) {
    const newPos = plate.currentPos + delta;
    if (newPos < 1 || newPos > plate.positions) return null;
  }

  return effects.map(({ plate, delta }) => ({
    plateId: plate.id,
    newPos: plate.currentPos + delta
  }));
}

/**
 * Apply a move in-place. Returns true if move was applied, false if blocked.
 */
function applyMove(plates, plateId, dir) {
  const effects = computeMove(plates, plateId, dir);
  if (!effects) return false;
  for (const { plateId: pid, newPos } of effects) {
    plates.find(p => p.id === pid).currentPos = newPos;
  }
  return true;
}

/** True when all plates are at their center position */
function isGoal(plates) {
  return plates.every(p => p.currentPos === center(p.positions));
}

/**
 * Convert a move to notation string.
 * steps > 1 only when compressing consecutive same-plate same-dir moves.
 */
function toNotation(plateId, dir, steps) {
  const d = dir === 'left' ? 'A' : 'D';
  return steps === 1 ? `${plateId}${d}` : `${plateId}${d}${steps}`;
}

/** Parse a notation string back to {plateId, dir, steps} */
function parseNotation(s) {
  const m = s.match(/^(\d+)([AD])(\d*)$/);
  if (!m) throw new Error(`Invalid notation: ${s}`);
  return {
    plateId: parseInt(m[1]),
    dir:     m[2] === 'A' ? 'left' : 'right',
    steps:   m[3] ? parseInt(m[3]) : 1
  };
}
</script>
  <!-- Script #3 — BFS solver -->
  <script>
// ── Script #3 — BFS Solver ────────────────────────────────────────────────

/**
 * Find shortest solution via BFS.
 * @param {object[]} plates  Plate objects with currentPos set to start state.
 * @returns {string[]|null}  Compressed notation array, or null if unsolvable.
 */
function bfsSolve(plates) {
  const startPos = plates.map(p => p.currentPos);
  const goalPos  = plates.map(p => center(p.positions));

  if (startPos.every((p, i) => p === goalPos[i])) return [];

  const startKey = startPos.join(',');
  const visited  = new Set([startKey]);
  const queue    = [{ positions: startPos, path: [] }];

  while (queue.length > 0) {
    const { positions, path } = queue.shift();

    // Build temp plates snapshot for computeMove
    const snap = plates.map((p, i) => ({ ...p, currentPos: positions[i] }));

    for (const plate of snap) {
      for (const dir of ['left', 'right']) {
        const effects = computeMove(snap, plate.id, dir);
        if (!effects) continue;

        const newPos = [...positions];
        for (const { plateId, newPos: np } of effects) {
          newPos[plateId - 1] = np;
        }

        const key = newPos.join(',');
        if (visited.has(key)) continue;
        visited.add(key);

        const newPath = [...path, toNotation(plate.id, dir, 1)];

        if (newPos.every((p, i) => p === goalPos[i])) {
          return compressPath(newPath);
        }

        queue.push({ positions: newPos, path: newPath });
      }
    }
  }

  return null; // no solution exists
}

/**
 * Compress consecutive same-plate same-direction moves into one notation entry.
 * ['1A','1A','2D','2D','2D'] → ['1A2','2D3']
 */
function compressPath(path) {
  if (!path.length) return path;
  const result = [];
  let cur = parseNotation(path[0]);
  let count = 1;
  for (let i = 1; i < path.length; i++) {
    const next = parseNotation(path[i]);
    if (next.plateId === cur.plateId && next.dir === cur.dir) {
      count++;
    } else {
      result.push(toNotation(cur.plateId, cur.dir, count));
      cur = next; count = 1;
    }
  }
  result.push(toNotation(cur.plateId, cur.dir, count));
  return result;

  <script>
// ── Script #4 — Render ────────────────────────────────────────────────────

/** Pixel offset per position step on a plate */
function holeStep(positions) {
  const usable = PLATE_W * (1 - 2 * HOLE_PADDING);
  return usable / (positions - 1);
}

/** X offset in px for a given currentPos (centered = 0 offset) */
function posToOffsetX(currentPos, positions) {
  return (currentPos - center(positions)) * holeStep(positions);
}

/**
 * Pin left value within .face.top to keep it visually fixed in scene space.
 * The pin is a child of .face.top which moves with the plate (translateX).
 * To counteract: pinLeft = PLATE_W/2 - offsetX.
 * CSS has transform:translateX(-50%) on .pin so the center sits exactly at pinLeft.
 * When currentPos=center: offsetX=0, pinLeft=PLATE_W/2 = center of plate ✓
 * When plate slides: offsetX≠0, compensation keeps pin at scene X=PLATE_W/2 ✓
 */
function pinLeft(currentPos, positions) {
  return PLATE_W / 2 - posToOffsetX(currentPos, positions);
}

/**
 * Build DOM for all plates inside a scene element. Clears existing content.
 * @param {string} sceneId   id of the .scene div
 * @param {object[]} plates
 */
function buildScene(sceneId, plates) {
  const scene = document.getElementById(sceneId);
  scene.innerHTML = '';

  // Plate 1 = front (z=0); plate N = back (negative Z, в глубину сцены)
  for (const plate of plates) {
    const z = -(plate.id - 1) * PLATE_GAP;
    const offsetX = posToOffsetX(plate.currentPos, plate.positions);
    const isRaised = plate.currentPos === center(plate.positions);

    // Build hole HTML
    const padding = PLATE_W * HOLE_PADDING;
    const step = holeStep(plate.positions);
    const holesHTML = Array.from({ length: plate.positions }, (_, i) => {
      const isCenter = (i + 1) === center(plate.positions);
      return `<div class="hole${isCenter ? ' center-hole' : ''}"
                   style="position:absolute;
                          left:${padding + i * step - HOLE_SIZE / 2}px;
                          top:50%;
                          transform:translateY(-50%)"></div>`;
    }).join('');

    const el = document.createElement('div');
    el.className = 'plate';
    el.dataset.id = plate.id;
    el.style.transform = `translateZ(${z}px) translateX(${offsetX}px)`;
    el.innerHTML = `
      <div class="face top">${holesHTML}</div>
      <div class="face front"></div>
      <div class="face right"><span class="plate-num">${plate.id}</span></div>
      <div class="pin ${isRaised ? 'raised' : 'lowered'}"
           style="left:${pinLeft(plate.currentPos, plate.positions)}px"></div>
    `;
    scene.appendChild(el);
  }

  // rotateY(-35deg) maps negative Z (depth) to positive X (rightward drift).
  // Shift .scene left by the centroid's rightward drift to re-centre the stack.
  const centroidZ  = (plates.length - 1) * PLATE_GAP / 2;
  const cx = Math.round(0.497 * centroidZ);
  document.documentElement.style.setProperty('--scene-cx', cx + 'px');

  const stackDepth = (plates.length - 1) * PLATE_GAP;
  const overhead = Math.round(stackDepth * 0.55 + 60);
  document.documentElement.style.setProperty('--scene-overhead', overhead + 'px');
}

/**
 * Update existing plate DOM to reflect current state (no full rebuild).
 * @param {string} sceneId
 * @param {object[]} plates
 * @param {number} activePlateId
 */
function updateScene(sceneId, plates, activePlateId) {
  for (const plate of plates) {
    const el = document.querySelector(`#${sceneId} .plate[data-id="${plate.id}"]`);
    if (!el) continue;

    const z = -(plate.id - 1) * PLATE_GAP;
    const offsetX = posToOffsetX(plate.currentPos, plate.positions);
    el.style.transform = `translateZ(${z}px) translateX(${offsetX}px)`;

    const isRaised = plate.currentPos === center(plate.positions);
    const pin = el.querySelector('.pin');
    pin.className = `pin ${isRaised ? 'raised' : 'lowered'}`;
    // Keep pin visually fixed in scene space as plate moves
    pin.style.left = `${pinLeft(plate.currentPos, plate.positions)}px`;

    el.classList.toggle('active', plate.id === activePlateId);
  }
}

// ── Script #6 — Solve UI ──────────────────────────────────────────────────

/** Snapshot of plate positions at the start of the solve stage */
let solveStartPositions = [];

function switchToSolve() {
  // Save start positions for Back navigation
  solveStartPositions = state.plates.map(p => ({ ...p, deps: p.deps.slice() }));

  state.stage = 'solve';
  document.getElementById('stage-config').classList.add('hidden');
  document.getElementById('stage-solve').classList.remove('hidden');

  // Clone plates for solve stage (don't mutate config)
  state.plates = state.plates.map(p => ({ ...p, deps: p.deps.map(d => ({ ...d })) }));
  // Reset to initial positions stored in solveStartPositions
  state.plates.forEach((p, i) => { p.currentPos = solveStartPositions[i].currentPos; });

  buildScene('scene-solve-inner', state.plates);
  renderSolvePanel();
  updateScene('scene-solve-inner', state.plates, state.activePlate);
}

function switchToConfig() {
  if (state.autoInterval) { clearInterval(state.autoInterval); state.autoInterval = null; }
  state.stage = 'config';
  // Restore plates from config snapshot
  state.plates = solveStartPositions.map(p => ({ ...p, deps: p.deps.map(d => ({...d})) }));
  state.activePlate = 1;
  document.getElementById('stage-solve').classList.add('hidden');
  document.getElementById('stage-config').classList.remove('hidden');
  updateScene('scene-config-inner', state.plates, state.activePlate);
}

function renderSolvePanel() {
  // Notation string with current step highlighted
  const parts = state.solution.map((s, i) =>
    i === state.solverStep
      ? `<span class="cur-step">${s}</span>`
      : `<span style="opacity:0.45">${s}</span>`
  );
  document.getElementById('solution-string').innerHTML = parts.join(' → ');

  // Step list with Начало / Конец anchors
  const list = document.getElementById('solution-steps');
  list.innerHTML = '';

  const makeEndpoint = (label, step, highlight) => {
    const li = document.createElement('li');
    li.textContent = label;
    li.classList.add('endpoint');
    if (highlight && state.solverStep === step) li.classList.add('active');
    li.addEventListener('click', () => jumpToStep(step));
    return li;
  };

  list.appendChild(makeEndpoint('Начало', 0, true));
  state.solution.forEach((s, i) => {
    const li = document.createElement('li');
    li.textContent = `${i + 1}. ${s}`;
    if (i + 1 === state.solverStep) li.classList.add('active');
    li.addEventListener('click', () => jumpToStep(i + 1));
    list.appendChild(li);
  });
  list.appendChild(makeEndpoint('Конец', state.solution.length, false));

  // Scroll active into view
  const active = list.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'nearest' });

  // Update disabled state of nav buttons
  const atStart = state.solverStep === 0;
  const atEnd   = state.solverStep === state.solution.length;
  document.getElementById('btn-prev').disabled = atStart;
  document.getElementById('btn-step').disabled = atEnd;
  document.getElementById('btn-auto').disabled = atEnd;
}

/** Apply steps from current solverStep up to (but not including) targetStep */
function jumpToStep(targetStep) {
  // Reset to start
  state.plates.forEach((p, i) => { p.currentPos = solveStartPositions[i].currentPos; });
  state.solverStep = 0;

  // Replay up to target
  for (let i = 0; i < targetStep; i++) {
    const { plateId, dir, steps } = parseNotation(state.solution[i]);
    for (let s = 0; s < steps; s++) applyMove(state.plates, plateId, dir);
    state.solverStep = i + 1;
  }

  buildScene('scene-solve-inner', state.plates);
  renderSolvePanel();
  updateScene('scene-solve-inner', state.plates, state.activePlate);
}

/** Advance one step in the solution */
function solveStepForward() {
  if (state.solverStep >= state.solution.length) return;
  const { plateId, dir, steps } = parseNotation(state.solution[state.solverStep]);
  for (let s = 0; s < steps; s++) applyMove(state.plates, plateId, dir);
  state.solverStep++;
  updateScene('scene-solve-inner', state.plates, state.activePlate);
  renderSolvePanel();
}

/** Step back in the solution */
function solveStepBack() {
  if (state.solverStep === 0) return;
  jumpToStep(state.solverStep - 1);
}

function wireSolveHandlers() {
  document.getElementById('btn-back').addEventListener('click', switchToConfig);
  document.getElementById('btn-prev').addEventListener('click', solveStepBack);
  document.getElementById('btn-step').addEventListener('click', solveStepForward);

  document.getElementById('btn-auto').addEventListener('click', () => {
    const btn = document.getElementById('btn-auto');
    if (state.autoInterval) {
      clearInterval(state.autoInterval);
      state.autoInterval = null;
      btn.textContent = '▶ Авто';
      return;
    }
    btn.textContent = '■ Стоп';
    state.autoInterval = setInterval(() => {
      if (state.solverStep >= state.solution.length) {
        clearInterval(state.autoInterval);
        state.autoInterval = null;
        btn.textContent = '▶ Авто';
        return;
      }
      solveStepForward();
    }, AUTO_DELAY);
  });
}

  <script>
// ── Script #7 — WASD ──────────────────────────────────────────────────────

// Arrow keys duplicate WASD — browser extensions (vim-плагины) often
// intercept letter keys, arrows are a reliable fallback
const KEY_MAP = {
  W: 'W', S: 'S', A: 'A', D: 'D',
  ARROWUP: 'W', ARROWDOWN: 'S', ARROWLEFT: 'A', ARROWRIGHT: 'D'
};

document.addEventListener('keydown', (e) => {
  // Ignore when typing in inputs
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;

  const key = KEY_MAP[e.key.toUpperCase()];
  if (!key) return;
  e.preventDefault();

  if (state.stage === 'config') {
    if (key === 'W') {
      // W = дальше вглубь стека (плашка выше на экране), S = ближе
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx + 1) % ids.length];
      updateScene('scene-config-inner', state.plates, state.activePlate);
    }
    if (key === 'S') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx - 1 + ids.length) % ids.length];
      updateScene('scene-config-inner', state.plates, state.activePlate);
    }
    if (key === 'A') {
      const moved = applyMove(state.plates, state.activePlate, 'left');
      if (moved) {
        state.history.push(toNotation(state.activePlate, 'left', 1));
        updateScene('scene-config-inner', state.plates, state.activePlate);
        // Sync position display in accordion
        const plate = state.plates.find(p => p.id === state.activePlate);
        const posVal = document.querySelector(`.pos-val[data-id="${state.activePlate}"]`);
        if (posVal) posVal.textContent = plate.currentPos;
      }
    }
    if (key === 'D') {
      const moved = applyMove(state.plates, state.activePlate, 'right');
      if (moved) {
        state.history.push(toNotation(state.activePlate, 'right', 1));
        updateScene('scene-config-inner', state.plates, state.activePlate);
        const plate = state.plates.find(p => p.id === state.activePlate);
        const posVal = document.querySelector(`.pos-val[data-id="${state.activePlate}"]`);
        if (posVal) posVal.textContent = plate.currentPos;
      }
    }
  }

  if (state.stage === 'solve') {
    if (key === 'W') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx + 1) % ids.length];
      updateScene('scene-solve-inner', state.plates, state.activePlate);
    }
    if (key === 'S') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx - 1 + ids.length) % ids.length];
      updateScene('scene-solve-inner', state.plates, state.activePlate);
    }
    if (key === 'A') solveStepBack();
    if (key === 'D') solveStepForward();
  }
});

  <script type="text/x-worker" id="worker-src">
function center(positions) {
  return Math.floor(positions / 2) + 1;
}

function toNotation(plateId, dir, steps) {
  const d = dir === 'left' ? 'A' : 'D';
  return steps === 1 ? `${plateId}${d}` : `${plateId}${d}${steps}`;
}

function parseNotation(s) {
  const m = s.match(/^(\d+)([AD])(\d*)$/);
  if (!m) throw new Error('Invalid notation: ' + s);
  return {
    plateId: parseInt(m[1]),
    dir:     m[2] === 'A' ? 'left' : 'right',
    steps:   m[3] ? parseInt(m[3]) : 1
  };
}

function computeMove(plates, plateId, dir) {
  const primaryDelta = dir === 'left' ? -1 : 1;
  const visited = new Set();
  const effects = [];

  function collect(id, delta) {
    if (visited.has(id)) return;
    visited.add(id);
    const plate = plates.find(p => p.id === id);
    if (!plate) return;
    effects.push({ plate, delta });
    const sign = delta > 0 ? 1 : -1;
    for (const dep of plate.deps) {
      const depSign = dep.direction === 'same' ? sign : -sign;
      collect(dep.targetId, depSign * dep.steps);
    }
  }

  collect(plateId, primaryDelta);

  for (const { plate, delta } of effects) {
    const newPos = plate.currentPos + delta;
    if (newPos < 1 || newPos > plate.positions) return null;
  }

  return effects.map(({ plate, delta }) => ({
    plateId: plate.id,
    newPos: plate.currentPos + delta
  }));
}

function bfsSolve(plates) {
  const startPos = plates.map(p => p.currentPos);
  const goalPos  = plates.map(p => center(p.positions));

  if (startPos.every((p, i) => p === goalPos[i])) return [];

  const startKey = startPos.join(',');
  const visited  = new Set([startKey]);
  const queue    = [{ positions: startPos, path: [] }];
  let iter = 0;

  while (queue.length > 0) {
    const { positions, path } = queue.shift();
    const snap = plates.map((p, i) => ({ ...p, currentPos: positions[i] }));

    for (const plate of snap) {
      for (const dir of ['left', 'right']) {
        const effects = computeMove(snap, plate.id, dir);
        if (!effects) continue;

        const newPos = [...positions];
        for (const { plateId, newPos: np } of effects) {
          newPos[plateId - 1] = np;
        }

        const key = newPos.join(',');
        if (visited.has(key)) continue;
        visited.add(key);
        iter++;

        if (iter % 3000 === 0) {
          self.postMessage({ type: 'progress', message: 'Состояний проверено: ' + iter });
        }

        const newPath = [...path, toNotation(plate.id, dir, 1)];

        if (newPos.every((p, i) => p === goalPos[i])) {
          return compressPath(newPath);
        }

        queue.push({ positions: newPos, path: newPath });
      }
    }
  }

  return null;
}

function compressPath(path) {
  if (!path.length) return path;
  const result = [];
  let cur = parseNotation(path[0]);
  let count = 1;
  for (let i = 1; i < path.length; i++) {
    const next = parseNotation(path[i]);
    if (next.plateId === cur.plateId && next.dir === cur.dir) {
      count++;
    } else {
      result.push(toNotation(cur.plateId, cur.dir, count));
      cur = next; count = 1;
    }
  }
  result.push(toNotation(cur.plateId, cur.dir, count));
  return result;
}

self.onmessage = ({ data }) => {
  if (data.type === 'solve') {
    self.postMessage({ type: 'progress', message: 'BFS поиск...' });
    self.postMessage({ type: 'solve', solution: bfsSolve(data.plates) });
  }

  if (data.type === 'random') {
    const PLATE_COUNTS = [2, 3, 4, 5, 6, 7, 8];
    const MAX_ATTEMPTS = 400;
    const positions = data.positions;
    let found = null;
    let foundSolution = null;

    for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
      self.postMessage({ type: 'progress', message: 'Попытка ' + (attempt + 1) + ' / ' + MAX_ATTEMPTS });

      const count = PLATE_COUNTS[Math.floor(Math.random() * PLATE_COUNTS.length)];
      const plates = Array.from({ length: count }, (_, i) => {
        const id     = i + 1;
        const others = Array.from({ length: count }, (_, j) => j + 1).filter(j => j !== id);
        const depCount = Math.floor(Math.random() * 3);
        const used = new Set();
        const deps = [];
        for (let d = 0; d < depCount; d++) {
          const avail = others.filter(x => !used.has(x));
          if (!avail.length) break;
          const targetId = avail[Math.floor(Math.random() * avail.length)];
          used.add(targetId);
          deps.push({ targetId, direction: Math.random() < 0.5 ? 'same' : 'opposite', steps: 1 });
        }
        return { id, positions, deps, currentPos: 1 + Math.floor(Math.random() * positions) };
      });

      if (plates.every(p => p.currentPos === center(p.positions))) continue;

      const solution = bfsSolve(plates);
      if (solution !== null) { found = plates; foundSolution = solution; break; }
    }

    self.postMessage({ type: 'random', plates: found, solution: foundSolution });
  }
};
  </script>

  <!-- Script #9 — Web Worker bootstrap -->
  <script>
// ── Script #9 — Web Worker bootstrap ─────────────────────────────────────────

function createWorker() {
  const w = new Worker(
    URL.createObjectURL(new Blob(
      [document.getElementById('worker-src').textContent],
      { type: 'application/javascript' }
    ))
  );
  w.onmessage = onWorkerMessage;
  return w;
}

function hideOverlay() {
  document.getElementById('computing-overlay').classList.remove('active');
  document.getElementById('overlay-progress').textContent = '';
}

function resetButtons() {
  const bs = document.getElementById('btn-start');
  bs.disabled = false; bs.textContent = 'РЕШЕНИЕ';
  const br = document.getElementById('btn-random');
  br.disabled = false; br.textContent = 'Рандом';
}

function onWorkerMessage({ data }) {
  if (data.type === 'progress') {
    document.getElementById('overlay-progress').textContent = data.message;
    return;
  }

  hideOverlay();

  if (data.type === 'solve') {
    const btn = document.getElementById('btn-start');
    btn.disabled = false;
    btn.textContent = 'РЕШЕНИЕ';
    if (data.solution === null) {
      alert('Решение не найдено.');
      return;
    }
    state.solution = data.solution;
    state.solverStep = 0;
    state.history = [];
    switchToSolve();
  }

  if (data.type === 'random') {
    const btn = document.getElementById('btn-random');
    btn.disabled = false;
    btn.textContent = 'Рандом';
    if (!data.plates) {
      alert('Не удалось сгенерировать решаемую конфигурацию — попробуйте ещё раз.');
      return;
    }
    state.plates = data.plates;
    state.cachedSolution = data.solution;
    state.activePlate = 1;
    document.getElementById('val-plates').textContent = data.plates.length;
    renderAccordion();
    buildScene('scene-config-inner', state.plates);
    updateScene('scene-config-inner', state.plates, state.activePlate);
    document.getElementById('btn-plates-dec').disabled = data.plates.length <= 2;
    document.getElementById('btn-pos-dec').disabled = getPositions() <= 3;
  }
}

let worker = createWorker();

document.querySelector('#computing-overlay .btn-cancel').addEventListener('click', () => {
  worker.terminate();
  worker = createWorker();
  hideOverlay();
  resetButtons();
});
  </script>
