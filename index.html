<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gothic Lockpick Solver</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  height: 100vh;
  overflow: hidden;
}

.stage { display: flex; flex-wrap: wrap; height: 100vh; overflow: hidden; }
.stage.hidden { display: none; }

.panel { padding: 24px; }
.panel-left {
  width: var(--panel-w);
  min-width: 280px;
  height: 100vh;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: hidden;
}
.panel-right {
  flex: 1;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
/* scene takes all free space, centering the plates; legend sinks to the bottom */
.scene-wrap {
  flex: 1;
  width: 100%;
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
}

@media (max-width: 600px) {
  body         { height: auto; overflow: visible; }
  .stage       { height: auto; overflow: visible; }
  .panel-left  { width: 100%; height: auto; border-right: none; overflow: visible; }
  #plates-matrix { flex: none; overflow-y: visible; }
  .panel-right { padding-top: var(--scene-overhead, 120px); }
}

h2 { font-size: 0.85em; letter-spacing: 3px; text-transform: uppercase;
     color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

.setting-row { display: flex; align-items: center; gap: 8px; width: 100%; }
.setting-row.minor { opacity: 0.55; font-size: 0.82em; }
.setting-row label { white-space: nowrap; }
.btn-icon {
  width: 28px; height: 28px; padding: 0;
  font-size: 1em; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-difficulty {
  width: 18px; height: 18px; border-radius: 50%;
  padding: 0; flex-shrink: 0;
  border: 2px solid transparent; background-clip: padding-box;
}
.btn-difficulty[data-min="7"]  { background: #3d8a3d; border-color: #5cb85c; }
.btn-difficulty[data-min="14"] { background: #8a7010; border-color: #c8a020; }
.btn-difficulty[data-min="21"] { background: #8a2a2a; border-color: #c04040; }
.btn-difficulty:hover { filter: brightness(1.35); }

button {
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border-control);
  padding: 4px 12px;
  cursor: pointer;
  border-radius: 3px;
  font-family: inherit;
  font-size: 0.9em;
}
button:hover { background: var(--bg-hover); border-color: var(--border-strong); }

.btn-primary {
  margin-top: auto;
  padding: 10px;
  background: var(--bg-accent);
  border-color: var(--border-strong);
  color: var(--text-bright);
  font-size: 1em;
  letter-spacing: 2px;
}
.btn-primary:hover { background: var(--bg-accent-hover); }

input[type=number] {
  width: 48px;
  background: var(--bg-control);
  color: var(--text);
  border: 1px solid var(--border-control);
  padding: 3px 6px;
  text-align: center;
  font-family: inherit;
  border-radius: 3px;
}

/* Config matrix */
#plates-positions {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 5px 6px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-panel);
}
.pos-item {
  display: flex; align-items: center; gap: 2px;
  padding: 2px 6px; border-radius: 3px;
  border: 1px solid transparent;
}
.pos-item.active { background: var(--bg-accent); border-color: var(--border-strong); }
.pos-item button { padding: 1px 5px; font-size: 0.75em; }
.matrix-plate-label {
  display: inline-block; min-width: 18px;
  color: var(--text-dim); font-size: 0.8em; letter-spacing: 1px;
}
.pos-val { display: inline-block; width: 18px; text-align: center; font-size: 0.82em; }
#plates-matrix {
  flex: 1; min-height: 0; overflow: auto;
  border: 1px solid var(--border); border-radius: 4px;
}
#plates-matrix table { border-collapse: collapse; width: 100%; table-layout: fixed; }
#plates-matrix th, #plates-matrix td { border: 1px solid var(--border); }
.matrix-corner { background: var(--bg-inset); width: 28px; }
.matrix-col-header {
  background: var(--bg-control); color: var(--text-dim);
  font-weight: normal; font-size: 0.8em; letter-spacing: 1px;
  padding: 5px 6px; white-space: nowrap; text-align: center;
}
.matrix-row-header {
  background: var(--bg-control); color: var(--text-dim);
  font-weight: normal; font-size: 0.8em;
  padding: 2px 8px; text-align: center; white-space: nowrap; width: 1px;
}
.matrix-diag { background: var(--bg-inset); }
.dep-cell {
  display: block; width: 100%; min-width: 52px; height: 32px;
  border: 1px solid transparent; border-radius: 0;
  cursor: pointer; font-size: 0.78em; font-family: inherit;
}
.dep-cell[data-state="none"]     { background: var(--bg-inset); color: #555; }
.dep-cell[data-state="none"]:hover { background: var(--bg-hover); }
.dep-cell[data-state="same"]     { background: #1c2e1e; border-color: #456845; color: #78b078; }
.dep-cell[data-state="same"]:hover { background: #233823; }
.dep-cell[data-state="opposite"] { background: #2e1c1c; border-color: #684545; color: #b07878; }
.dep-cell[data-state="opposite"]:hover { background: #382323; }

/* Solve panel */
.solution-str {
  font-size: 0.82em;
  color: var(--text-soft);
  line-height: 1.8;
  word-break: break-all;
  border: 1px solid var(--border);
  padding: 8px;
  border-radius: 3px;
  background: var(--bg-inset);
}
.solution-str .cur-step { color: var(--accent); font-weight: bold; }


.solution-list {
  list-style: none;
  font-size: 0.85em;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
  padding: 0;
}
.solution-list li {
  padding: 4px 8px;
  border-radius: 3px;
  cursor: pointer;
  color: var(--text-muted);
}
.solution-list li.active {
  background: var(--bg-accent);
  color: var(--text-bright);
}
.solution-list li:hover { background: var(--bg-hover); }
.solution-list li.endpoint {
  color: var(--text-muted);
  font-size: 0.9em;
  cursor: pointer;
}
.solution-list li.endpoint.active { background: var(--bg-inset); color: var(--text-soft); }

button:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

/* Computing overlay */
#computing-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(14, 12, 9, 0.72);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
}
#computing-overlay.active { display: flex; }
#overlay-progress {
  color: var(--text-muted);
  font-size: 0.78em;
  letter-spacing: 1px;
  min-height: 1.2em;
  text-align: center;
}
#progress-total {
  font-size: 1.1rem;
  text-align: center;
}
#progress-threads {
  display: flex; flex-direction: column; gap: 2px; margin-top: 10px;
  opacity: 0.7; align-items: center;
}
.progress-thread-row {
  display: flex; align-items: baseline; white-space: nowrap; gap: 0 6px;
  font-family: ui-monospace, 'Cascadia Code', monospace;
  font-size: 0.9rem;
  font-variant-numeric: tabular-nums; letter-spacing: 0;
}
.pt-branch { opacity: 0.45; }
.pt-id     { width: 2.5ch; flex-shrink: 0; }
.pt-att    { width: 3ch; flex-shrink: 0; text-align: right; overflow: hidden; }
.pt-iters  { width: 11ch; flex-shrink: 0; text-align: right; overflow: hidden; }
#computing-overlay .btn-cancel {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
  font-size: 0.78em;
  letter-spacing: 1px;
  padding: 4px 18px;
}
#computing-overlay .btn-cancel:hover {
  background: var(--bg-control);
  border-color: var(--border-strong);
  color: var(--text);
}
.spinner {
  width: 44px;
  height: 44px;
  border: 3px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Import confirmation dialog */
#import-dialog {
  position: fixed;
  inset: 0;
  margin: auto;
  height: fit-content;
  background: var(--bg-panel);
  border: 1px solid var(--border-strong);
  border-radius: 3px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  padding: 20px 24px;
  min-width: 260px;
  outline: none;
}
#import-dialog::backdrop { background: rgba(14, 12, 9, 0.65); }
#import-dialog h3 {
  font-size: 0.78em;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  margin-bottom: 14px;
}
#import-dialog p { font-size: 0.88em; color: var(--text-soft); margin-bottom: 20px; }
.dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; }
.dialog-buttons .btn-primary { margin-top: 0; padding: 6px 16px; }

/* Toast notifications */
#toast-container {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 9px 14px;
  border-radius: 3px;
  font-size: 0.82em;
  letter-spacing: 0.5px;
  border: 1px solid;
  opacity: 0;
  transform: translateX(12px);
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.toast.visible { opacity: 1; transform: translateX(0); }
.toast-success { background: var(--bg-accent); border-color: var(--accent); color: var(--accent); }
.toast-error   { background: #1a0f0f;           border-color: #7a3030;      color: #c07070; }

.solve-buttons { display: flex; gap: 10px; margin-top: auto; }
.solve-buttons .btn-primary { flex: 1; margin-top: 0; }
.solve-buttons .btn-return { margin-right: 14px; }

/* Game-style key legend, pinned to the bottom of the right panel */
.legend {
  display: flex;
  flex-direction: column;
  gap: 16px;
  font-size: 1.2em;
  color: var(--legend-text);
  margin-bottom: 10px;
}
.legend-row { display: flex; align-items: center; gap: 14px; }
.keys { display: inline-flex; border: 2px solid var(--keycap-border); }
.keys kbd {
  font-family: inherit;
  font-weight: bold;
  font-size: 0.85em;
  color: var(--legend-text);
  background: var(--keycap-bg);
  padding: 2px 10px;
  line-height: 1.4;
}
.keys kbd + kbd { border-left: 2px solid var(--keycap-border); }

/* No-solution message */
.no-solution { color: var(--danger); font-size: 0.85em; text-align: center; padding: 20px; }

:root {
  --tilt: -30deg;         /* наклон камеры вниз; отрицательный = смотрим сверху */
  --yaw: -35deg;          /* поворот вокруг вертикали; отрицательный = видна правая грань */
  --plate-w: 286px;       /* plate width (X, where holes go) */
  --plate-t: 180px;       /* plate height (Y) — «тост, стоящий вертикально» */
  --plate-d: 31px;        /* plate thickness (top face depth) */
  --plate-gap: 48px;      /* Z spacing between plates — consumed by JS only */
  --hole-size: 15px;
  --hole-padding: 0.17;   /* unitless fraction — JS-only, not valid in calc() */
  --pin-w: 10px;
  --pin-h-up: 18px;
  --pin-h-dn: 6px;
  --panel-w: 45vw;

  /* === COLOR PALETTE === */
  --bg:                  #0e0c09;
  --bg-panel:            #14110d;
  --bg-inset:            #110f0b;
  --bg-control:          #1a1612;
  --bg-hover:            #241f15;
  --bg-accent:           #3a2f1d;
  --bg-accent-hover:     #4a3c24;
  --border:              #2e2820;
  --border-control:      #5a4f3a;
  --border-strong:       #8a7a55;
  --text:                #d9c9a6;
  --text-bright:         #f0e4c8;
  --text-dim:            #a08e6a;
  --text-muted:          #8a7a5f;
  --text-soft:           #bfae8a;
  --accent:              #e8c87a;
  --danger:              #e55;
  --legend-text:         #e7d7b8;
  --keycap-border:       #cdbb96;
  --keycap-bg:           rgba(0, 0, 0, 0.35);
  --metal-top:           #b3b0a8;
  --metal-top-edge:      #d6d3c9;
  --metal-front:         #232019;
  --metal-front-edge:    #565045;
  --metal-side:          #6e6a60;
  --metal-side-edge:     #8d897e;
  --metal-top-active:    #c9c5ba;
  --metal-top-edge-active:   #f5e9c8;
  --metal-front-active:      #2e2a20;
  --metal-front-edge-active: #b9a874;
  --metal-side-active:       #7e7a6e;
  --metal-side-edge-active:  #c8b88a;
  --plate-num-color:     #26231d;
  --hole:                #14110b;
  --hole-edge:           #55514a;
  --hole-center:         #181408;
  --hole-center-edge:    #9a8a60;
  --pin-lowered:         #c8a050;
  --pin-raised:          #d4a843;
  --pin-glow:            #d4a84388;
}

.scene-wrap {
  position: relative;
  perspective: 900px;
  perspective-origin: 50% 35%;
}

.scene {
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(var(--tilt)) rotateY(var(--yaw));
  width: var(--plate-w);
  height: var(--plate-t);
  margin-left: calc(-1 * var(--scene-cx, 0px));
}

.plate {
  position: absolute;
  width: var(--plate-w);
  height: var(--plate-t);
  left: 0; top: 0;
  transform-style: preserve-3d;
  transition: transform 0.25s ease;
}

.face {
  position: absolute;
  top: 0; left: 0;
}

/* Top face — lay flat (XZ plane), sits on top of the plate body */
.face.top {
  width: var(--plate-w);
  height: var(--plate-d);
  background: var(--metal-top);
  border: 1px solid var(--metal-top-edge);
  transform-origin: 0 0;
  transform: rotateX(-90deg);
}

/* Front face — facing viewer */
.face.front {
  width: var(--plate-w);
  height: var(--plate-t);
  background: var(--metal-front);
  border: 1px solid var(--metal-front-edge);
}

/* Right face — rotateY(90deg) maps +X → −Z: face extends back into box depth,
   front side faces +X (наружу), so the plate number is not mirrored */
.face.right {
  width: var(--plate-d);
  height: var(--plate-t);
  background: var(--metal-side);
  border: 1px solid var(--metal-side-edge);
  left: var(--plate-w);
  top: 0;
  transform-origin: left top;
  transform: rotateY(90deg);
}

.plate.active .face.top   { border-color: var(--metal-top-edge-active); background: var(--metal-top-active); }
.plate.active .face.front { border-color: var(--metal-front-edge-active); background: var(--metal-front-active); }
.plate.active .face.right { border-color: var(--metal-side-edge-active); background: var(--metal-side-active); }

.plate-num {
  position: absolute;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  font-weight: bold;
  color: var(--plate-num-color);
  pointer-events: none;
  transform: translateZ(0.5px);
}

.holes {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
}

.hole {
  width: var(--hole-size);
  height: var(--hole-size);
  border-radius: 50%;
  background: var(--hole);
  border: 1px solid var(--hole-edge);
  flex-shrink: 0;
}

.hole.center-hole {
  border-color: var(--hole-center-edge);
  background: var(--hole-center);
}

/* Pin stands upright on the top face: anchored at the plate's top edge (bottom:100%),
   pushed to mid-depth of the plate by translateZ. Child of .plate, not .face.top —
   left is always set by JS via pinLeft(); translateX(-50%) centers on that point */
.pin {
  position: absolute;
  width: var(--pin-w);
  height: var(--pin-h-dn);
  border-radius: 3px 3px 0 0;
  transition: height 0.2s ease, background 0.2s ease;
  transform: translateX(-50%) translateZ(calc(var(--plate-d) / -2));
  bottom: 100%;
}

.pin.lowered {
  height: var(--pin-h-dn);
  background: var(--pin-lowered);
  box-shadow: none;
}

.pin.raised {
  height: var(--pin-h-up);
  background: var(--pin-raised);
  box-shadow: 0 0 7px var(--pin-glow);
}
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <dialog id="import-dialog">
    <h3>Импорт</h3>
    <p>Применить конфигурацию из буфера обмена?</p>
    <div class="dialog-buttons">
      <button id="import-dialog-cancel">Отмена</button>
      <button id="import-dialog-ok" class="btn-primary">Применить</button>
    </div>
  </dialog>

  <div id="computing-overlay">
    <div class="spinner"></div>
    <div id="overlay-progress">
      <div id="progress-total"></div>
      <div id="progress-threads"></div>
    </div>
    <button class="btn-cancel">Отмена</button>
  </div>

  <!-- STAGE: CONFIG -->
  <div id="stage-config" class="stage">
    <div class="panel panel-left">
      <h2>Настройки</h2>
      <div class="setting-row">
        <label>Элементы:</label>
        <button id="btn-plates-dec">−</button>
        <span id="val-plates">4</span>
        <button id="btn-plates-inc">+</button>
        <label style="margin-left:8px">Позиции:</label>
        <button id="btn-pos-dec">−</button>
        <span id="val-positions">7</span>
        <button id="btn-pos-inc">+</button>
        <span style="flex:1"></span>
        <label>Рандом:</label>
        <button class="btn-difficulty" data-min="7"  data-max="13"             title="Лёгкий"></button>
        <button class="btn-difficulty" data-min="14" data-max="20" data-plates="5" title="Средний"></button>
        <button class="btn-difficulty" data-min="21"               data-plates="7" title="Сложный"></button>
        <button id="btn-export" class="btn-icon" title="Экспорт">📤</button>
        <button id="btn-import" class="btn-icon" title="Импорт">📥</button>
      </div>
      <div id="plates-positions"></div>
      <div id="plates-matrix"></div>
      <button id="btn-start" class="btn-primary">РЕШЕНИЕ</button>
    </div>
    <div class="panel panel-right">
      <div id="scene-config" class="scene-wrap">
        <div class="scene" id="scene-config-inner"></div>
      </div>
      <div class="legend">
        <div class="legend-row"><span class="keys"><kbd>A</kbd><kbd>D</kbd></span> Смещение элемента</div>
        <div class="legend-row"><span class="keys"><kbd>W</kbd><kbd>S</kbd></span> Выбор элемента</div>
      </div>
    </div>
  </div>

  <!-- STAGE: SOLVE -->
  <div id="stage-solve" class="stage hidden">
    <div class="panel panel-left">
      <h2>Решение</h2>
      <div id="solution-string" class="solution-str"></div>
      <ol id="solution-steps" class="solution-list"></ol>
      <div class="solve-buttons">
        <button id="btn-back" class="btn-primary btn-return">Вернуться</button>
        <button id="btn-prev" class="btn-primary">← Шаг</button>
        <button id="btn-auto" class="btn-primary">▶ Авто</button>
        <button id="btn-step" class="btn-primary">Шаг →</button>
      </div>
    </div>
    <div class="panel panel-right">
      <div id="scene-solve" class="scene-wrap">
        <div class="scene" id="scene-solve-inner"></div>
      </div>
      <div class="legend">
        <div class="legend-row"><span class="keys"><kbd>A</kbd><kbd>D</kbd></span> Шаги решения</div>
        <div class="legend-row"><span class="keys"><kbd>W</kbd><kbd>S</kbd></span> Выбор элемента</div>
      </div>
    </div>
  </div>

  <!-- Script #1 — State & constants -->
  <script>
// ── Script #1 — State & constants ─────────────────────────────────────────

const PLATE_W       = 286;   // px — must match --plate-w
const PLATE_T       = 180;   // px — must match --plate-t
const PLATE_D       = 31;    // px — must match --plate-d
const PLATE_GAP     = 48;    // px — must match --plate-gap
const HOLE_PADDING  = 0.17;  // fraction of PLATE_W on each side
const HOLE_SIZE     = 15;    // px — must match --hole-size
const PIN_W         = 10;    // px — must match --pin-w
const AUTO_DELAY    = 500;   // ms between auto-play steps

const DEFAULT_PLATE_COUNT = 4;
const DEFAULT_POSITIONS   = 7;

/** Center position index (1-based) for a given positions count */
function center(positions) {
  return Math.floor(positions / 2) + 1;
}

/**
 * Create a fresh plate object.
 * @param {number} id      1-based plate id (1 = front, N = back)
 * @param {number} positions  must be odd
 */
function makePlate(id, positions) {
  return {
    id,
    positions,
    currentPos: center(positions),
    deps: []  // [{targetId, direction: 'same'|'opposite', steps}]
  };
}

/** Global mutable state */
const state = {
  stage: 'config',          // 'config' | 'solve'
  plates: [],               // Plate[]
  activePlate: 1,           // id of currently selected plate
  history: [],              // move notation array (config stage)
  solution: [],             // compressed notation array (solve stage)
  solverStep: 0,            // current step index in solution
  autoInterval: null,       // setInterval handle for auto-play
  cachedSolution: null      // solution found during randomization; cleared on any config change

  <script>
// ── Script #2 — Game logic ────────────────────────────────────────────────

/**
 * Compute all plate deltas for a move. Returns null if blocked.
 * @param {object[]} plates
 * @param {number}   plateId   id of the plate the player moves
 * @param {'left'|'right'} dir
 * @returns {Array<{plateId, newPos}>|null}
 */
function computeMove(plates, plateId, dir) {
  const primaryDelta = dir === 'left' ? -1 : 1;
  const visited = new Set();
  const effects = [];   // {plate, delta}

  function collect(id, delta) {
    if (visited.has(id)) return;
    visited.add(id);
    const plate = plates.find(p => p.id === id);
    if (!plate) return;
    effects.push({ plate, delta });
    const sign = delta > 0 ? 1 : -1;
    for (const dep of plate.deps) {
      const depSign = dep.direction === 'same' ? sign : -sign;
      collect(dep.targetId, depSign * dep.steps);
    }
  }

  collect(plateId, primaryDelta);

  // Blocking check — all or nothing
  for (const { plate, delta } of effects) {
    const newPos = plate.currentPos + delta;
    if (newPos < 1 || newPos > plate.positions) return null;
  }

  return effects.map(({ plate, delta }) => ({
    plateId: plate.id,
    newPos: plate.currentPos + delta
  }));
}

/**
 * Apply a move in-place. Returns true if move was applied, false if blocked.
 */
function applyMove(plates, plateId, dir) {
  const effects = computeMove(plates, plateId, dir);
  if (!effects) return false;
  for (const { plateId: pid, newPos } of effects) {
    plates.find(p => p.id === pid).currentPos = newPos;
  }
  return true;
}

/** True when all plates are at their center position */
function isGoal(plates) {
  return plates.every(p => p.currentPos === center(p.positions));
}

/**
 * Convert a move to notation string.
 * steps > 1 only when compressing consecutive same-plate same-dir moves.
 */
function toNotation(plateId, dir, steps) {
  const d = dir === 'left' ? 'A' : 'D';
  return steps === 1 ? `${plateId}${d}` : `${plateId}${d}${steps}`;
}

/** Parse a notation string back to {plateId, dir, steps} */
function parseNotation(s) {
  const m = s.match(/^(\d+)([AD])(\d*)$/);
  if (!m) throw new Error(`Invalid notation: ${s}`);
  return {
    plateId: parseInt(m[1]),
    dir:     m[2] === 'A' ? 'left' : 'right',
    steps:   m[3] ? parseInt(m[3]) : 1
  };
}
</script>
  <!-- Script #3 — BFS solver -->
  <script>
// ── Script #3 — BFS Solver ────────────────────────────────────────────────

/**
 * Find shortest solution via BFS.
 * @param {object[]} plates  Plate objects with currentPos set to start state.
 * @returns {string[]|null}  Compressed notation array, or null if unsolvable.
 */
function bfsSolve(plates) {
  const startPos = plates.map(p => p.currentPos);
  const goalPos  = plates.map(p => center(p.positions));

  if (startPos.every((p, i) => p === goalPos[i])) return [];

  const startKey = startPos.join(',');
  const visited  = new Set([startKey]);
  const queue    = [{ positions: startPos, path: [] }];

  while (queue.length > 0) {
    const { positions, path } = queue.shift();

    // Build temp plates snapshot for computeMove
    const snap = plates.map((p, i) => ({ ...p, currentPos: positions[i] }));

    for (const plate of snap) {
      for (const dir of ['left', 'right']) {
        const effects = computeMove(snap, plate.id, dir);
        if (!effects) continue;

        const newPos = [...positions];
        for (const { plateId, newPos: np } of effects) {
          newPos[plateId - 1] = np;
        }

        const key = newPos.join(',');
        if (visited.has(key)) continue;
        visited.add(key);

        const newPath = [...path, toNotation(plate.id, dir, 1)];

        if (newPos.every((p, i) => p === goalPos[i])) {
          return compressPath(newPath);
        }

        queue.push({ positions: newPos, path: newPath });
      }
    }
  }

  return null; // no solution exists
}

/**
 * Compress consecutive same-plate same-direction moves into one notation entry.
 * ['1A','1A','2D','2D','2D'] → ['1A2','2D3']
 */
function compressPath(path) {
  if (!path.length) return path;
  const result = [];
  let cur = parseNotation(path[0]);
  let count = 1;
  for (let i = 1; i < path.length; i++) {
    const next = parseNotation(path[i]);
    if (next.plateId === cur.plateId && next.dir === cur.dir) {
      count++;
    } else {
      result.push(toNotation(cur.plateId, cur.dir, count));
      cur = next; count = 1;
    }
  }
  result.push(toNotation(cur.plateId, cur.dir, count));
  return result;
}
</script>

  <script>
// ── Script #4 — Render ────────────────────────────────────────────────────

/** Pixel offset per position step on a plate */
function holeStep(positions) {
  const usable = PLATE_W * (1 - 2 * HOLE_PADDING);
  return usable / (positions - 1);
}

/** X offset in px for a given currentPos (centered = 0 offset) */
function posToOffsetX(currentPos, positions) {
  return (currentPos - center(positions)) * holeStep(positions);
}

/**
 * Pin left value within .face.top to keep it visually fixed in scene space.
 * The pin is a child of .face.top which moves with the plate (translateX).
 * To counteract: pinLeft = PLATE_W/2 - offsetX.
 * CSS has transform:translateX(-50%) on .pin so the center sits exactly at pinLeft.
 * When currentPos=center: offsetX=0, pinLeft=PLATE_W/2 = center of plate ✓
 * When plate slides: offsetX≠0, compensation keeps pin at scene X=PLATE_W/2 ✓
 */
function pinLeft(currentPos, positions) {
  return PLATE_W / 2 - posToOffsetX(currentPos, positions);
}

/**
 * Build DOM for all plates inside a scene element. Clears existing content.
 * @param {string} sceneId   id of the .scene div
 * @param {object[]} plates
 */
function buildScene(sceneId, plates) {
  const scene = document.getElementById(sceneId);
  scene.innerHTML = '';

  // Plate 1 = front (z=0); plate N = back (negative Z, в глубину сцены)
  for (const plate of plates) {
    const z = -(plate.id - 1) * PLATE_GAP;
    const offsetX = posToOffsetX(plate.currentPos, plate.positions);
    const isRaised = plate.currentPos === center(plate.positions);

    // Build hole HTML
    const padding = PLATE_W * HOLE_PADDING;
    const step = holeStep(plate.positions);
    const holesHTML = Array.from({ length: plate.positions }, (_, i) => {
      const isCenter = (i + 1) === center(plate.positions);
      return `<div class="hole${isCenter ? ' center-hole' : ''}"
                   style="position:absolute;
                          left:${padding + i * step - HOLE_SIZE / 2}px;
                          top:50%;
                          transform:translateY(-50%)"></div>`;
    }).join('');

    const el = document.createElement('div');
    el.className = 'plate';
    el.dataset.id = plate.id;
    el.style.transform = `translateZ(${z}px) translateX(${offsetX}px)`;
    el.innerHTML = `
      <div class="face top">${holesHTML}</div>
      <div class="face front"></div>
      <div class="face right"><span class="plate-num">${plate.id}</span></div>
      <div class="pin ${isRaised ? 'raised' : 'lowered'}"
           style="left:${pinLeft(plate.currentPos, plate.positions)}px"></div>
    `;
    scene.appendChild(el);
  }

  // rotateY(-35deg) maps negative Z (depth) to positive X (rightward drift).
  // Shift .scene left by the centroid's rightward drift to re-centre the stack.
  const centroidZ  = (plates.length - 1) * PLATE_GAP / 2;
  const cx = Math.round(0.497 * centroidZ);
  document.documentElement.style.setProperty('--scene-cx', cx + 'px');

  const stackDepth = (plates.length - 1) * PLATE_GAP;
  const overhead = Math.round(stackDepth * 0.55 + 60);
  document.documentElement.style.setProperty('--scene-overhead', overhead + 'px');
}

/**
 * Update existing plate DOM to reflect current state (no full rebuild).
 * @param {string} sceneId
 * @param {object[]} plates
 * @param {number} activePlateId
 */
function updateScene(sceneId, plates, activePlateId) {
  for (const plate of plates) {
    const el = document.querySelector(`#${sceneId} .plate[data-id="${plate.id}"]`);
    if (!el) continue;

    const z = -(plate.id - 1) * PLATE_GAP;
    const offsetX = posToOffsetX(plate.currentPos, plate.positions);
    el.style.transform = `translateZ(${z}px) translateX(${offsetX}px)`;

    const isRaised = plate.currentPos === center(plate.positions);
    const pin = el.querySelector('.pin');
    pin.className = `pin ${isRaised ? 'raised' : 'lowered'}`;
    // Keep pin visually fixed in scene space as plate moves
    pin.style.left = `${pinLeft(plate.currentPos, plate.positions)}px`;

    el.classList.toggle('active', plate.id === activePlateId);
  }
}

function getPositions() {

function getPlateCount() {

function rebuildConfig() {
  const count = getPlateCount();
  const positions = getPositions();
  const existing = state.plates;
  state.plates = Array.from({ length: count }, (_, i) => {
    const id = i + 1;
    const old = existing.find(p => p.id === id);
    const plate = makePlate(id, positions);
    if (old) {
      plate.currentPos = Math.min(Math.max(old.currentPos, 1), positions);
      plate.deps = old.deps.filter(d => d.targetId !== id && d.targetId <= count);
    }
    return plate;
  });
  state.activePlate = 1;
  state.cachedSolution = null;
  renderMatrix();
  buildScene('scene-config-inner', state.plates);
  updateScene('scene-config-inner', state.plates, state.activePlate);
}

function renderMatrix() {
  const plates = state.plates;

  // Position strip
  const posContainer = document.getElementById('plates-positions');
  posContainer.innerHTML = '';
  for (const plate of plates) {
    const item = document.createElement('div');
    item.className = 'pos-item' + (plate.id === state.activePlate ? ' active' : '');
    item.dataset.id = plate.id;
    item.innerHTML = `<span class="matrix-plate-label">${plate.id}</span>`
      + `<button class="btn-pos-dec" data-id="${plate.id}"${plate.currentPos <= 1 ? ' disabled' : ''}>◄</button>`
      + `<span class="pos-val" data-id="${plate.id}">${plate.currentPos}</span>`
      + `<button class="btn-pos-inc" data-id="${plate.id}"${plate.currentPos >= plate.positions ? ' disabled' : ''}>►</button>`;
    posContainer.appendChild(item);
  }

  // Dependency matrix
  const container = document.getElementById('plates-matrix');
  container.innerHTML = '';
  const table = document.createElement('table');

  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  const corner = document.createElement('th');
  corner.className = 'matrix-corner';
  hrow.appendChild(corner);
  for (const p of plates) {
    const th = document.createElement('th');
    th.className = 'matrix-col-header';
    th.textContent = p.id;
    hrow.appendChild(th);

  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  for (const src of plates) {
    const tr = document.createElement('tr');
    const rh = document.createElement('th');
    rh.className = 'matrix-row-header';
    rh.textContent = src.id;
    tr.appendChild(rh);
    for (const tgt of plates) {
      const td = document.createElement('td');
      if (src.id === tgt.id) {
        td.className = 'matrix-diag';
      } else {
        const dep = src.deps.find(d => d.targetId === tgt.id);
        const s = dep ? dep.direction : 'none';
        const btn = document.createElement('button');
        btn.className = 'dep-cell';
        btn.dataset.state = s;
        btn.dataset.from = src.id;
        btn.dataset.to = tgt.id;
        btn.textContent = s === 'same' ? 'прямо' : s === 'opposite' ? 'обратно' : 'нет';
        td.appendChild(btn);
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  container.appendChild(table);
}

function updateMatrixActive() {
  document.querySelectorAll('#plates-positions .pos-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === state.activePlate);

}

function syncMatrixPositions() {
  for (const plate of state.plates) {
    const posVal = document.querySelector(`#plates-positions .pos-val[data-id="${plate.id}"]`);
    if (posVal) posVal.textContent = plate.currentPos;
    const dec = document.querySelector(`#plates-positions .btn-pos-dec[data-id="${plate.id}"]`);
    if (dec) dec.disabled = plate.currentPos <= 1;
    const inc = document.querySelector(`#plates-positions .btn-pos-inc[data-id="${plate.id}"]`);
    if (inc) inc.disabled = plate.currentPos >= plate.positions;
  }
}

function wireConfigHandlers() {
  const updatePlateCountButtons = () => {
    document.getElementById('btn-plates-dec').disabled = getPlateCount() <= 2;
  };

  document.getElementById('btn-plates-dec').addEventListener('click', () => {
    const cur = getPlateCount();
    if (cur <= 2) return;
    document.getElementById('val-plates').textContent = cur - 1;
    rebuildConfig();
    updatePlateCountButtons();
  });

  document.getElementById('btn-plates-inc').addEventListener('click', () => {
    document.getElementById('val-plates').textContent = getPlateCount() + 1;
    rebuildConfig();
    updatePlateCountButtons();
  });

  updatePlateCountButtons();

  const updatePosButtons = () => {
    const v = getPositions();
    document.getElementById('btn-pos-dec').disabled = v <= 3;
  };

  document.getElementById('btn-pos-dec').addEventListener('click', () => {
    let v = getPositions();
    if (v > 3) { document.getElementById('val-positions').textContent = v - 2; }
    rebuildConfig();
    updatePosButtons();
  });

  document.getElementById('btn-pos-inc').addEventListener('click', () => {
    let v = getPositions();
    document.getElementById('val-positions').textContent = v + 2;
    rebuildConfig();
    updatePosButtons();
  });

  updatePosButtons();

  document.querySelectorAll('.btn-difficulty').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.btn-difficulty').forEach(b => b.disabled = true);
      resetProgress();
      document.getElementById('computing-overlay').classList.add('active');

      randomPoolId++;
      terminateRandomPool();

      _poolSize = createRandomPool();
      const perWorker = Math.ceil(400 / _poolSize);
      _maxAttempts = perWorker * _poolSize;

      randomPool.forEach((w, i) => {
        w.postMessage({
          type:        'random',
          workerId:    i,
          positions:   getPositions(),
          minSteps:    parseInt(btn.dataset.min),
          maxSteps:    btn.dataset.max ? parseInt(btn.dataset.max) : Infinity,
          minPlates:   parseInt(btn.dataset.plates) || 2,
          maxAttempts: perWorker,
        });
      });
    });
  });

  // Delegated: position buttons
  document.getElementById('plates-positions').addEventListener('click', (e) => {
    if (!e.target.classList.contains('btn-pos-dec') && !e.target.classList.contains('btn-pos-inc')) return;
    const id = parseInt(e.target.dataset.id);
    const plate = state.plates.find(p => p.id === id);
    if (!plate) return;
    const dec = e.target.classList.contains('btn-pos-dec');
    if (dec && plate.currentPos > 1) plate.currentPos--;
    if (!dec && plate.currentPos < plate.positions) plate.currentPos++;
    state.cachedSolution = null;
    document.querySelector(`#plates-positions .pos-val[data-id="${id}"]`).textContent = plate.currentPos;
    document.querySelector(`#plates-positions .btn-pos-dec[data-id="${id}"]`).disabled = plate.currentPos <= 1;
    document.querySelector(`#plates-positions .btn-pos-inc[data-id="${id}"]`).disabled = plate.currentPos >= plate.positions;
    updateScene('scene-config-inner', state.plates, state.activePlate);
  });

  function cycleDepCell(btn, plate, toId, reverse) {
    const depIdx = plate.deps.findIndex(d => d.targetId === toId);
    const cur = depIdx === -1 ? 'none' : plate.deps[depIdx].direction;
    const order = reverse ? ['none', 'opposite', 'same'] : ['none', 'same', 'opposite'];
    const next = order[(order.indexOf(cur) + 1) % 3];
    if (next === 'none') {
      if (depIdx !== -1) plate.deps.splice(depIdx, 1);
      btn.dataset.state = 'none'; btn.textContent = 'нет';
    } else {
      if (depIdx === -1) plate.deps.push({ targetId: toId, direction: next, steps: 1 });
      else plate.deps[depIdx].direction = next;
      btn.dataset.state = next; btn.textContent = next === 'same' ? 'прямо' : 'обратно';
    }
    state.cachedSolution = null;
  }

  // Delegated: dep cells (LMB — forward, RMB — reverse)
  document.getElementById('plates-matrix').addEventListener('click', (e) => {
    if (!e.target.classList.contains('dep-cell')) return;
    const plate = state.plates.find(p => p.id === parseInt(e.target.dataset.from));
    if (!plate) return;
    cycleDepCell(e.target, plate, parseInt(e.target.dataset.to), false);
  });

  document.getElementById('plates-matrix').addEventListener('contextmenu', (e) => {
    if (!e.target.classList.contains('dep-cell')) return;
    e.preventDefault();
    const plate = state.plates.find(p => p.id === parseInt(e.target.dataset.from));
    if (!plate) return;
    cycleDepCell(e.target, plate, parseInt(e.target.dataset.to), true);
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    if (state.cachedSolution !== null) {
      state.solution = state.cachedSolution;
      state.solverStep = 0;
      state.history = [];
      switchToSolve();
      return;
    }
    const btn = document.getElementById('btn-start');
    btn.disabled = true;
    btn.textContent = '...';
    resetProgress();
    document.getElementById('computing-overlay').classList.add('active');
    worker.postMessage({ type: 'solve', plates: state.plates });
  });
}

document.getElementById('btn-import').addEventListener('click', async () => {
  const ASKED_KEY = 'clipboard_permission_asked';
  let text = null;
  try {
    let shouldRequest = false;
    try {
      const perm = await navigator.permissions.query({ name: 'clipboard-read' });
      if (perm.state === 'granted') {
        text = await navigator.clipboard.readText();
      } else if (perm.state === 'prompt') {
        shouldRequest = !localStorage.getItem(ASKED_KEY);
      }
      // 'denied' → shouldRequest stays false
    } catch {
      // permissions API not supported (Firefox) — treat as prompt
      shouldRequest = !localStorage.getItem(ASKED_KEY);
    }
    if (shouldRequest) {
      localStorage.setItem(ASKED_KEY, '1');
      text = await navigator.clipboard.readText();
    }
  } catch {}
  if (text) {
    openImportDialog(text);
  } else {
    showToast('Нажмите Ctrl+V', 'success');

/** Snapshot of plate positions at the start of the solve stage */

  document.getElementById('stage-config').classList.add('hidden');

  renderSolvePanel();

function renderSolvePanel() {
  // Notation string with current step highlighted
  const parts = state.solution.map((s, i) => {
    const arrow = i < state.solution.length - 1 ? ' →' : '';
    const inner = i === state.solverStep
      ? `<span class="cur-step">${s}</span>`
      : `<span style="opacity:0.45">${s}</span>`;
    return `<span style="white-space:nowrap">${inner}${arrow}</span>`;
  });
  document.getElementById('solution-string').innerHTML = parts.join(' ');

  // Step list with Начало / Конец anchors
  const list = document.getElementById('solution-steps');
  list.innerHTML = '';

  const makeEndpoint = (label, step, highlight) => {
    const li = document.createElement('li');
    li.textContent = label;
    li.classList.add('endpoint');
    if (highlight && state.solverStep === step) li.classList.add('active');
    li.addEventListener('click', () => jumpToStep(step));
    return li;
  };

  list.appendChild(makeEndpoint('Начало', 0, true));
  state.solution.forEach((s, i) => {
    const li = document.createElement('li');
    li.textContent = `${i + 1}. ${s}`;
    if (i + 1 === state.solverStep) li.classList.add('active');
    li.addEventListener('click', () => jumpToStep(i + 1));
    list.appendChild(li);
  });
  list.appendChild(makeEndpoint('Конец', state.solution.length, false));

  // Scroll active into view
  const active = list.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'nearest' });

  // Update disabled state of nav buttons
  const atStart = state.solverStep === 0;
  const atEnd   = state.solverStep === state.solution.length;
  document.getElementById('btn-prev').disabled = atStart;
  document.getElementById('btn-step').disabled = atEnd;
  document.getElementById('btn-auto').disabled = atEnd;
}

/** Apply steps from current solverStep up to (but not including) targetStep */
function jumpToStep(targetStep) {
  // Reset to start
  state.plates.forEach((p, i) => { p.currentPos = solveStartPositions[i].currentPos; });
  state.solverStep = 0;

  // Replay up to target
  for (let i = 0; i < targetStep; i++) {
    const { plateId, dir, steps } = parseNotation(state.solution[i]);
    for (let s = 0; s < steps; s++) applyMove(state.plates, plateId, dir);
    state.solverStep = i + 1;
  }

  buildScene('scene-solve-inner', state.plates);
  renderSolvePanel();
  updateScene('scene-solve-inner', state.plates, state.activePlate);
}

/** Advance one step in the solution */
function solveStepForward() {
  if (state.solverStep >= state.solution.length) return;
  const { plateId, dir, steps } = parseNotation(state.solution[state.solverStep]);
  for (let s = 0; s < steps; s++) applyMove(state.plates, plateId, dir);
  state.solverStep++;
  updateScene('scene-solve-inner', state.plates, state.activePlate);
  renderSolvePanel();
}

/** Step back in the solution */
function solveStepBack() {
  if (state.solverStep === 0) return;
  jumpToStep(state.solverStep - 1);
}

function wireSolveHandlers() {
  document.getElementById('btn-back').addEventListener('click', switchToConfig);
  document.getElementById('btn-prev').addEventListener('click', solveStepBack);
  document.getElementById('btn-step').addEventListener('click', solveStepForward);

  document.getElementById('btn-auto').addEventListener('click', () => {
    const btn = document.getElementById('btn-auto');
    if (state.autoInterval) {
      clearInterval(state.autoInterval);
      state.autoInterval = null;
      btn.textContent = '▶ Авто';
      return;
    }
    btn.textContent = '■ Стоп';
    state.autoInterval = setInterval(() => {
      if (state.solverStep >= state.solution.length) {
        clearInterval(state.autoInterval);
        state.autoInterval = null;
        btn.textContent = '▶ Авто';
        return;
      }
      solveStepForward();
    }, AUTO_DELAY);
  });
}
  </script>

  <script>
// ── Script #7 — WASD ──────────────────────────────────────────────────────

// Arrow keys duplicate WASD — browser extensions (vim-плагины) often
// intercept letter keys, arrows are a reliable fallback
const KEY_MAP = {
  W: 'W', S: 'S', A: 'A', D: 'D',
  ARROWUP: 'W', ARROWDOWN: 'S', ARROWLEFT: 'A', ARROWRIGHT: 'D'
};

document.addEventListener('keydown', (e) => {
  // Ignore when typing in inputs
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;

  const key = KEY_MAP[e.key.toUpperCase()];
  if (!key) return;
  e.preventDefault();

  if (state.stage === 'config') {
    if (key === 'W') {
      // W = дальше вглубь стека (плашка выше на экране), S = ближе
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx + 1) % ids.length];
      updateScene('scene-config-inner', state.plates, state.activePlate);
      updateMatrixActive();
    }
    if (key === 'S') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx - 1 + ids.length) % ids.length];
      updateScene('scene-config-inner', state.plates, state.activePlate);
      updateMatrixActive();
    }
    if (key === 'A') {
      const moved = applyMove(state.plates, state.activePlate, 'left');
      if (moved) {
        state.cachedSolution = null;
        state.history.push(toNotation(state.activePlate, 'left', 1));
        updateScene('scene-config-inner', state.plates, state.activePlate);
        syncMatrixPositions();
      }
    }
    if (key === 'D') {
      const moved = applyMove(state.plates, state.activePlate, 'right');
      if (moved) {
        state.cachedSolution = null;
        state.history.push(toNotation(state.activePlate, 'right', 1));
        updateScene('scene-config-inner', state.plates, state.activePlate);
        syncMatrixPositions();
      }
    }
  }

  if (state.stage === 'solve') {
    if (key === 'W') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx + 1) % ids.length];
      updateScene('scene-solve-inner', state.plates, state.activePlate);
    }
    if (key === 'S') {
      const ids = state.plates.map(p => p.id);
      const idx = ids.indexOf(state.activePlate);
      state.activePlate = ids[(idx - 1 + ids.length) % ids.length];
      updateScene('scene-solve-inner', state.plates, state.activePlate);
    }
    if (key === 'A') solveStepBack();
    if (key === 'D') solveStepForward();
  }
});

  <script type="text/x-worker" id="worker-src">
function center(positions) {
  return Math.floor(positions / 2) + 1;
}

function toNotation(plateId, dir, steps) {
  const d = dir === 'left' ? 'A' : 'D';
  return steps === 1 ? `${plateId}${d}` : `${plateId}${d}${steps}`;
}

function parseNotation(s) {
  const m = s.match(/^(\d+)([AD])(\d*)$/);
  if (!m) throw new Error('Invalid notation: ' + s);
  return {
    plateId: parseInt(m[1]),
    dir:     m[2] === 'A' ? 'left' : 'right',
    steps:   m[3] ? parseInt(m[3]) : 1
  };
}

function computeMove(plates, plateId, dir) {
  const primaryDelta = dir === 'left' ? -1 : 1;
  const visited = new Set();
  const effects = [];

  function collect(id, delta) {
    if (visited.has(id)) return;
    visited.add(id);
    const plate = plates.find(p => p.id === id);
    if (!plate) return;
    effects.push({ plate, delta });
    const sign = delta > 0 ? 1 : -1;
    for (const dep of plate.deps) {
      const depSign = dep.direction === 'same' ? sign : -sign;
      collect(dep.targetId, depSign * dep.steps);
    }
  }

  collect(plateId, primaryDelta);

  for (const { plate, delta } of effects) {
    const newPos = plate.currentPos + delta;
    if (newPos < 1 || newPos > plate.positions) return null;
  }

  return effects.map(({ plate, delta }) => ({
    plateId: plate.id,
    newPos: plate.currentPos + delta
  }));
}


function reconstructPath(queue, idx) {
  const path = [];
  while (queue[idx].move !== null) {
    path.push(queue[idx].move);
    idx = queue[idx].parentIdx;
  }
  return path.reverse();
}

function bfsSolve(plates, onProgress) {
  const startPos = plates.map(p => p.currentPos);
  const goalPos  = plates.map(p => center(p.positions));

  if (startPos.every((p, i) => p === goalPos[i])) return { solution: [], iters: 0 };

  const startKey = startPos.join(',');
  const visited  = new Set([startKey]);
  const queue    = [{ positions: startPos, parentIdx: -1, move: null }];
  let head = 0;
  let iter = 0;

  while (head < queue.length) {
    const { positions } = queue[head];
    const currentIdx = head;
    head++;

    const snap = plates.map((p, i) => ({ ...p, currentPos: positions[i] }));

    for (const plate of snap) {
      for (const dir of ['left', 'right']) {
        const effects = computeMove(snap, plate.id, dir);
        if (!effects) continue;

        const newPos = [...positions];
        for (const { plateId, newPos: np } of effects) newPos[plateId - 1] = np;

        const key = newPos.join(',');
        if (visited.has(key)) continue;
        visited.add(key);
        iter++;

        if (onProgress && iter % 2000 === 0) onProgress(2000);

        const newIdx = queue.length;
        queue.push({ positions: newPos, parentIdx: currentIdx, move: toNotation(plate.id, dir, 1) });

        if (newPos.every((p, i) => p === goalPos[i])) {
          return { solution: compressPath(reconstructPath(queue, newIdx)), iters: iter };
        }
      }
    }
  }

  return { solution: null, iters: iter };
}

function compressPath(path) {
  if (!path.length) return path;
  const result = [];
  let cur = parseNotation(path[0]);
  let count = 1;
  for (let i = 1; i < path.length; i++) {
    const next = parseNotation(path[i]);
    if (next.plateId === cur.plateId && next.dir === cur.dir) {
      count++;
    } else {
      result.push(toNotation(cur.plateId, cur.dir, count));
      cur = next; count = 1;
    }
  }
  result.push(toNotation(cur.plateId, cur.dir, count));
  return result;
}

self.onmessage = ({ data }) => {
  if (data.type === 'solve') {
    const { solution } = bfsSolve(data.plates, (n) => {
      self.postMessage({ type: 'progress', itersDelta: n });
    });
    self.postMessage({ type: 'solve', solution });
  }

  if (data.type === 'random') {
    const ALL_COUNTS = [2, 3, 4, 5, 6, 7, 8];
    const PLATE_COUNTS = ALL_COUNTS.filter(c => c >= (data.minPlates || 2));
    const positions   = data.positions;
    const minSteps    = data.minSteps    || 0;
    const maxSteps    = data.maxSteps    || Infinity;
    const workerId    = data.workerId;
    const maxAttempts = data.maxAttempts;

    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const count = PLATE_COUNTS[Math.floor(Math.random() * PLATE_COUNTS.length)];
      const plates = Array.from({ length: count }, (_, i) => {
        const id     = i + 1;
        const others = Array.from({ length: count }, (_, j) => j + 1).filter(j => j !== id);
        const depCount = Math.floor(Math.random() * 3);
        const used = new Set();
        const deps = [];
        for (let d = 0; d < depCount; d++) {
          const avail = others.filter(x => !used.has(x));
          if (!avail.length) break;
          const targetId = avail[Math.floor(Math.random() * avail.length)];
          used.add(targetId);
          deps.push({ targetId, direction: Math.random() < 0.5 ? 'same' : 'opposite', steps: 1 });
        }
        return { id, positions, deps, currentPos: 1 + Math.floor(Math.random() * positions) };
      });

      if (plates.every(p => p.currentPos === center(p.positions))) {
        self.postMessage({ type: 'progress', workerId, attemptsDelta: 1, itersDelta: 0 });
        continue;
      }

      const { solution, iters } = bfsSolve(plates);
      self.postMessage({ type: 'progress', workerId, attemptsDelta: 1, itersDelta: iters });

      if (solution !== null && solution.length >= minSteps && solution.length <= maxSteps) {
        self.postMessage({ type: 'random-found', workerId, plates, solution });
        return;
      }
    }

    self.postMessage({ type: 'random-exhausted', workerId });
  }
};
  </script>

  <!-- Script #9 — Web Worker bootstrap -->
  <script>
// ── Script #9 — Web Worker bootstrap ─────────────────────────────────────────

function createWorker() {
  const url = URL.createObjectURL(new Blob(
    [document.getElementById('worker-src').textContent],
    { type: 'application/javascript' }
  ));
  const w = new Worker(url);
  URL.revokeObjectURL(url);
  return w;
}

function hideOverlay() {
  document.getElementById('computing-overlay').classList.remove('active');
  document.getElementById('progress-total').textContent = '';
  document.getElementById('progress-threads').innerHTML = '';
}

function resetButtons() {
  const bs = document.getElementById('btn-start');
  bs.disabled = false; bs.textContent = 'РЕШЕНИЕ';
  document.querySelectorAll('.btn-difficulty').forEach(b => b.disabled = false);
}

const _fmtNum = new Intl.NumberFormat('ru-RU');
const _fmtC   = new Intl.NumberFormat('ru-RU', { notation: 'compact', compactDisplay: 'short' });
const _kSuffix = (() => {
  const parts = _fmtC.formatToParts(1000);
  const ci = parts.findIndex(p => p.type === 'compact');
  return parts.slice(ci > 0 && parts[ci - 1].type === 'literal' ? ci - 1 : ci).map(p => p.value).join('');
})();
function fmtK(n) { return _fmtNum.format(Math.round(n / 1000)) + _kSuffix; }

let _progressStates = null;

function resetProgress() {
  _progressStates = null;
  Object.keys(_perWorker).forEach(k => delete _perWorker[k]);
  _totalAttempts = 0; _totalIters = 0; _exhaustedCount = 0;
  document.getElementById('progress-total').textContent = '';
  document.getElementById('progress-threads').innerHTML = '';
}

function onWorkerMessage({ data }) {
  if (data.type === 'progress') {
    _progressStates = (_progressStates || 0) + (data.itersDelta || 0);
    document.getElementById('progress-total').textContent =
      'Состояний проверено: ' + fmtK(_progressStates);
    return;
  }

  hideOverlay();

  if (data.type === 'solve') {
    const btn = document.getElementById('btn-start');
    btn.disabled = false;
    btn.textContent = 'РЕШЕНИЕ';
    if (data.solution === null) {
      showToast('Решение не найдено', 'error');
      return;
    }
    state.solution = data.solution;
    state.cachedSolution = data.solution;
    state.solverStep = 0;
    state.history = [];
    switchToSolve();
  }
}

function workerError() {
  hideOverlay();
  resetButtons();
  showToast('Ошибка вычисления', 'error');
}

let worker = createWorker();
worker.onmessage = onWorkerMessage;
worker.onerror = workerError;

let randomPool   = [];
let randomPoolId = 0;

const _perWorker  = {};
let _totalAttempts  = 0;
let _totalIters     = 0;
let _poolSize       = 0;
let _maxAttempts    = 0;
let _exhaustedCount = 0;

function createRandomPool() {
  const n = Math.min(navigator.hardwareConcurrency || 2, 8);
  const capturedId = randomPoolId;
  randomPool = Array.from({ length: n }, (_, i) => {
    const w = createWorker();
    w.onmessage = (e) => onRandomPoolMessage(e, capturedId, i);
    return w;
  });
  return randomPool.length;
}

function terminateRandomPool() {
  randomPool.forEach(w => w.terminate());
  randomPool = [];
}

function renderPoolProgress() {
  document.getElementById('progress-total').textContent =
    'Попытки: ' + _totalAttempts + ' / ' + _maxAttempts + ' · ' + fmtK(_totalIters);

  const threadsEl = document.getElementById('progress-threads');
  const entries = Object.entries(_perWorker).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
  if (threadsEl.children.length !== entries.length) threadsEl.innerHTML = '';
  entries.forEach(([id, s], i) => {
    const isLast = i === entries.length - 1;
    let row = threadsEl.children[i];
    if (!row) {
      row = document.createElement('div');
      row.className = 'progress-thread-row';
      row.innerHTML =
        '<span class="pt-branch"></span>' +
        '<span class="pt-id">#' + (parseInt(id) + 1) + '</span>' +
        '<span class="pt-att"></span>' +
        '<span>попыток</span>' +
        '<span>·</span>' +
        '<span class="pt-iters"></span>';
      threadsEl.appendChild(row);
    }
    row.querySelector('.pt-branch').textContent = isLast ? '└─' : '├─';
    row.querySelector('.pt-att').textContent = _fmtNum.format(s.attempts);
    row.querySelector('.pt-iters').textContent = fmtK(s.iters);
  });
}

function onRandomPoolMessage({ data }, poolId, workerId) {
  if (poolId !== randomPoolId) return;

  if (data.type === 'progress') {
    if (!_perWorker[workerId]) _perWorker[workerId] = { attempts: 0, iters: 0 };
    _perWorker[workerId].attempts += data.attemptsDelta || 0;
    _perWorker[workerId].iters    += data.itersDelta    || 0;
    _totalAttempts += data.attemptsDelta || 0;
    _totalIters    += data.itersDelta    || 0;
    renderPoolProgress();
    return;
  }

  if (data.type === 'random-found') {
    randomPoolId++;
    terminateRandomPool();
    hideOverlay();
    resetButtons();
    state.plates = data.plates;
    state.cachedSolution = data.solution;
    state.activePlate = 1;
    document.getElementById('val-plates').textContent = data.plates.length;
    renderMatrix();
    buildScene('scene-config-inner', state.plates);
    updateScene('scene-config-inner', state.plates, state.activePlate);
    document.getElementById('btn-plates-dec').disabled = data.plates.length <= 2;
    document.getElementById('btn-pos-dec').disabled = getPositions() <= 3;
    return;
  }

  if (data.type === 'random-exhausted') {
    _exhaustedCount++;
    if (_exhaustedCount >= _poolSize) {
      randomPoolId++;
      terminateRandomPool();
      hideOverlay();
      resetButtons();
      showToast('Не удалось сгенерировать конфигурацию', 'error');
    }
  }
}

document.querySelector('#computing-overlay .btn-cancel').addEventListener('click', () => {
  worker.terminate();
  worker = createWorker();
  worker.onmessage = onWorkerMessage;
  worker.onerror = workerError;
  randomPoolId++;
  terminateRandomPool();
  hideOverlay();
  resetButtons();
});
  </script>
